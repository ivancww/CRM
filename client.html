<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的財富與保障儀表板</title>
    <link rel="manifest" href="manifest-client.json">
    <link rel="icon" type="image/png" href="client-logo-192.png">
    <link rel="apple-touch-icon" href="client-logo-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .theme-blue { color: #1E3A8A; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <div x-data="dashboardApp()" x-cloak>
        <div x-show="!hasData" class="flex items-center justify-center min-h-screen">
            <div class="text-center text-gray-500">
                <i class="fa-solid fa-spinner fa-spin text-4xl mb-4 text-blue-500"></i>
                <p class="font-bold" x-text="loadingMsg"></p>
            </div>
        </div>
        
        <div x-show="hasData" class="max-w-4xl mx-auto md:mt-8 md:mb-8 bg-white md:rounded-2xl shadow-xl overflow-hidden" x-cloak>
            <div class="gradient-bg text-white p-6 md:p-8 flex justify-between items-center">
                <div><p class="text-blue-200 text-sm mb-1">親愛的 <span x-text="client.owner || client.name || '客戶'"></span>：</p><h1 class="text-2xl md:text-3xl font-bold">您的家庭財富與保障報告</h1></div>
                <div x-data="{ showTotal: false }" class="bg-white/10 p-3 rounded-xl text-center cursor-pointer" @click="showTotal = !showTotal">
                    <div class="text-xs text-blue-100 mb-1">家庭總保費 (年) <i class="fa-solid ml-1 opacity-70" :class="showTotal ? 'fa-eye-slash' : 'fa-eye'"></i></div>
                    <div class="text-xl font-bold text-yellow-300 font-mono" x-text="showTotal ? 'HK$ ' + formatNumber(client.summary?.totalPremium || 0) : '****'"></div>
                </div>
            </div>

            <div class="p-4 md:p-8 space-y-6 md:space-y-8 bg-gray-50">
                <div>
                    <h2 class="text-lg font-bold theme-blue mb-4"><i class="fa-solid fa-shield-cat mr-2"></i>第一層：四大保障概覽</h2>
                    <template x-for="person in (client.summary?.insured || [])" :key="person.name">
                        <div class="mb-6 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="bg-indigo-50 px-4 py-2 border-b border-indigo-100"><h3 class="font-bold text-indigo-800 text-md">受保人：<span x-text="person.name"></span></h3></div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4">
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-red-400 flex flex-col justify-center">
                                    <div class="text-xs text-gray-500 mb-1">🏥 醫療保障</div>
                                    <div class="text-sm font-bold text-gray-800 leading-relaxed">
                                        <template x-if="person.medicalHighEnd && person.medicalTraditional"><span>1. 高端醫療<br>2. 傳統醫療</span></template>
                                        <template x-if="person.medicalHighEnd && !person.medicalTraditional"><span class="text-lg">高端醫療</span></template>
                                        <template x-if="!person.medicalHighEnd && person.medicalTraditional"><span class="text-lg">傳統醫療</span></template>
                                        <template x-if="!person.medicalHighEnd && !person.medicalTraditional"><span class="text-lg text-gray-400">尚未配置</span></template>
                                    </div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-400">
                                    <div class="text-xs text-gray-500 mb-1">🛡️ 危疾保障 (替代收入)</div>
                                    <div class="text-lg font-bold text-gray-800" x-text="person.ciSum > 0 ? 'HK$ ' + formatNumber(person.ciSum) : '尚未配置'"></div>
                                    <div x-show="person.ciSum > 0" class="text-xs text-red-600 font-bold mt-2 bg-red-50 p-2 rounded border border-red-100 flex items-start gap-1"><i class="fa-solid fa-triangle-exclamation mt-0.5"></i><span>❗ 足夠替代 3 年家庭開支嗎？</span></div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-400">
                                    <div class="text-xs text-gray-500 mb-1">🕊️ 人壽保障 (家庭責任)</div>
                                    <div class="text-lg font-bold text-gray-800" x-text="person.lifeSum > 0 ? 'HK$ ' + formatNumber(person.lifeSum) : '尚未配置'"></div>
                                    <div x-show="person.lifeSum > 0" class="text-xs text-blue-600 font-bold mt-2 bg-blue-50 p-2 rounded border border-blue-100 flex items-start gap-1"><i class="fa-solid fa-triangle-exclamation mt-0.5"></i><span>❗ 萬一有事，能覆蓋房貸及生活費嗎？</span></div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-teal-400 flex flex-col justify-center">
                                    <div class="text-xs text-gray-500 mb-1">🚑 意外保障</div>
                                    <div class="text-sm font-bold text-gray-800" x-show="person.accDeathSum > 0">身故: HK$ <span x-text="formatNumber(person.accDeathSum)"></span></div>
                                    <div class="text-sm font-bold text-gray-800 mt-1" x-show="person.accMedicalSum > 0">醫療: HK$ <span x-text="formatNumber(person.accMedicalSum)"></span></div>
                                    <div class="text-lg font-bold text-gray-400" x-show="person.accDeathSum === 0 && person.accMedicalSum === 0">尚未配置</div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <div>
                    <h2 class="text-lg font-bold theme-blue mb-4"><i class="fa-solid fa-bullseye mr-2"></i>第二層：人生藍圖與財務探索</h2>
                    <div x-data="{ open: false }" class="bg-white rounded-xl shadow-sm border border-gray-100 mb-4 overflow-hidden">
                        <div @click="open = !open" class="p-5 flex justify-between items-center cursor-pointer hover:bg-gray-50 border-l-4 border-orange-400"><h3 class="font-bold text-gray-700 text-base md:text-lg"><i class="fa-solid fa-mug-hot text-orange-500 mr-2"></i>🌅 尊享未來生活與醫療儲備</h3><i class="fa-solid text-gray-400 transition-transform duration-300" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i></div>
                        <div x-show="open" x-transition class="p-5 border-t border-gray-100 bg-gray-50 space-y-4">
                            <div class="bg-white p-3 rounded-lg border border-gray-100"><div class="text-xs text-blue-500 font-bold mb-1">理想退休生活</div><div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaRetireVision || '尚未深入探討。'"></div></div>
                            <div class="bg-white p-3 rounded-lg border border-gray-100"><div class="text-xs text-blue-500 font-bold mb-1">醫療保障安排</div><div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaMedicalVision || '-'"></div></div>
                            <div class="bg-white p-3 rounded-lg border border-gray-100"><div class="text-xs text-blue-500 font-bold mb-1">現有財富增值安排 / 或工具</div><div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaRetireTools || '-'"></div></div>
                            <div class="bg-white p-3 rounded-lg border border-gray-100"><div class="text-xs text-blue-500 font-bold mb-1">規劃安排 / 關注點</div><div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaRetireGap || '-'"></div></div>
                        </div>
                    </div>
                    <div x-data="{ open: false }" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div @click="open = !open" class="p-5 flex justify-between items-center cursor-pointer hover:bg-gray-50 border-l-4 border-green-500"><h3 class="font-bold text-gray-700 text-base md:text-lg"><i class="fa-solid fa-graduation-cap text-green-600 mr-2"></i>🎓 栽培下一代教育基金規劃</h3><i class="fa-solid text-gray-400 transition-transform duration-300" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i></div>
                        <div x-show="open" x-transition class="p-5 border-t border-gray-100 bg-gray-50 space-y-4">
                            <div class="bg-white p-3 rounded-lg border border-gray-100"><div class="text-xs text-green-600 font-bold mb-1">教育目標與期望</div><div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaEduVision || '尚未深入探討。'"></div></div>
                            <div class="bg-white p-3 rounded-lg border border-gray-100"><div class="text-xs text-green-600 font-bold mb-1">為下一代預備或進行中的財富安排</div><div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaEduTools || '-'"></div></div>
                            <div class="bg-white p-3 rounded-lg border border-gray-100"><div class="text-xs text-green-600 font-bold mb-1">方向 / 關注點</div><div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaEduGap || '-'"></div></div>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-bold theme-blue mb-4 border-l-4 border-blue-600 pl-3">保單明細一覽</h2>
                    <div x-data="{ selectedInsured: null, get uniquePersons() { return [...new Set(((client.policies||[]).filter(p=>!p.isCancelled)).map(p => (p.insuredPerson || client.owner || client.name || '未命名').trim()))] } }">
                        <div class="flex flex-wrap gap-2 mb-4">
                            <template x-for="person in uniquePersons" :key="person"><button @click="selectedInsured = (selectedInsured === person ? null : person)" class="px-4 py-2 rounded-lg font-bold transition-all border shadow-sm" :class="selectedInsured === person ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-blue-600 border-blue-200 hover:bg-blue-50'" x-text="person"></button></template>
                        </div>
                        
                        <div x-show="selectedInsured" x-transition>
                            <template x-for="(policy, index) in (client.policies || []).filter(p => !p.isCancelled && (p.insuredPerson || client.owner || client.name || '未命名').trim() === selectedInsured)" :key="index">
                                <div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-4 overflow-hidden">
                                    <div class="bg-blue-50/50 p-4 border-b flex justify-between items-center">
                                        <div><span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold mr-2" x-text="policy.insurer"></span><span class="font-bold text-gray-800">受保人：<span x-text="policy.insuredPerson || client.owner || client.name"></span></span></div>
                                        <div class="text-sm text-gray-500 text-right"><div><span class="text-xs">保單號碼：</span><span class="font-mono font-bold" x-text="policy.policyNo || '-'"></span></div><div><span class="text-xs">生效日：</span><span class="font-mono" x-text="policy.effectDate || '-'"></span></div></div>
                                    </div>
                                    <div class="px-4 py-3 bg-gray-50 flex justify-between items-center border-b border-gray-100" x-data="{ showPremium: false }">
                                        <div class="flex gap-6"><div><span class="text-[10px] text-gray-500 block">保費 (<span x-text="policy.paymentMode === 'Monthly' ? '月繳' : '年繳'"></span>)</span><div class="flex items-center gap-2"><span class="font-mono font-bold text-gray-800" x-text="showPremium ? (policy.premium ? 'HK$ ' + formatNumber(policy.premium) : '-') : '****'"></span><button @click="showPremium = !showPremium" class="text-gray-400 hover:text-blue-600 transition"><i class="fa-solid" :class="showPremium ? 'fa-eye-slash' : 'fa-eye'"></i></button></div></div></div>
                                    </div>
                                    <div class="p-2">
                                        <template x-for="(item, iIndex) in (policy.items || [])">
                                            <div class="p-3 border-b border-gray-100 last:border-0 hover:bg-gray-50">
                                                <div class="flex justify-between items-start mb-2"><div class="flex items-center gap-2"><span x-show="iIndex===0" class="bg-blue-600 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">主</span><span x-show="iIndex>0" class="bg-gray-200 text-gray-600 text-[10px] px-1.5 py-0.5 rounded" x-text="iIndex"></span><div><div class="font-bold text-gray-800 text-sm" x-text="item.name || '未命名'"></div><div class="text-[10px]" :class="getCategoryColor(item.category)" x-text="item.category"></div></div></div><button x-show="item.remarks" @click="clientRemarkModal.text=item.remarks; clientRemarkModal.open=true" class="text-red-500 text-xs bg-red-50 p-1 rounded-full"><i class="fa-solid fa-exclamation px-1"></i></button></div>
                                                <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs text-gray-600 bg-gray-50 p-2 rounded border border-gray-100 mt-1">
                                                    <div><span class="text-gray-400">保額:</span> <span class="font-mono font-bold text-gray-700" x-text="item.sumAssured ? '$'+formatNumber(item.sumAssured) : '-'"></span></div>
                                                    <div><span class="text-gray-400">自付:</span> <span class="font-mono font-bold text-gray-700" x-text="item.deductible ? '$'+formatNumber(item.deductible) : '-'"></span></div>
                                                    <div><span class="text-gray-400">保障期:</span> <span class="font-bold text-gray-700" x-text="item.maturity || '-'"></span></div>
                                                    <div><span class="text-gray-400">供款期:</span> <span class="font-bold text-gray-700" x-text="item.term || '-'"></span></div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div x-show="(client.claimEvents || []).length > 0">
                    <h2 class="text-xl font-bold theme-blue mb-4 border-l-4 border-purple-500 pl-3">理賠紀錄</h2>
                    <div x-data="{ open: false }" class="mb-4 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden relative">
                        <div @click="open = !open" class="p-4 flex justify-between items-center cursor-pointer hover:bg-gray-50 border-l-4 border-purple-500"><h3 class="font-bold text-gray-700"><i class="fa-solid fa-file-medical text-purple-500 mr-2"></i>點擊查看理賠詳情</h3><i class="fa-solid text-gray-400" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i></div>
                        <div x-show="open" x-transition class="p-4 border-t border-gray-100 bg-gray-50 space-y-4">
                            <template x-for="(event, eIndex) in (client.claimEvents || [])" :key="eIndex">
                                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 relative">
                                    <div x-show="event.status === 'Completed'" class="absolute right-[-10px] top-[10px] transform rotate-[15deg] border-2 border-green-500 text-green-500 font-bold px-4 py-1 text-[10px] opacity-30">COMPLETED</div>
                                    <div class="flex justify-between items-start mb-3 border-b border-gray-100 pb-2"><div><h3 class="font-bold text-gray-800" x-text="event.name"></h3><div class="text-xs text-gray-500">立案日期：<span x-text="event.eventDate"></span></div></div><div class="text-right"><div class="text-[10px] text-gray-500">總獲批金額</div><div class="font-bold text-purple-600 font-mono" x-text="'HK$ ' + formatNumber((event.items || []).reduce((s,i)=>s+Number(String(i.amount||0).replace(/,/g, '')),0))"></div></div></div>
                                    <div class="space-y-1"><template x-for="(item, iIndex) in (event.items || [])" :key="iIndex"><div class="flex justify-between text-xs"><div class="text-gray-600"><i class="fa-solid fa-receipt text-gray-300 mr-1"></i><span x-text="item.desc"></span></div><div class="font-mono text-gray-700" x-text="'HK$ ' + formatNumber(item.amount)"></div></div></template></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white border-t p-6 flex justify-between items-center"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-blue-100 text-blue-600 flex items-center justify-center rounded-full text-xl"><i class="fa-solid fa-user-tie"></i></div><div><p class="text-sm font-bold">您的理財顧問</p><p class="text-xs text-gray-500">有問題隨時聯絡</p></div></div><a href="https://wa.me/85253995596" class="bg-[#25D366] text-white font-bold py-3 px-6 rounded-lg shadow-md"><i class="fa-brands fa-whatsapp text-xl mr-2"></i> 查詢</a></div>
            
            <div x-show="clientRemarkModal.open" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75 p-4" x-cloak><div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden relative"><div class="bg-red-500 p-4 text-center"><div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mx-auto text-red-500 text-2xl mb-2"><i class="fa-solid fa-info"></i></div><h3 class="font-bold text-white">保單項目備註</h3></div><div class="p-6"><div class="text-sm text-gray-700 whitespace-pre-line leading-relaxed" x-text="clientRemarkModal.text"></div><button @click="clientRemarkModal.open = false" class="mt-6 w-full bg-gray-100 text-gray-700 font-bold py-3 rounded-xl">關閉</button></div></div></div>
        </div>
    </div>

    <script>
        function dashboardApp() {
            return {
                client: {}, hasData: false, loadingMsg: '載入中...', clientRemarkModal: { open: false, text: '' },
                
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const encodedData = params.get('data');
                    if (encodedData) {
                        try {
                            let jsonStr = decodeURIComponent(atob(encodedData).split('').map(function(c) {
                                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                            }).join(''));
                            this.process(JSON.parse(jsonStr));
                        } catch(e) {
                            this.loadingMsg = "保單報告解析失敗";
                        }
                    } else {
                        this.loadingMsg = "無效的連結";
                    }
                },
                process(data) {
                    this.client = data;
                    if(!this.client.summary || !this.client.summary.insured) this.fallbackSummary();
                    this.hasData = true;
                },
                formatNumber(num) { if (num === null || num === undefined || num === '') return '-'; const n = parseFloat(num.toString().replace(/,/g, '')); return isNaN(n) ? num : n.toLocaleString('en-US'); },
                getCategoryColor(cat) { if (['Medical', 'CI', 'Life', 'Accident', 'AccidentDeath', 'AccidentMedical'].includes(cat)) return 'text-red-500 font-bold'; if (['Savings', 'Fund', 'MPF'].includes(cat)) return 'text-blue-500 font-bold'; return 'text-gray-600 font-bold'; },
                openClientRemark(text) { this.clientRemarkModal.text = text; this.clientRemarkModal.open = true; },
                
                fallbackSummary() {
                    let s = { totalPremium: 0, insured: [] };
                    let personMap = {};
                    if (this.client.policies) {
                        this.client.policies.forEach(p => {
                            if (p.isCancelled) return; 
                            let p_amt = parseFloat(String(p.premium||'').replace(/,/g, '')) || 0; s.totalPremium += (p.paymentMode === 'Monthly' ? (p_amt * 12) : p_amt);
                            let person = (p.insuredPerson && p.insuredPerson.trim()) ? p.insuredPerson.trim() : (this.client.owner ? this.client.owner.trim() : (this.client.name ? this.client.name.trim() : '未命名'));
                            if (!personMap[person]) personMap[person] = { name: person, medicalHighEnd: false, medicalTraditional: false, ciSum: 0, lifeSum: 0, accDeathSum: 0, accMedicalSum: 0 };
                            (p.items || []).forEach(i => {
                                if(!i) return; let amt = parseFloat(String(i.sumAssured||'0').replace(/,/g, '')) || 0; let r = i.remarks || ''; let n = i.name || '';
                                if (i.category === 'Medical') { if (r.includes('高端') || n.includes('高端')) personMap[person].medicalHighEnd = true; else personMap[person].medicalTraditional = true; } 
                                else if (i.category === 'CI') { personMap[person].ciSum += amt; } 
                                else if (i.category === 'Life') { personMap[person].lifeSum += amt; } 
                                else if (i.category === 'AccidentDeath' || (i.category === 'Accident' && !r.includes('費用') && !r.includes('醫療') && !n.includes('費用') && !n.includes('醫療'))) { personMap[person].accDeathSum += amt; }
                                else if (i.category === 'AccidentMedical' || (i.category === 'Accident' && (r.includes('費用') || r.includes('醫療') || n.includes('費用') || n.includes('醫療')))) { personMap[person].accMedicalSum += amt; }
                            });
                        });
                    }
                    s.insured = Object.values(personMap);
                    this.client.summary = s;
                }
            }
        }

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => { 
                navigator.serviceWorker.register('sw.js?v=1.8.1').then(reg => { 
                    reg.onupdatefound = () => { 
                        const worker = reg.installing; 
                        worker.onstatechange = () => { 
                            if (worker.state === 'installed' && navigator.serviceWorker.controller) { 
                                window.location.reload(); 
                            } 
                        }; 
                    }; 
                }); 
            }); 
        }
    </script>
</body>
</html>
