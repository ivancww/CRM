<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的家庭財富與保障報告</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .report-section { border-left: 4px solid #3b82f6; background: #f8fafc; padding: 1rem; margin-bottom: 1rem; border-radius: 0 0.5rem 0.5rem 0; }
        .theme-blue { color: #1E3A8A; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-10">

    <div x-data="dashboardApp()" x-init="init()" x-cloak>
        <div x-show="!hasData" class="fixed inset-0 flex flex-col items-center justify-center bg-white z-50">
            <div x-show="loading" class="text-center">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                <p class="text-gray-600 font-bold" x-text="loadingMsg"></p>
            </div>
            <div x-show="!loading && error" class="text-center p-6 max-w-sm">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto text-red-500 text-3xl mb-4">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
                <p class="text-red-600 font-bold text-lg mb-2" x-text="loadingMsg"></p>
                <p class="text-sm text-gray-400">請聯絡您的保險顧問重新建立專屬連結，或確認雲端資料庫內是否有此 ID 記錄。</p>
            </div>
        </div>

        <div x-show="hasData" class="max-w-4xl mx-auto md:mt-4 md:mb-8 bg-white md:rounded-2xl shadow-2xl overflow-hidden relative border border-gray-200">
            <div class="gradient-bg text-white p-6 md:p-8 flex justify-between items-center">
                <div>
                    <p class="text-blue-200 text-sm mb-1">親愛的 <span x-text="client.owner"></span>：</p>
                    <h1 class="text-2xl md:text-3xl font-bold">您的家庭財富與保障報告</h1>
                </div>
            </div>

            <div class="p-4 md:p-8 space-y-6 bg-gray-50">
                <div class="bg-white rounded-xl shadow-sm border p-4">
                    <h2 class="text-base font-bold text-blue-900 mb-3"><i class="fa-solid fa-shield-cat mr-1"></i> 第一層：四大保障概覽</h2>
                    <div class="text-sm text-gray-600 leading-relaxed">
                        您的智能財富安全防禦機制已建立。以下為從您的私人 Google Sheet 雲端大腦即時撈取回來的保單摘要明細。
                    </div>
                </div>

                <div>
                    <h2 class="text-base font-bold text-[#1E3A8A] mb-3 border-l-4 border-blue-600 pl-2">家族現有保單明細</h2>
                    <div class="space-y-3">
                        <template x-for="policy in (client.policies || [])">
                            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
                                <div class="flex justify-between items-center border-b pb-2 mb-2">
                                    <div>
                                        <span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded font-bold mr-1" x-text="policy.insurer"></span>
                                        <span class="font-bold text-sm text-gray-800">受保人：<span x-text="policy.insuredPerson || client.owner"></span></span>
                                    </div>
                                    <div class="text-right text-xs font-mono text-gray-400" x-text="'保單號碼: ' + (policy.policyNo || '-')"></div>
                                </div>
                                <div class="space-y-2">
                                    <template x-for="item in policy.items">
                                        <div class="bg-gray-50 p-2 rounded text-xs flex justify-between items-center">
                                            <div>
                                                <span class="font-bold text-gray-800" x-text="item.name || '未命名項目'"></span>
                                                <span class="text-[9px] bg-gray-200 text-gray-500 px-1 rounded ml-1" x-text="item.category"></span>
                                            </div>
                                            <div class="text-right font-mono font-bold text-gray-700" x-text="item.sumAssured ? '$' + formatNumber(item.sumAssured) : '-'"></div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="client.remarks" class="bg-amber-50 rounded-xl p-5 border border-amber-200 shadow-sm">
                    <h3 class="font-bold text-amber-800 mb-2 text-xs"><i class="fa-solid fa-clipboard-list mr-1"></i> 專業顧問追蹤及檢視建議</h3>
                    <div class="text-xs text-amber-900 whitespace-pre-line leading-relaxed" x-text="client.remarks"></div>
                    <div x-show="client.remarkDate" class="text-[10px] text-amber-600 mt-2 font-bold">下一次預計檢視日期：<span x-text="client.remarkDate"></span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🎯 這是你專屬的 GAS 網址，已幫你精準填入
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYO6N0HpwDxmZbLomkyDD0DGuBSEbJzJyn9PFPkMRRnFkkLusSPQbHO0DOyh_nzw18qg/exec';

        function dashboardApp() {
            return {
                client: {}, hasData: false, loading: true, error: false, loadingMsg: '正在安全讀取雲端保障檔案...',

                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (id) {
                        // 🌟 實施模糊高容錯比對：去除非數字字元
                        let cleanSearchId = id.toString().replace(/\D/g, '');
                        
                        // 🎯 透過最穩定的 GET 請求傳遞給 GAS 讀取 Google Sheet 數據
                        fetch(`${GOOGLE_SCRIPT_URL}?action=get&id=${cleanSearchId}`)
                        .then(r => r.json())
                        .then(res => {
                            if (res.result === 'success' && res.data) {
                                this.client = res.data;
                                this.hasData = true;
                                this.loading = false;
                            } else {
                                this.showError('搵唔到此家庭保單檔案！');
                            }
                        })
                        .catch(e => {
                            this.showError('連線雲端超時，請重新整理網頁！');
                        });
                    } else {
                        this.showError('無效的專屬報告連結！');
                    }
                },
                showError(msg) { this.loadingMsg = msg; this.loading = false; this.error = true; },
                formatNumber(num) { if (!num) return '-'; return parseFloat(num.toString().replace(/,/g, '')).toLocaleString('en-US'); },
                getCategoryColor(cat) { return 'text-red-500 font-bold'; }
            }
        }
    </script>
</body>
</html>
