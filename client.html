<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>我的保障報告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
    <div x-data="dashboardApp()" x-cloak>
        <div x-show="!hasData" class="text-center p-10" x-text="loadingMsg"></div>
        <div x-show="hasData"> 
            </div>
    </div>
    <script>
        function dashboardApp() {
            return {
                client: {}, hasData: false, loadingMsg: '讀取中...',
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (id) {
                        fetch('https://script.google.com/macros/s/AKfycbzYO6N0HpwDxmZbLomkyDD0DGuBSEbJzJyn9PFPkMRRnFkkLusSPQbHO0DOyh_nzw18qg/exec', {
                            method: 'POST',
                            body: JSON.stringify({ action: 'get', id: id })
                        }).then(r => r.json()).then(res => {
                            if(res.result === 'success') { this.client = res.data; this.hasData = true; }
                            else { this.loadingMsg = "找不到資料"; }
                        });
                    } else { this.loadingMsg = "連結失效"; }
                }
            }
        }
    </script>
</body>
</html>
