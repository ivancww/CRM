<script>
    function app() {
        return {
            version: '1.8.0', // 🌟 強制更新版號
            view: 'list', searchQuery: '', renewalFilter: '', birthdayFilter: '', typeFilter: '', clients: [], client: {}, 
            // ... (請保留原本所有的變數定義: clientRemarkModal, uploadModal 等) ...

            // 🌟 核心：修正生成邏輯，無需 Google Script
            uploadToCloud() {
                this.uploadModal.loading = true;
                this.saveCurrentClient(true);
                try {
                    let d = JSON.parse(JSON.stringify(this.client));
                    d.name = d.owner;
                    // 將資料轉為 Base64 網址安全編碼
                    let base64Data = btoa(encodeURIComponent(JSON.stringify(d)).replace(/%([0-9A-F]{2})/g, (m, p1) => String.fromCharCode('0x' + p1)));
                    this.uploadModal.loading = false;
                    this.uploadModal.open = false;
                    this.generateQRFromData(base64Data);
                } catch(e) { alert('生成失敗'); this.uploadModal.loading = false; }
            },

            generateQRFromData(encodedData) {
                this.qrModal.open = true;
                // 指向同一資料夾下的 client.html
                let url = window.location.origin + window.location.pathname.replace('index.html', '') + 'client.html?data=' + encodedData;
                this.linkModal.url = url;
                
                document.getElementById("qr-loading").style.display = "flex";
                setTimeout(() => { 
                    var qrContainer = document.getElementById("qr-container-hidden");
                    qrContainer.innerHTML = ""; 
                    new QRCode(qrContainer, { text: url, width: 300, height: 300, correctLevel : QRCode.CorrectLevel.L });
                    setTimeout(() => { 
                        const canvas = qrContainer.querySelector('canvas');
                        if (canvas) { 
                            document.getElementById("qr-image-visible").src = canvas.toDataURL("image/png");
                            document.getElementById("qr-image-visible").style.display = 'block';
                            document.getElementById("qr-loading").style.display = "none";
                        } 
                    }, 200); 
                }, 100);
            },
            // ... (保留原本所有其他函數: saveCurrentClient, exportAllData 等) ...
        }
    }

    // 強制更新註冊
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js?v=1.8.0').then(reg => {
                reg.onupdatefound = () => {
                    const worker = reg.installing;
                    worker.onstatechange = () => {
                        if (worker.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
                    };
                };
            });
        });
    }
</script>
