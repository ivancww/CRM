<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        document.title = "保險管家 CRM v2.0.0";
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        /* 馬卡龍色系卡片背景 */
        .macaron-blue { background-color: #EBF8FF; border-color: #BEE3F8; }
        .macaron-purple { background-color: #FAF5FF; border-color: #E9D8FD; }
        .macaron-yellow { background-color: #FEFCBF; border-color: #FAF089; }
        .macaron-green { background-color: #F0FFF4; border-color: #C6F6D5; }
        /* 中央圓盤樣式 */
        .center-circle-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        .center-circle { width: 90px; height: 90px; border-radius: 50%; background: white; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-wrap: wrap; overflow: hidden; }
        .circle-quadrant { width: 50%; height: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; text-align: center; line-height: 1.1; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans pb-20">

    <div x-data="crmApp()" x-init="init()" x-cloak>
        
        <!-- 🌟 頂部導航列 (Navigation Bar) -->
        <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
            <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
                <div class="flex items-center justify-between w-full sm:w-auto">
                    <h1 class="text-lg font-bold flex items-center gap-2">
                        <i class="fa-solid fa-shield-cat text-blue-400"></i> 保險管家
                        <span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded font-mono" x-text="'v' + version"></span>
                    </h1>
                </div>

                <!-- 導航選單 -->
                <div class="flex items-center gap-1 bg-slate-800 p-1 rounded-xl w-full sm:w-auto justify-center text-xs sm:text-sm">
                    <button @click="currentNav = 'protection'" :class="currentNav === 'protection' ? 'bg-blue-600 text-white font-bold' : 'text-gray-300 hover:text-white'" class="px-3 py-2 rounded-lg transition-all">
                        <i class="fa-solid fa-shield-halved mr-1"></i> 人生 4 大保障
                    </button>
                    <button @click="currentNav = 'cashflow'" :class="currentNav === 'cashflow' ? 'bg-blue-600 text-white font-bold' : 'text-gray-300 hover:text-white'" class="px-3 py-2 rounded-lg transition-all">
                        <i class="fa-solid fa-money-bill-trend-up mr-1"></i> 人生理財現金流
                    </button>
                    <button @click="tryAccessAdmin()" :class="currentNav === 'admin' ? 'bg-amber-600 text-white font-bold' : 'text-amber-400 hover:text-amber-300'" class="px-3 py-2 rounded-lg transition-all">
                        <i class="fa-solid fa-user-gear mr-1"></i> 後台管理
                    </button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto p-4 max-w-5xl">

            <!-- 🌟 客戶搜尋選擇橫幅 (適用於前台頁面) -->
            <div x-show="currentNav !== 'admin'" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <i class="fa-solid fa-user-check text-blue-600 text-xl"></i>
                    <span class="font-bold text-gray-700 whitespace-nowrap">目前檢視客戶：</span>
                    <select x-model="selectedClientId" @change="loadClientData()" class="border-2 border-blue-100 rounded-xl p-2 text-sm font-bold text-gray-800 bg-blue-50/50 outline-none w-full sm:w-64 focus:border-blue-400">
                        <option value="">-- 請選擇客戶 --</option>
                        <template x-for="c in clients" :key="c.id">
                            <option :value="c.id" x-text="c.owner || '未命名客戶'"></option>
                        </template>
                    </select>
                </div>
                <div x-show="client.owner" class="text-xs text-gray-500 font-bold flex items-center gap-3">
                    <span><i class="fa-solid fa-cake-candles text-pink-400 mr-1"></i>生日：<span x-text="client.dob || '-'"></span></span>
                    <span><i class="fa-solid fa-child text-green-500 mr-1"></i>小朋友：<span x-text="client.children || '0'"></span></span>
                </div>
            </div>

            <!-- ==================== 頁面 1：人生 4 大保障 (馬卡龍色卡片) ==================== -->
            <div x-show="currentNav === 'protection'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                <template x-if="!selectedClientId">
                    <div class="text-center py-16 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-300">
                        <i class="fa-solid fa-hand-pointer text-4xl mb-3 opacity-40"></i>
                        <p class="font-bold">請於上方選擇客戶，以檢視其人生 4 大保障報告</p>
                    </div>
                </template>

                <template x-if="selectedClientId">
                    <div>
                        <p class="text-gray-500 text-sm mb-6 text-center">客觀檢視現有防護網，確保在突發情況下家庭財務依然穩健安寧。</p>
                        
                        <template x-for="person in protectionSummary.insured" :key="person.name">
                            <div class="mb-10">
                                <h3 class="font-bold text-slate-800 text-lg mb-4 border-l-4 border-blue-600 pl-3">受保人：<span x-text="person.name"></span></h3>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative">
                                    <!-- 中央圓盤 -->
                                    <div class="hidden md:block center-circle-container">
                                        <div class="center-circle">
                                            <div class="circle-quadrant bg-blue-100 text-blue-800">人壽</div>
                                            <div class="circle-quadrant bg-purple-100 text-purple-800">危疾</div>
                                            <div class="circle-quadrant bg-yellow-100 text-yellow-800">意外</div>
                                            <div class="circle-quadrant bg-green-100 text-green-800 text-[8px]">實報實銷<br>醫療</div>
                                        </div>
                                    </div>

                                    <!-- 1. 人壽保障 (藍色馬卡龍) -->
                                    <div x-data="{ showDetails: false }" class="macaron-blue p-5 rounded-2xl border-2 shadow-sm transition hover:shadow-md">
                                        <div class="flex justify-between items-center mb-3 cursor-pointer" @click="showDetails = !showDetails">
                                            <h4 class="font-bold text-blue-900 text-base">🕊️ 人壽保障</h4>
                                            <button class="text-xs font-bold text-blue-700 bg-white/80 px-2.5 py-1 rounded-lg border border-blue-200 shadow-sm">
                                                <span x-text="showDetails ? '隱藏明細' : '查看明細'"></span>
                                                <i class="fa-solid ml-1" :class="showDetails ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                            </button>
                                        </div>
                                        
                                        <!-- 🌟 提問/請教語句 -->
                                        <div class="bg-white/80 p-3 rounded-xl border border-blue-200 text-xs text-blue-900 font-bold mb-4 leading-relaxed shadow-inner">
                                            <i class="fa-solid fa-circle-question text-blue-500 mr-1"></i>
                                            查詢一下，萬一遭遇不測，現有的人壽保障是否足夠支持家人的長期生活開支及清還剩餘樓價房貸？
                                        </div>

                                        <div class="border-t border-blue-200/60 pt-3 mb-2 flex justify-between items-center text-sm font-bold text-slate-800">
                                            <span>身故保障總額</span>
                                            <span class="text-blue-700 font-mono text-base">HK$<span x-text="formatNumber(person.lifeSum)"></span></span>
                                        </div>

                                        <div x-show="showDetails" x-transition class="mt-3 pt-3 border-t border-dashed border-blue-300 space-y-2">
                                            <template x-for="(pol, i) in person.lifeDetails" :key="i">
                                                <div class="bg-white p-3 rounded-xl border border-blue-100 shadow-sm text-xs">
                                                    <div class="flex justify-between font-bold text-gray-700 mb-1">
                                                        <span x-text="pol.insurer || '保險公司'"></span>
                                                        <span x-text="pol.premium ? 'HK$ ' + formatNumber(pol.premium) + (pol.paymentMode==='Monthly'?'/月':'/年') : '-'"></span>
                                                    </div>
                                                    <template x-for="(item, idx) in pol.items" :key="idx">
                                                        <div class="flex justify-between text-gray-600 mt-1">
                                                            <span x-text="item.name"></span>
                                                            <span class="font-mono font-bold" x-text="'HK$ ' + formatNumber(item.sumAssured)"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- 2. 危疾保障 (紫色馬卡龍) -->
                                    <div x-data="{ showDetails: false }" class="macaron-purple p-5 rounded-2xl border-2 shadow-sm transition hover:shadow-md">
                                        <div class="flex justify-between items-center mb-3 cursor-pointer" @click="showDetails = !showDetails">
                                            <h4 class="font-bold text-purple-900 text-base">🛡️ 危疾保障</h4>
                                            <button class="text-xs font-bold text-purple-700 bg-white/80 px-2.5 py-1 rounded-lg border border-purple-200 shadow-sm">
                                                <span x-text="showDetails ? '隱藏明細' : '查看明細'"></span>
                                                <i class="fa-solid ml-1" :class="showDetails ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                            </button>
                                        </div>
                                        
                                        <!-- 🌟 提問/請教語句 -->
                                        <div class="bg-white/80 p-3 rounded-xl border border-purple-200 text-xs text-purple-900 font-bold mb-4 leading-relaxed shadow-inner">
                                            <i class="fa-solid fa-circle-question text-purple-500 mr-1"></i>
                                            請教一下，現有的危疾保障，是否足夠支持患病休養期間至少 3 年的家庭基本生活費？
                                        </div>

                                        <div class="border-t border-purple-200/60 pt-3 mb-2 flex justify-between items-center text-sm font-bold text-slate-800">
                                            <span>危疾保障總額</span>
                                            <span class="text-purple-700 font-mono text-base">HK$<span x-text="formatNumber(person.ciSum)"></span></span>
                                        </div>

                                        <div x-show="showDetails" x-transition class="mt-3 pt-3 border-t border-dashed border-purple-300 space-y-2">
                                            <template x-for="(pol, i) in person.ciDetails" :key="i">
                                                <div class="bg-white p-3 rounded-xl border border-purple-100 shadow-sm text-xs">
                                                    <div class="flex justify-between font-bold text-gray-700 mb-1">
                                                        <span x-text="pol.insurer"></span>
                                                        <span x-text="pol.premium ? 'HK$ ' + formatNumber(pol.premium) : '-'"></span>
                                                    </div>
                                                    <template x-for="(item, idx) in pol.items" :key="idx">
                                                        <div class="flex justify-between text-gray-600 mt-1">
                                                            <span x-text="item.name"></span>
                                                            <span class="font-mono font-bold" x-text="'HK$ ' + formatNumber(item.sumAssured)"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- 3. 意外保障 (黃色馬卡龍) -->
                                    <div x-data="{ showDetails: false }" class="macaron-yellow p-5 rounded-2xl border-2 shadow-sm transition hover:shadow-md">
                                        <div class="flex justify-between items-center mb-3 cursor-pointer" @click="showDetails = !showDetails">
                                            <h4 class="font-bold text-yellow-900 text-base">🚑 意外保障</h4>
                                            <button class="text-xs font-bold text-yellow-800 bg-white/80 px-2.5 py-1 rounded-lg border border-yellow-300 shadow-sm">
                                                <span x-text="showDetails ? '隱藏明細' : '查看明細'"></span>
                                                <i class="fa-solid ml-1" :class="showDetails ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                            </button>
                                        </div>
                                        
                                        <div class="bg-white/80 p-3 rounded-xl border border-yellow-300 text-xs text-yellow-900 font-bold mb-4 leading-relaxed shadow-inner">
                                            <i class="fa-solid fa-shield text-yellow-600 mr-1"></i>
                                            涵蓋日常門診跌打、意外住院醫療及突發身故/斷肢賠償。
                                        </div>

                                        <div class="border-t border-yellow-300/60 pt-3 mb-2 flex justify-between items-center text-sm font-bold text-slate-800">
                                            <span>身故/醫療總保額</span>
                                            <span class="text-yellow-800 font-mono text-base">HK$<span x-text="formatNumber(person.accDeathSum + person.accMedicalSum)"></span></span>
                                        </div>

                                        <div x-show="showDetails" x-transition class="mt-3 pt-3 border-t border-dashed border-yellow-400 space-y-2">
                                            <template x-for="(pol, i) in person.accDetails" :key="i">
                                                <div class="bg-white p-3 rounded-xl border border-yellow-200 shadow-sm text-xs">
                                                    <template x-for="(item, idx) in pol.items" :key="idx">
                                                        <div class="flex justify-between text-gray-700 font-bold mt-1">
                                                            <span x-text="item.name"></span>
                                                            <span class="font-mono" x-text="'HK$ ' + formatNumber(item.sumAssured)"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- 4. 醫療保障 (綠色馬卡龍) -->
                                    <div x-data="{ showDetails: false }" class="macaron-green p-5 rounded-2xl border-2 shadow-sm transition hover:shadow-md">
                                        <div class="flex justify-between items-center mb-3 cursor-pointer" @click="showDetails = !showDetails">
                                            <div class="flex items-center gap-2">
                                                <h4 class="font-bold text-green-900 text-base">🏥 醫療保障</h4>
                                                <span class="text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm" :class="person.medicalHighEnd ? 'bg-red-100 text-red-700' : 'bg-green-200 text-green-800'" x-text="person.medicalHighEnd ? '高端大額':'傳統實報'"></span>
                                            </div>
                                            <button class="text-xs font-bold text-green-800 bg-white/80 px-2.5 py-1 rounded-lg border border-green-300 shadow-sm">
                                                <span x-text="showDetails ? '隱藏明細' : '查看明細'"></span>
                                                <i class="fa-solid ml-1" :class="showDetails ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                            </button>
                                        </div>
                                        
                                        <div class="bg-white/80 p-3 rounded-xl border border-green-300 text-xs text-green-900 font-bold mb-4 leading-relaxed shadow-inner">
                                            <i class="fa-solid fa-hospital-user text-green-600 mr-1"></i>
                                            <span x-text="person.medicalHighEnd ? '已配置高端醫療，全數賠償私家醫院醫療費用。' : '現為傳統分項限額醫療，需留意大型手術的自付缺口。'"></span>
                                        </div>

                                        <div class="border-t border-green-300/60 pt-3 mb-2 flex justify-between items-center text-sm font-bold text-slate-800">
                                            <span>醫療賠償模式</span>
                                            <span class="text-green-800 font-bold text-sm" x-text="person.medicalHighEnd ? '全數賠償 (無分項限制)' : '按分項上限實報實銷'"></span>
                                        </div>

                                        <div x-show="showDetails" x-transition class="mt-3 pt-3 border-t border-dashed border-green-400 space-y-2">
                                            <template x-for="(pol, i) in person.medDetails" :key="i">
                                                <div class="bg-white p-3 rounded-xl border border-green-200 shadow-sm text-xs">
                                                    <template x-for="(item, idx) in pol.items" :key="idx">
                                                        <div class="flex justify-between text-gray-700 font-bold mt-1">
                                                            <span x-text="item.name"></span>
                                                            <span class="font-mono text-green-700" x-text="item.sumAssured ? '上限: HK$ '+formatNumber(item.sumAssured) : '全數賠償'"></span>
                                                        </div>
                                                    </template>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>

            <!-- ==================== 頁面 2：人生理財現金流 (3 大卡片) ==================== -->
            <div x-show="currentNav === 'cashflow'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                <template x-if="!selectedClientId">
                    <div class="text-center py-16 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-300">
                        <i class="fa-solid fa-hand-pointer text-4xl mb-3 opacity-40"></i>
                        <p class="font-bold">請於上方選擇客戶，以檢視其理財現金流藍圖</p>
                    </div>
                </template>

                <template x-if="selectedClientId">
                    <div class="space-y-6">
                        
                        <!-- 卡片 1：退休生活規劃 -->
                        <div class="bg-white rounded-2xl shadow-sm border border-orange-200 overflow-hidden">
                            <div class="p-5 border-l-8 border-orange-500 bg-orange-50/40">
                                <h3 class="font-bold text-orange-900 text-lg flex items-center gap-2">
                                    <i class="fa-solid fa-mug-hot text-orange-500"></i> 1. 理想退休生活規劃
                                </h3>
                                <p class="text-xs text-orange-700/80 mt-1 font-bold">請教一下，如果俾您自由設計，您心目中理想嘅退休生活藍圖會係點樣？</p>
                            </div>
                            <div class="p-5 bg-gray-50/50">
                                <div class="bg-white p-4 rounded-xl border border-gray-200 text-sm text-gray-700 leading-relaxed whitespace-pre-line shadow-sm" x-text="client.fnaRetireVision || '尚未錄入退休生活願景。'"></div>
                            </div>
                        </div>

                        <!-- 卡片 2：退休後醫保安排 -->
                        <div class="bg-white rounded-2xl shadow-sm border border-teal-200 overflow-hidden">
                            <div class="p-5 border-l-8 border-teal-500 bg-teal-50/40">
                                <h3 class="font-bold text-teal-900 text-lg flex items-center gap-2">
                                    <i class="fa-solid fa-hospital-user text-teal-500"></i> 2. 退休後醫療保障安排
                                </h3>
                                <p class="text-xs text-teal-700/80 mt-1 font-bold">退休後失去公司醫保，現有的個人醫保是否足夠隨年齡增長而持續供款？</p>
                            </div>
                            <div class="p-5 bg-gray-50/50">
                                <div class="bg-white p-4 rounded-xl border border-gray-200 text-sm text-gray-700 leading-relaxed whitespace-pre-line shadow-sm" x-text="client.fnaMedicalVision || '尚未錄入退休後醫保規劃。'"></div>
                            </div>
                        </div>

                        <!-- 卡片 3：仔女教育基金 (可顯示或隱藏) -->
                        <div x-show="client.children && client.children !== '0'" class="bg-white rounded-2xl shadow-sm border border-green-200 overflow-hidden" x-transition x-cloak>
                            <div class="p-5 border-l-8 border-green-500 bg-green-50/40 flex justify-between items-center">
                                <div>
                                    <h3 class="font-bold text-green-900 text-lg flex items-center gap-2">
                                        <i class="fa-solid fa-graduation-cap text-green-600"></i> 3. 仔女教育基金藍圖
                                    </h3>
                                    <p class="text-xs text-green-700/80 mt-1 font-bold">傾向在本地定海外發展？預算目標與現有準備進度如何？</p>
                                </div>
                            </div>
                            <div class="p-5 bg-gray-50/50">
                                <div class="bg-white p-4 rounded-xl border border-gray-200 text-sm text-gray-700 leading-relaxed whitespace-pre-line shadow-sm" x-text="client.fnaEduVision || '尚未錄入教育基金訪談細節。'"></div>
                            </div>
                        </div>

                    </div>
                </template>
            </div>

            <!-- ==================== 頁面 3：後台管理系統 (密碼鎖 0903 + 一頁顯示全部) ==================== -->
            <div x-show="currentNav === 'admin'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                
                <div class="bg-white rounded-2xl shadow-md border border-slate-200 p-6 mb-8">
                    <div class="flex flex-col sm:flex-row justify-between items-center pb-4 border-b border-gray-100 mb-6 gap-4">
                        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-sliders text-amber-500"></i> 一頁式客戶資料編輯與管理
                        </h2>
                        <div class="flex gap-2 w-full sm:w-auto">
                            <button @click="saveCurrentClient(false)" class="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-bold shadow transition">
                                <i class="fa-solid fa-floppy-disk mr-1"></i> 儲存並返回
                            </button>
                            <button @click="saveCurrentClient(true)" class="flex-1 sm:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-sm font-bold shadow transition">
                                <i class="fa-solid fa-cloud-arrow-up mr-1"></i> 雲端同步
                            </button>
                        </div>
                    </div>

                    <!-- 1. 基本個人資料 -->
                    <div class="mb-8">
                        <h3 class="font-bold text-slate-700 text-md mb-3 border-l-4 border-slate-600 pl-2">基本資料</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">客戶姓名 / 持有人</label>
                                <input type="text" x-model="client.owner" class="w-full border rounded-lg p-2 text-sm bg-white outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">出生日期</label>
                                <input type="date" x-model="client.dob" class="w-full border rounded-lg p-2 text-sm bg-white outline-none focus:border-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">小朋友數目 (選擇 >0 即自動顯示教育基金卡片)</label>
                                <select x-model="client.children" class="w-full border rounded-lg p-2 text-sm bg-white outline-none focus:border-blue-500">
                                    <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4+">4+</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 2. 人生 4 大保障 (卡片式連續輸入) -->
                    <div class="mb-8">
                        <h3 class="font-bold text-slate-700 text-md mb-3 border-l-4 border-blue-500 pl-2">人生 4 大保障資料 (卡片式呈現)</h3>
                        <div class="space-y-4">
                            <template x-for="cat in [
                                { id: 'Life', name: '人壽保障', icon: '🕊️' },
                                { id: 'CI', name: '危疾保障', icon: '🛡️' },
                                { id: 'Accident', name: '意外保障', icon: '🚑' },
                                { id: 'Medical', name: '醫療保障', icon: '🏥' }
                            ]">
                                <div class="border rounded-xl p-4 bg-gray-50/50">
                                    <div class="flex justify-between items-center mb-3">
                                        <h4 class="font-bold text-gray-800 text-sm" x-text="cat.icon + ' ' + cat.name"></h4>
                                        <button @click="addSpecificPolicy(cat.id)" class="text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg border border-blue-200 transition">+ 新增保單卡片</button>
                                    </div>

                                    <template x-for="(policy, pIndex) in client.policies" :key="pIndex">
                                        <div x-show="isMatchingCategory(policy, cat.id) && !policy.isCancelled" class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mb-3 relative">
                                            <button @click="removePolicy(pIndex)" class="absolute top-3 right-3 text-gray-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                                            
                                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-3">
                                                <div><label class="block text-[10px] text-gray-400 font-bold">受保人</label><input type="text" x-model="policy.insuredPerson" class="w-full border-b text-xs font-bold p-1 outline-none"></div>
                                                <div><label class="block text-[10px] text-gray-400 font-bold">保險公司</label><input type="text" x-model="policy.insurer" class="w-full border-b text-xs p-1 outline-none"></div>
                                                <div><label class="block text-[10px] text-gray-400 font-bold">保費 (HK$)</label><input type="text" x-model="policy.premium" @input="policy.premium = formatInput($event.target.value)" class="w-full border-b text-xs p-1 outline-none"></div>
                                                <div><label class="block text-[10px] text-gray-400 font-bold">繳費模式</label><select x-model="policy.paymentMode" class="w-full border-b text-xs p-1 outline-none"><option value="Yearly">年繳</option><option value="Monthly">月繳</option></select></div>
                                            </div>

                                            <!-- 細項 -->
                                            <template x-for="(item, iIndex) in policy.items" :key="iIndex">
                                                <div class="bg-gray-50 p-2 rounded-lg text-xs grid grid-cols-3 gap-2 mt-2">
                                                    <div class="col-span-3 flex justify-between">
                                                        <span class="font-bold text-blue-600" x-text="iIndex===0?'[主約]':'[附約]'"></span>
                                                        <input type="text" x-model="item.name" placeholder="產品名稱" class="flex-1 border-b mx-2 bg-transparent outline-none font-bold">
                                                    </div>
                                                    <div><label class="block text-[9px] text-gray-400">保額(HK$)</label><input type="text" x-model="item.sumAssured" @input="item.sumAssured = formatInput($event.target.value)" class="w-full border p-1 rounded bg-white"></div>
                                                    <div><label class="block text-[9px] text-gray-400">供款期</label><input type="text" x-model="item.term" placeholder="例如: 25年" class="w-full border p-1 rounded bg-white"></div>
                                                    <div><label class="block text-[9px] text-gray-400">保障期</label><input type="text" x-model="item.maturity" placeholder="例如: 終身" class="w-full border p-1 rounded bg-white"></div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- 3. 未來現金流大框輸入 -->
                    <div>
                        <h3 class="font-bold text-slate-700 text-md mb-3 border-l-4 border-amber-500 pl-2">人生現金流對答記錄</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-orange-900 mb-1">1. 退休生活規劃文字紀錄</label>
                                <textarea x-model="client.fnaRetireVision" rows="3" class="w-full border rounded-xl p-3 text-xs bg-slate-50 outline-none focus:bg-white focus:border-orange-400" placeholder="輸入客人的退休生活期望、被動收入安排..."></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-teal-900 mb-1">2. 退休後醫保安排文字紀錄</label>
                                <textarea x-model="client.fnaMedicalVision" rows="3" class="w-full border rounded-xl p-3 text-xs bg-slate-50 outline-none focus:bg-white focus:border-teal-400" placeholder="輸入客人的退休醫保安排、自付額打算..."></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-green-900 mb-1">3. 仔女教育基金藍圖文字紀錄</label>
                                <textarea x-model="client.fnaEduVision" rows="3" class="w-full border rounded-xl p-3 text-xs bg-slate-50 outline-none focus:bg-white focus:border-green-400" placeholder="輸入客人的子女升學期望、預算目標..."></textarea>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-1AkUDr7fL8digJDaCRiTliAeWikk8-XsXznXKHvBYQ5nP8vim7iq_N4FR1mp-RHp/exec';
        
        function crmApp() {
            return {
                ADMIN_SECRET_KEY: '0903',
                version: '2.0.0',
                currentNav: 'protection', // protection | cashflow | admin
                selectedClientId: '',
                clients: [],
                client: {},
                
                init() {
                    const saved = localStorage.getItem('crm_db_v8');
                    if (saved) { 
                        this.clients = JSON.parse(saved); 
                        if(this.clients.length > 0) {
                            this.selectedClientId = this.clients[0].id;
                            this.loadClientData();
                        }
                    }
                    
                    // 雲端同步全庫
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'get', id: 'ALL', adminKey: this.ADMIN_SECRET_KEY })
                    })
                    .then(r => r.json())
                    .then(res => {
                        if (res.status === 'success' && Array.isArray(res.data)) {
                            this.clients = res.data;
                            this.saveDB();
                            if(!this.selectedClientId && this.clients.length > 0) {
                                this.selectedClientId = this.clients[0].id;
                                this.loadClientData();
                            }
                        }
                    }).catch(e => console.error('雲端讀取失敗', e));
                },

                // 密碼保護存取後台
                tryAccessAdmin() {
                    if (this.currentNav === 'admin') return;
                    let pass = prompt("請輸入管理員密碼：");
                    if (pass === this.ADMIN_SECRET_KEY) {
                        this.currentNav = 'admin';
                    } else if (pass !== null) {
                        alert("密碼錯誤，拒絕進入！");
                    }
                },

                loadClientData() {
                    if(!this.selectedClientId) { this.client = {}; return; }
                    const found = this.clients.find(c => String(c.id) === String(this.selectedClientId));
                    if(found) {
                        this.client = JSON.parse(JSON.stringify(found));
                    }
                },

                formatNumber(num) { if (num === null || num === undefined || num === '') return '0'; const n = parseFloat(num.toString().replace(/,/g, '')); return isNaN(n) ? num : n.toLocaleString('en-US'); },
                formatInput(v) { if (!v) return ''; let str = String(v).replace(/[^0-9.]/g, ''); let parts = str.split('.'); if (parts.length > 2) { parts[1] = parts.slice(1).join(''); parts.length = 2; } parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ","); return parts.length > 1 ? parts[0] + '.' + parts[1] : parts[0]; },

                isMatchingCategory(policy, catId) {
                    if (!policy.items || policy.items.length === 0) return false;
                    const mainCat = policy.items[0].category;
                    if (catId === 'Life') return mainCat === 'Life';
                    if (catId === 'CI') return mainCat === 'CI';
                    if (catId === 'Accident') return ['Accident', 'AccidentDeath', 'AccidentMedical'].includes(mainCat);
                    if (catId === 'Medical') return mainCat === 'Medical';
                    return false;
                },

                get protectionSummary() {
                    let summary = { insured: [] };
                    if (!this.client || !this.client.policies) return summary;
                    let personMap = {};
                    
                    this.client.policies.forEach(p => {
                        if(p.isCancelled) return;
                        let person = (p.insuredPerson && p.insuredPerson.trim()) ? p.insuredPerson.trim() : (this.client.owner ? this.client.owner.trim() : '未命名');
                        
                        if (!personMap[person]) {
                            personMap[person] = { 
                                name: person, 
                                lifeSum: 0, lifeDetails: [],
                                ciSum: 0, ciDetails: [],
                                accDeathSum: 0, accMedicalSum: 0, accDetails: [],
                                medicalHighEnd: false, medicalTraditional: false, medDetails: []
                            };
                        }

                        let hasLife = false, hasCI = false, hasAcc = false, hasMed = false;
                        let lifeItems = [], ciItems = [], accItems = [], medItems = [];

                        (p.items || []).forEach(i => {
                            if(!i) return;
                            let amt = parseFloat(String(i.sumAssured||'0').replace(/,/g, '')) || 0; 
                            
                            if (i.category === 'Life') { hasLife = true; personMap[person].lifeSum += amt; lifeItems.push(i); }
                            else if (i.category === 'CI') { hasCI = true; personMap[person].ciSum += amt; ciItems.push(i); }
                            else if (['AccidentDeath', 'AccidentMedical', 'Accident'].includes(i.category)) { 
                                hasAcc = true; 
                                if(i.category === 'AccidentMedical') personMap[person].accMedicalSum += amt; else personMap[person].accDeathSum += amt; 
                                accItems.push(i); 
                            }
                            else if (i.category === 'Medical') { 
                                hasMed = true; 
                                if(i.medicalType === '高端' || (i.name && i.name.includes('高端'))) personMap[person].medicalHighEnd = true; else personMap[person].medicalTraditional = true; 
                                medItems.push(i);
                            }
                        });

                        if(hasLife) personMap[person].lifeDetails.push({ insurer: p.insurer, premium: p.premium, paymentMode: p.paymentMode, items: lifeItems });
                        if(hasCI) personMap[person].ciDetails.push({ insurer: p.insurer, premium: p.premium, items: ciItems });
                        if(hasAcc) personMap[person].accDetails.push({ insurer: p.insurer, premium: p.premium, items: accItems });
                        if(hasMed) personMap[person].medDetails.push({ insurer: p.insurer, premium: p.premium, items: medItems });
                    }); 
                    summary.insured = Object.values(personMap); 
                    return summary;
                },

                saveDB() { localStorage.setItem('crm_db_v8', JSON.stringify(this.clients)); },

                saveCurrentClient(stay) { 
                    if (!this.client.id) this.client.id = Date.now();
                    if (!this.clients) this.clients = [];
                    
                    const idx = this.clients.findIndex(c => String(c.id) === String(this.client.id));
                    if (idx > -1) this.clients[idx] = this.client; else this.clients.push(this.client);
                    this.saveDB();
                    this.selectedClientId = this.client.id;
                    
                    let d = JSON.parse(JSON.stringify(this.client)); d.name = d.owner;
                    const finalPayload = { forceId: String(this.client.id), action: 'update', payload: JSON.stringify(d), adminKey: this.ADMIN_SECRET_KEY };
                    
                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(finalPayload) })
                    .then(r=>r.json()).then(res=>{
                        if(stay) alert('已成功同步至雲端！');
                    }).catch(e => console.error(e));
                    
                    if(!stay) { this.currentNav = 'protection'; window.scrollTo(0,0); }
                },

                addSpecificPolicy(catId) {
                    if(!this.client.policies) this.client.policies = [];
                    let defaultCat = catId === 'Accident' ? 'AccidentDeath' : catId;
                    this.client.policies.push({
                        insurer: '', insuredPerson: this.client.owner || '', paymentMode: 'Yearly', premium: '', effectDate: '', isCancelled: false,
                        items: [{ category: defaultCat, name: '', sumAssured: '', term: '', maturity: '' }]
                    });
                },
                removePolicy(i) { if(confirm('確定刪除此保單卡片？')) this.client.policies.splice(i,1); }
            }
        }
    </script>
</body>
</html>
