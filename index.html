<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        document.title = "保險管家 v1.9.9 (Admin - Cloud)";
        document.write('<link rel="manifest" href="manifest-admin.json"><link rel="icon" type="image/png" href="admin-logo-192.png"><link rel="apple-touch-icon" href="admin-logo-192.png">');
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .gold-alert { background: linear-gradient(135deg, #fff7e6 0%, #ffecb3 100%); border: 2px solid #ffc107 !important; animation: pulse 2s infinite; }
        input::-webkit-calendar-picker-indicator { opacity: 100; color: #888; }
        .policy-cancelled { opacity: 0.85; background-color: #f9fafb !important; border-color: #d1d5db !important; }
        .theme-blue { color: #1E3A8A; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        /* 針對中央圓盤的樣式 */
        .center-circle-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        .center-circle { width: 100px; height: 100px; border-radius: 50%; background: white; border: 6px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; overflow: hidden; }
        .circle-quadrant { width: 50%; height: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; text-align: center; line-height: 1.2; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <div x-data="app()" x-cloak>
        <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-lg font-bold cursor-pointer" @click="view = 'list'"><i class="fa-solid fa-cloud mr-2"></i>保險管家<span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded ml-1" x-text="'v' + version"></span></h1>
          
                <div class="flex items-center gap-2">
                    <div x-show="view === 'list'" class="flex gap-2">
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-database"></i></button>
                            <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded shadow-xl z-50 text-gray-800 overflow-hidden" x-cloak>
                                <a href="#" @click.prevent="exportAllData(); open = false" class="block px-4 py-3 hover:bg-gray-100 text-sm border-b">備份全部</a>
                                <label class="block px-4 py-3 hover:bg-gray-100 text-sm cursor-pointer mb-0 relative">還原備份並同步<input type="file" @change="importAllData($event); open = false" accept=".json, application/json" class="absolute w-full h-full top-0 left-0 opacity-0 cursor-pointer"></label>
                            </div>
                        </div>
                        <button @click="createNewClient()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div x-show="view === 'detail'" class="flex gap-2">
                        <button @click="saveCurrentClient();" class="bg-gray-600 hover:bg-gray-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-arrow-left"></i> 儲存返回</button>
                        <button @click="updateSummary(); view = 'review'; window.scrollTo(0,0);" class="bg-indigo-600 hover:bg-indigo-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-desktop"></i> 檢視報告</button>
                    </div>
                </div>
            </div>
        </nav>
  
        <div class="container mx-auto p-4 max-w-5xl">
            <!-- 列表視圖 -->
            <div x-show="view === 'list'" x-transition>
                <div class="mb-4 flex flex-col md:flex-row gap-2">
                    <div class="relative flex-1"><i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i><input type="text" x-model="searchQuery" class="w-full p-3 pl-10 rounded-lg border shadow-sm focus:ring-2 focus:ring-blue-400" placeholder="搜尋客戶、電話..."></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="(c, index) in filteredClients" :key="c.id || index">
                        <div @click="openClient(c)" class="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-md transition border-l-4 border-blue-500 relative group">
                            <div class="font-bold text-lg flex items-center text-gray-800"><span class="text-sm font-bold mr-2 text-blue-500" x-text="(index + 1) + '.'"></span><span x-text="c.owner || '未命名'"></span></div>
                            <div class="text-sm text-gray-500 mt-1"><i class="fa-solid fa-cake-candles mr-1"></i> <span x-text="c.dob || '未提供生日'"></span></div>
                            <div class="text-xs text-gray-400 mt-2">有效保單: <span x-text="(c.policies || []).filter(p=>!p.isCancelled).length"></span></div>
                            <button @click.stop="permanentDeleteClient(c.id)" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </template>
                </div>
            </div>

            <!-- 客戶詳情輸入視圖 (極簡重構版) -->
            <div x-show="view === 'detail'" x-transition x-cloak>
                
                <!-- 1. 個人資料 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
                    <h2 class="text-lg font-bold mb-4 text-gray-800 border-l-4 border-blue-500 pl-3">基本資料</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-1 text-gray-600">持有人 / 名</label>
                            <input type="text" x-model="client.owner" @blur="client.owner = formatName(client.owner)" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-gray-600">出生日期 <span x-show="client.dob" class="text-xs font-normal text-gray-400" x-text="'(' + getAge(client.dob) + '歲)'"></span></label>
                            <input type="date" x-model="client.dob" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-gray-600">家庭狀況</label>
                            <select x-model="client.marital" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-400 outline-none"><option value="Single">未婚</option><option value="Married">已婚</option></select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-gray-600">小朋友數目</label>
                            <select x-model="client.children" class="w-full border border-gray-200 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-400 outline-none"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4+">4+</option></select>
                        </div>
                    </div>
                </div>

                <!-- 2. 人生 4 大保障 (分類輸入) -->
                <h2 class="text-xl font-bold mb-4 text-gray-800"><i class="fa-solid fa-shield-halved text-blue-600 mr-2"></i>人生 4 大保障</h2>
                <div class="space-y-4 mb-8">
                    
                    <!-- 迴圈渲染 4 大類別 -->
                    <template x-for="cat in [
                        { id: 'Life', name: '人壽保障', icon: '🕊️', color: 'blue' },
                        { id: 'CI', name: '危疾保障', icon: '🛡️', color: 'purple' },
                        { id: 'Accident', name: '意外保障', icon: '🚑', color: 'yellow' },
                        { id: 'Medical', name: '醫療保障', icon: '🏥', color: 'green' }
                    ]">
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden" x-data="{ open: false }">
                            <div @click="open = !open" class="p-4 cursor-pointer flex justify-between items-center hover:bg-gray-50 transition-colors border-l-4" :class="'border-' + cat.color + '-500 bg-' + cat.color + '-50/30'">
                                <div class="flex items-center gap-2">
                                    <span class="text-xl" x-text="cat.icon"></span>
                                    <h3 class="font-bold text-lg text-gray-800" x-text="cat.name"></h3>
                                    <!-- 計算此類別保單數 -->
                                    <span class="ml-2 bg-white px-2 py-0.5 rounded text-xs border font-bold text-gray-500 shadow-sm" x-text="getCategoryCount(cat.id)"></span>
                                </div>
                                <i class="fa-solid text-gray-400" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                            </div>

                            <div x-show="open" x-transition class="p-4 bg-gray-50 border-t border-gray-100 space-y-4">
                                <template x-for="(policy, pIndex) in client.policies" :key="pIndex">
                                    <div x-show="isMatchingCategory(policy, cat.id) && !policy.isCancelled" class="bg-white border rounded-xl shadow-sm p-4 relative" :class="'border-' + cat.color + '-200'">
                                        <button @click="removePolicy(pIndex)" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                                        
                                        <!-- 卡片頂位顯示受保人 -->
                                        <div class="mb-4 border-b pb-3">
                                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">受保人</label>
                                            <input type="text" x-model="policy.insuredPerson" @blur="policy.insuredPerson = formatName(policy.insuredPerson)" class="w-full text-lg font-bold text-gray-800 bg-transparent border-b border-dashed border-gray-300 focus:border-blue-500 outline-none pb-1" placeholder="輸入受保人姓名">
                                        </div>

                                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                            <div><label class="block text-[10px] font-bold text-gray-500 mb-1">保險公司</label><input type="text" x-model="policy.insurer" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none focus:border-blue-400"></div>
                                            <div><label class="block text-[10px] font-bold text-gray-500 mb-1">生效日期</label><input type="date" x-model="policy.effectDate" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none focus:border-blue-400"></div>
                                            <div><label class="block text-[10px] font-bold text-gray-500 mb-1">保費 (HK$)</label><input type="text" x-model="policy.premium" @input="policy.premium = formatInput($event.target.value)" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none focus:border-blue-400" placeholder="0"></div>
                                            <div><label class="block text-[10px] font-bold text-gray-500 mb-1">繳費模式</label><select x-model="policy.paymentMode" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none focus:border-blue-400"><option value="Yearly">年繳</option><option value="Monthly">月繳</option></select></div>
                                        </div>

                                        <!-- 契約列表 (移除類別, 保留核心資料) -->
                                        <div class="space-y-2 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                            <template x-for="(item, iIndex) in policy.items" :key="iIndex">
                                                <div class="flex flex-col gap-2 p-2 bg-white border border-gray-100 rounded shadow-sm relative">
                                                    <button x-show="iIndex > 0" @click="policy.items.splice(iIndex, 1)" class="absolute top-2 right-2 text-red-300 hover:text-red-500"><i class="fa-solid fa-times"></i></button>
                                                    <div class="flex items-center gap-2 pr-6">
                                                        <span class="text-[10px] px-1.5 py-0.5 rounded font-bold" :class="iIndex===0 ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'" x-text="iIndex===0 ? '主約' : '附約'"></span>
                                                        <input type="text" x-model="item.name" class="flex-1 border-b border-gray-200 text-sm font-bold text-gray-800 outline-none focus:border-blue-400 pb-0.5" placeholder="輸入產品名稱">
                                                    </div>
                                                    <div class="grid grid-cols-3 gap-2 mt-1">
                                                        <div><label class="block text-[9px] text-gray-400">保額(HK$)</label><input type="text" x-model="item.sumAssured" @input="item.sumAssured = formatInput($event.target.value)" class="w-full border border-gray-200 rounded p-1 text-xs outline-none focus:border-blue-400"></div>
                                                        <div><label class="block text-[9px] text-gray-400">供款年期</label><input type="text" x-model="item.term" placeholder="例如: 25年" class="w-full border border-gray-200 rounded p-1 text-xs outline-none focus:border-blue-400"></div>
                                                        <div><label class="block text-[9px] text-gray-400">保障年期</label><input type="text" x-model="item.maturity" placeholder="例如: 終身" class="w-full border border-gray-200 rounded p-1 text-xs outline-none focus:border-blue-400"></div>
                                                    </div>
                                                </div>
                                            </template>
                                            <div class="text-right mt-2"><button @click="addRider(pIndex, cat.id)" class="text-blue-600 text-xs font-bold hover:underline">+ 加入附加契約</button></div>
                                        </div>
                                    </div>
                                </template>
                                <button @click="addSpecificPolicy(cat.id)" class="w-full py-3 border-2 border-dashed rounded-xl font-bold bg-white transition hover:bg-gray-50" :class="'border-' + cat.color + '-300 text-' + cat.color + '-600'">+ 新增<span x-text="cat.name"></span>受保人</button>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- 3. 未來人生現金流 (分類輸入) -->
                <h2 class="text-xl font-bold mb-4 text-gray-800 mt-8"><i class="fa-solid fa-money-bill-trend-up text-green-600 mr-2"></i>未來人生現金流</h2>
                <div class="space-y-4 mb-8">
                    
                    <!-- 強積金及理財保單 (卡片輸入) -->
                    <div class="bg-white rounded-xl shadow-sm border border-indigo-200 overflow-hidden" x-data="{ open: false }">
                        <div @click="open = !open" class="p-4 cursor-pointer flex justify-between items-center hover:bg-indigo-50 transition-colors border-l-4 border-indigo-500 bg-indigo-50/30">
                            <div class="flex items-center gap-2">
                                <span class="text-xl">💰</span>
                                <h3 class="font-bold text-lg text-gray-800">強積金及理財保單</h3>
                                <span class="ml-2 bg-white px-2 py-0.5 rounded text-xs border font-bold text-gray-500 shadow-sm" x-text="getCategoryCount('Wealth')"></span>
                            </div>
                            <i class="fa-solid text-gray-400" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                        </div>
                        <div x-show="open" x-transition class="p-4 bg-gray-50 border-t border-gray-100 space-y-4">
                            <template x-for="(policy, pIndex) in client.policies" :key="pIndex">
                                <div x-show="isMatchingCategory(policy, 'Wealth') && !policy.isCancelled" class="bg-white border border-indigo-200 rounded-xl shadow-sm p-4 relative">
                                    <button @click="removePolicy(pIndex)" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                                    <div class="mb-4 border-b pb-3">
                                        <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">持有人 / 受保人</label>
                                        <input type="text" x-model="policy.insuredPerson" class="w-full text-lg font-bold text-gray-800 bg-transparent border-b border-dashed border-gray-300 focus:border-indigo-500 outline-none pb-1" placeholder="輸入姓名">
                                    </div>
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                                        <div><label class="block text-[10px] font-bold text-gray-500 mb-1">公司/機構</label><input type="text" x-model="policy.insurer" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none"></div>
                                        <div><label class="block text-[10px] font-bold text-gray-500 mb-1">生效日期</label><input type="date" x-model="policy.effectDate" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none"></div>
                                        <div><label class="block text-[10px] font-bold text-gray-500 mb-1">供款 (HK$)</label><input type="text" x-model="policy.premium" @input="policy.premium = formatInput($event.target.value)" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none" placeholder="0"></div>
                                        <div><label class="block text-[10px] font-bold text-gray-500 mb-1">繳費模式</label><select x-model="policy.paymentMode" class="w-full border border-gray-200 rounded p-1.5 text-sm outline-none"><option value="Yearly">年繳</option><option value="Monthly">月繳</option></select></div>
                                    </div>
                                    <div class="space-y-2 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                        <template x-for="(item, iIndex) in policy.items" :key="iIndex">
                                            <div class="flex flex-col gap-2 p-2 bg-white border border-gray-100 rounded shadow-sm relative">
                                                <button x-show="iIndex > 0" @click="policy.items.splice(iIndex, 1)" class="absolute top-2 right-2 text-red-300 hover:text-red-500"><i class="fa-solid fa-times"></i></button>
                                                <div class="flex items-center gap-2 pr-6">
                                                    <!-- 強制選擇理財類別 -->
                                                    <select x-model="item.category" class="text-[10px] px-1 py-1 rounded font-bold border outline-none bg-indigo-50 text-indigo-700 border-indigo-200">
                                                        <option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="MPF">強積金</option>
                                                    </select>
                                                    <input type="text" x-model="item.name" class="flex-1 border-b border-gray-200 text-sm font-bold text-gray-800 outline-none pb-0.5" placeholder="計劃名稱">
                                                </div>
                                                <div class="grid grid-cols-2 gap-2 mt-1">
                                                    <div><label class="block text-[9px] text-gray-400">目前價值/保額</label><input type="text" x-model="item.sumAssured" @input="item.sumAssured = formatInput($event.target.value)" class="w-full border border-gray-200 rounded p-1 text-xs outline-none"></div>
                                                    <div><label class="block text-[9px] text-gray-400">供款期</label><input type="text" x-model="item.term" placeholder="例如: 5年 / 65歲" class="w-full border border-gray-200 rounded p-1 text-xs outline-none"></div>
                                                </div>
                                            </div>
                                        </template>
                                        <div class="text-right mt-2"><button @click="addRider(pIndex, 'Savings')" class="text-indigo-600 text-xs font-bold hover:underline">+ 加入項目</button></div>
                                    </div>
                                </div>
                            </template>
                            <button @click="addSpecificPolicy('Savings')" class="w-full py-3 border-2 border-dashed border-indigo-300 text-indigo-600 rounded-xl font-bold bg-white transition hover:bg-gray-50">+ 新增強積金 / 理財保單</button>
                        </div>
                    </div>

                    <!-- 退休生活與醫療 (文字方塊) -->
                    <div class="bg-white rounded-xl shadow-sm border border-orange-200 overflow-hidden" x-data="{ open: true }">
                        <div @click="open = !open" class="p-4 cursor-pointer flex justify-between items-center hover:bg-orange-50 transition-colors border-l-4 border-orange-400 bg-orange-50/30">
                            <h3 class="font-bold text-lg text-gray-800"><i class="fa-solid fa-mug-hot text-orange-500 mr-2"></i>退休規劃紀錄</h3>
                            <i class="fa-solid text-gray-400" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                        </div>
                        <div x-show="open" x-transition class="p-4 bg-gray-50 border-t border-gray-100 space-y-4">
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">退休生活期望</label><textarea x-model="client.fnaRetireVision" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm text-gray-800 outline-none focus:ring-1 focus:ring-orange-400" rows="2" placeholder="輸入客人的退休生活期望..."></textarea></div>
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">退休後醫保安排</label><textarea x-model="client.fnaMedicalVision" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm text-gray-800 outline-none focus:ring-1 focus:ring-orange-400" rows="2" placeholder="現有醫療保險是否足夠覆蓋退休後保費..."></textarea></div>
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">其他資金來源/關注點</label><textarea x-model="client.fnaRetireTools" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm text-gray-800 outline-none focus:ring-1 focus:ring-orange-400" rows="2" placeholder="收租、現金儲備或其他關注問題..."></textarea></div>
                        </div>
                    </div>

                    <!-- 仔女教育 (智能顯示) -->
                    <div x-show="client.children && client.children !== '0'" class="bg-white rounded-xl shadow-sm border border-green-200 overflow-hidden" x-data="{ open: true }" x-cloak>
                        <div @click="open = !open" class="p-4 cursor-pointer flex justify-between items-center hover:bg-green-50 transition-colors border-l-4 border-green-500 bg-green-50/30">
                            <h3 class="font-bold text-lg text-gray-800"><i class="fa-solid fa-graduation-cap text-green-600 mr-2"></i>仔女教育基金</h3>
                            <i class="fa-solid text-gray-400" :class="open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                        </div>
                        <div x-show="open" x-transition class="p-4 bg-gray-50 border-t border-gray-100 space-y-4">
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">教育目標與期望</label><textarea x-model="client.fnaEduVision" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm text-gray-800 outline-none focus:ring-1 focus:ring-green-400" rows="2" placeholder="升學國家、預計所需資金..."></textarea></div>
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">現有準備及進度</label><textarea x-model="client.fnaEduTools" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm text-gray-800 outline-none focus:ring-1 focus:ring-green-400" rows="2" placeholder="目前的教育基金進度..."></textarea></div>
                        </div>
                    </div>
                </div>

                                    <div class="text-xs text-blue-500 font-bold mb-1">退休後醫保安排</div>
                                    <div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaMedicalVision || '-'"></div>
                                </div>
                                <div class="bg-white p-3 rounded-lg border border-gray-100">
                                    <div class="text-xs text-blue-500 font-bold mb-1">現有財富增值安排 (現金流來源)</div>
                                    <div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaRetireTools || '-'"></div>
                                </div>
                                <div class="bg-white p-3 rounded-lg border border-gray-100">
                                    <div class="text-xs text-blue-500 font-bold mb-1">規劃安排 / 關注點</div>
                                    <div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaRetireGap || '-'"></div>
                                </div>
                            </div>
                        </div>

                        <!-- 智能教育基金 (有小朋友才顯示) -->
                        <div x-show="client.children && client.children !== '0'" class="bg-white rounded-xl shadow-sm border border-green-100 overflow-hidden" x-cloak>
                            <div class="p-5 border-l-4 border-green-500 bg-green-50/30">
                                <h3 class="font-bold text-gray-700 text-lg"><i class="fa-solid fa-graduation-cap text-green-600 mr-2"></i>🎓 栽培下一代教育基金</h3>
                            </div>
                            <div class="p-5 space-y-4 bg-gray-50 border-t border-gray-100">
                                <div class="bg-white p-3 rounded-lg border border-gray-100">
                                    <div class="text-xs text-green-600 font-bold mb-1">教育目標與期望</div>
                                    <div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaEduVision || '-'"></div>
                                </div>
                                <div class="bg-white p-3 rounded-lg border border-gray-100">
                                    <div class="text-xs text-green-600 font-bold mb-1">現有準備及進度</div>
                                    <div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaEduTools || '-'"></div>
                                </div>
                                <div class="bg-white p-3 rounded-lg border border-gray-100">
                                    <div class="text-xs text-green-600 font-bold mb-1">方向 / 關注點</div>
                                    <div class="text-sm text-gray-800 whitespace-pre-line" x-text="client.fnaEduGap || '-'"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white border-t border-gray-200 p-6 flex justify-between items-center">
                    <button @click="view = 'detail';" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold shadow-md transition">🔙 返回編輯頁面</button>
                </div>
            </div>

            <!-- 同步進度視窗 -->
            <div x-show="syncProgress.show" style="display: none;" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black bg-opacity-80" x-cloak>
                <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4 text-center">
                    <div class="mb-4 text-blue-600"><i class="fa-solid fa-circle-notch fa-spin text-4xl"></i></div>
                    <h3 class="font-bold text-gray-800 text-lg mb-2">正在還原並同步雲端</h3>
                    <p class="text-sm text-gray-500 mb-4" x-text="'請勿關閉視窗，進度：' + syncProgress.current + ' / ' + syncProgress.total"></p>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div class="bg-blue-600 h-3 rounded-full transition-all duration-300" :style="'width: ' + ((syncProgress.current / syncProgress.total) * 100) + '%'"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-1AkUDr7fL8digJDaCRiTliAeWikk8-XsXznXKHvBYQ5nP8vim7iq_N4FR1mp-RHp/exec';
        
        function app() {
            return {
                ADMIN_SECRET_KEY: '0903',
                version: '1.9.9', view: 'list', searchQuery: '', renewalFilter: '', birthdayFilter: '', typeFilter: '', clients: [], client: {},
                syncProgress: { show: false, current: 0, total: 0 },
                
                init() { 
                    const saved = localStorage.getItem('crm_db_v8');
                    if (saved) { this.clients = JSON.parse(saved); }
                    
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'get', id: 'ALL', adminKey: this.ADMIN_SECRET_KEY })
                    })
                    .then(r => r.json())
                    .then(res => {
                        if (res.status === 'success' && Array.isArray(res.data)) {
                            this.clients = res.data;
                            this.saveDB();
                        }
                    }).catch(e => console.error('雲端同步失敗', e));
                },
                
                formatNumber(num) { if (num === null || num === undefined || num === '') return '0'; const n = parseFloat(num.toString().replace(/,/g, '')); return isNaN(n) ? num : n.toLocaleString('en-US'); },
                formatInput(v) { if (!v) return ''; let str = String(v).replace(/[^0-9.]/g, ''); let parts = str.split('.'); if (parts.length > 2) { parts[1] = parts.slice(1).join(''); parts.length = 2; } parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ","); return parts.length > 1 ? parts[0] + '.' + parts[1] : parts[0]; },
                formatName(s) { return s ? s.replace(/\b([a-zA-Z])([a-zA-Z]*)\b/g, (m, p1, p2) => p1.toUpperCase() + p2.toLowerCase()) : ''; },
                getAge(dob) { if (!dob) return ''; const b = new Date(dob); const t = new Date(); let age = t.getFullYear() - b.getFullYear(); const m = t.getMonth() - b.getMonth(); if (m < 0 || (m === 0 && t.getDate() < b.getDate())) { age--; } return age >= 0 ? age : 0; },
                
                hasRenewalMatch(c) { return (c.policies || []).some(p => !p.isCancelled && p.paymentMode !== 'Monthly' && p.dueDate && (new Date(p.dueDate).getMonth() + 1).toString() === this.renewalFilter); },

                get filteredClients() {
                    let res = this.clients || [];
                    if (this.searchQuery) { const q = this.searchQuery.toLowerCase(); res = res.filter(c => (c.owner||'').toLowerCase().includes(q) || (c.phone||'').includes(q)); }
                    if (this.typeFilter) res = res.filter(c => (c.policies || []).some(p => !p.isCancelled && (p.items || []).some(i => i.category === this.typeFilter)));
                    if (this.renewalFilter) res = res.filter(c => (c.policies || []).some(p => !p.isCancelled && p.paymentMode !== 'Monthly' && p.dueDate && (new Date(p.dueDate).getMonth() + 1).toString() === this.renewalFilter));
                    if (this.birthdayFilter) res = res.filter(c => c.dob && (new Date(c.dob).getMonth() + 1).toString() === this.birthdayFilter);
                    return res;
                },

                // 核心重構：判定保單是否屬於特定 UI 分類
                isMatchingCategory(policy, catId) {
                    if (!policy.items || policy.items.length === 0) return false;
                    const mainCat = policy.items[0].category;
                    if (catId === 'Life') return mainCat === 'Life';
                    if (catId === 'CI') return mainCat === 'CI';
                    if (catId === 'Accident') return ['Accident', 'AccidentDeath', 'AccidentMedical'].includes(mainCat);
                    if (catId === 'Medical') return mainCat === 'Medical';
                    if (catId === 'Wealth') return ['Savings', 'Fund', 'MPF'].includes(mainCat);
                    return false;
                },
                getCategoryCount(catId) {
                    if(!this.client || !this.client.policies) return 0;
                    return this.client.policies.filter(p => !p.isCancelled && this.isMatchingCategory(p, catId)).length;
                },

                get protectionSummary() {
                    let summary = { insured: [], wealthPolicies: [] };
                    if (!this.client || !this.client.policies) return summary;
                    let personMap = {};
                    let allWealthPolicies = [];
                    
                    this.client.policies.forEach(p => {
                        if(p.isCancelled) return;
                        let p_amt = parseFloat(String(p.premium||'').replace(/,/g, '')) || 0; 
                        let annualizedPremium = (p.paymentMode === 'Monthly' ? (p_amt * 12) : p_amt);
                        let person = (p.insuredPerson && p.insuredPerson.trim()) ? p.insuredPerson.trim() : (this.client.owner ? this.client.owner.trim() : '未命名');
                        
                        if (!personMap[person]) {
                            personMap[person] = { 
                                name: person, 
                                lifeCount: 0, lifePremium: 0, lifeSum: 0, lifeDetails: [],
                                ciCount: 0, ciPremium: 0, ciSum: 0, ciDetails: [],
                                accCount: 0, accPremium: 0, accDeathSum: 0, accMedicalSum: 0, accDetails: [],
                                medCount: 0, medPremium: 0, medicalHighEnd: false, medicalTraditional: false, medDetails: []
                            };
                        }

                        let hasLife = false, hasCI = false, hasAcc = false, hasMed = false, hasWealth = false;
                        let lifeItems = [], ciItems = [], accItems = [], medItems = [], wealthItems = [];

                        (p.items || []).forEach(i => {
                            if(!i) return;
                            let amt = parseFloat(String(i.sumAssured||'0').replace(/,/g, '')) || 0; 
                            let n = i.name || '';
                            
                            if (i.category === 'Life') { hasLife = true; personMap[person].lifeSum += amt; lifeItems.push(i); }
                            else if (i.category === 'CI') { hasCI = true; personMap[person].ciSum += amt; ciItems.push(i); }
                            else if (['AccidentDeath', 'AccidentMedical', 'Accident'].includes(i.category)) { 
                                hasAcc = true; 
                                if(i.category === 'AccidentMedical' || n.includes('費用') || n.includes('醫療')) personMap[person].accMedicalSum += amt;
                                else personMap[person].accDeathSum += amt; 
                                accItems.push(i); 
                            }
                            else if (i.category === 'Medical') { 
                                hasMed = true; 
                                if(n.includes('高端')) personMap[person].medicalHighEnd = true; else personMap[person].medicalTraditional = true; 
                                medItems.push(i);
                            }
                            else if (['Savings', 'Fund', 'MPF'].includes(i.category)) {
                                hasWealth = true; wealthItems.push(i);
                            }
                        });

                        if(hasLife) { personMap[person].lifeCount++; personMap[person].lifePremium += annualizedPremium; personMap[person].lifeDetails.push({ insurer: p.insurer, policyNo: p.policyNo, paymentMode: p.paymentMode, premium: p.premium, items: lifeItems }); }
                        if(hasCI) { personMap[person].ciCount++; personMap[person].ciPremium += annualizedPremium; personMap[person].ciDetails.push({ insurer: p.insurer, policyNo: p.policyNo, paymentMode: p.paymentMode, premium: p.premium, items: ciItems }); }
                        if(hasAcc) { personMap[person].accCount++; personMap[person].accPremium += annualizedPremium; personMap[person].accDetails.push({ insurer: p.insurer, policyNo: p.policyNo, paymentMode: p.paymentMode, premium: p.premium, items: accItems }); }
                        if(hasMed) { personMap[person].medCount++; personMap[person].medPremium += annualizedPremium; personMap[person].medDetails.push({ insurer: p.insurer, policyNo: p.policyNo, paymentMode: p.paymentMode, premium: p.premium, items: medItems }); }
                        if(hasWealth) { allWealthPolicies.push({ insurer: p.insurer, policyNo: p.policyNo, premium: p.premium, paymentMode: p.paymentMode, insuredPerson: person, items: wealthItems }); }
                    }); 
                    summary.insured = Object.values(personMap); 
                    summary.wealthPolicies = allWealthPolicies;
                    return summary;
                },

                updateSummary() {},
                createNewClient() { this.client = { id: Date.now(), owner: '', dob: '', marital: 'Single', children: '0', policies: [], fnaRetireVision: '', fnaMedicalVision: '', fnaRetireTools: '', fnaRetireGap: '', fnaEduVision: '', fnaEduTools: '', fnaEduGap: '' }; this.view = 'detail'; },
                openClient(c) { this.client = JSON.parse(JSON.stringify(c)); this.view = 'detail'; },
                
                saveDB() { localStorage.setItem('crm_db_v8', JSON.stringify(this.clients)); },

                saveCurrentClient(stay) { 
                    this.updateSummary();
                    if (!this.clients) this.clients = [];
                    const idx = this.clients.findIndex(c => c.id === this.client.id);
                    if (idx > -1) this.clients[idx] = this.client;
                    else this.clients.push(this.client);
                    this.saveDB();
                    
                    let d = JSON.parse(JSON.stringify(this.client));
                    d.name = d.owner;
                    const finalPayload = { forceId: String(this.client.id), action: 'update', payload: JSON.stringify(d), adminKey: this.ADMIN_SECRET_KEY };
                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(finalPayload) }).catch(e => console.error(e));
                    
                    if(!stay) { this.view = 'list'; window.scrollTo(0,0); } else { alert('進度已儲存'); }
                },
                
                permanentDeleteClient(id) { 
                    if(confirm('徹底刪除無法復原！確定？')) { 
                        this.clients = this.clients.filter(c => c.id !== id);
                        this.saveDB(); 
                        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: String(id), adminKey: this.ADMIN_SECRET_KEY }) }).catch(e => console.error(e));
                    } 
                },
                
                addSpecificPolicy(catId) {
                    if(!this.client.policies) this.client.policies = [];
                    let defaultCat = catId;
                    if(catId === 'Accident') defaultCat = 'AccidentDeath'; // 保底設定
                    
                    this.client.policies.push({
                        insurer: 'AIA', policyNo: '', insuredPerson: this.client.owner || '', paymentMode: 'Yearly', premium: '', effectDate: '', isCancelled: false,
                        items: [{ category: defaultCat, name: '', sumAssured: '', term: '', maturity: '' }]
                    });
                },
                addRider(pIndex, catId) { 
                    if(!this.client.policies[pIndex].items) this.client.policies[pIndex].items = [];
                    let defaultCat = catId;
                    if(catId === 'Accident') defaultCat = 'AccidentMedical';
                    this.client.policies[pIndex].items.push({ category: defaultCat, name: '', sumAssured: '', term: '', maturity: '' }); 
                },
                removePolicy(i) { if(confirm('刪除這份保單？')) this.client.policies.splice(i,1); },
                
                importAllData(e) { 
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try { 
                            const data = JSON.parse(ev.target.result);
                            if(Array.isArray(data)) {
                                if(confirm(`確定要還原 ${data.length} 筆資料？`)) { 
                                    this.clients = data; this.saveDB();
                                    this.syncProgress.total = data.length; this.syncProgress.current = 0; this.syncProgress.show = true;
                                    let successCount = 0;
                                    for (let i = 0; i < data.length; i++) {
                                        let d = JSON.parse(JSON.stringify(data[i])); d.name = d.owner;
                                        try {
                                            let res = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ forceId: String(d.id), action: 'update', payload: JSON.stringify(d), adminKey: this.ADMIN_SECRET_KEY }) });
                                            if ((await res.json()).status === 'success') successCount++;
                                        } catch (err) {}
                                        this.syncProgress.current = i + 1;
                                    }
                                    this.syncProgress.show = false; alert(`還原及雲端同步完成！成功：${successCount} / ${data.length}`); window.location.reload();
                                } 
                            } 
                        } catch (err) { alert('檔案出錯'); this.syncProgress.show = false; } e.target.value = '';
                    }; reader.readAsText(file);
                },
                exportAllData() { 
                    const file = new File([JSON.stringify(this.clients, null, 2)], `CRM_BACKUP_${new Date().toISOString().slice(0,10).replace(/-/g, '')}.json`, { type: 'application/json' });
                    const url = URL.createObjectURL(file); const a = document.createElement('a'); a.href = url; a.download = file.name; document.body.appendChild(a); a.click();
                    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000); 
                }
            }
        }
    </script>
</body>
</html>
