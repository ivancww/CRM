<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script>
        const params = new URLSearchParams(window.location.search);
        const isClientView = params.has('data') || params.has('id');
        window.isClientView = isClientView;

        if (isClientView) {
            document.title = "我的財富與保障儀表板";
            document.write('<link rel="manifest" href="manifest-client.json">');
            document.write('<link rel="icon" type="image/png" href="client-logo-192.png">');
            document.write('<link rel="apple-touch-icon" href="client-logo-192.png">');
        } else {
            document.title = "保險管家 v1.4.4 (Admin - Cloud)";
            document.write('<link rel="manifest" href="manifest-admin.json">');
            document.write('<link rel="icon" type="image/png" href="admin-logo-192.png">');
            document.write('<link rel="apple-touch-icon" href="admin-logo-192.png">');
        }
    </script>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .web-frame { width: 100%; height: 80vh; border: none; }
        
        /* 管理者樣式 */
        .gold-alert { background: linear-gradient(135deg, #fff7e6 0%, #ffecb3 100%); border: 2px solid #ffc107 !important; animation: pulse 2s infinite; }
        input::-webkit-calendar-picker-indicator { opacity: 100; color: #888; }
        .policy-cancelled { opacity: 0.85; background-color: #f9fafb !important; border-color: #d1d5db !important; }
        .report-section { border-left: 4px solid #3b82f6; background: #f8fafc; padding: 1rem; margin-bottom: 1rem; border-radius: 0 0.5rem 0.5rem 0; }
        
        /* 客戶視圖樣式 */
        .progress-bar-bg { background-color: #E2E8F0; border-radius: 999px; overflow: hidden; height: 1.5rem; }
        .progress-fill-green { background-color: #10B981; height: 100%; transition: width 1s ease-in-out; }
        .progress-fill-orange { background-color: #F97316; height: 100%; transition: width 1s ease-in-out; }
        .theme-blue { color: #1E3A8A; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .client-body { -webkit-user-select: none; user-select: none; }

        @media print {
            @page { margin: 15mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; }
            .no-print { display: none !important; }
            .report-section { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans" :class="isClientView ? 'client-body pb-0' : 'pb-20'" x-data="{ isClientView: window.isClientView }">

    <div x-show="!isClientView" x-data="app()">
        <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50 print:hidden">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-lg font-bold cursor-pointer" @click="view = 'list'">
                    <i class="fa-solid fa-cloud mr-2"></i>保險管家 (雲端版)
                    <span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded ml-1 align-middle" x-text="'v' + version"></span>
                </h1>
                <div class="flex items-center gap-2">
                    <button @click="showSettingsModal = true" class="text-gray-300 hover:text-white px-2"><i class="fa-solid fa-gear"></i></button>
                    <div x-show="view === 'list'" class="flex gap-2">
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-database"></i></button>
                            <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded shadow-xl z-50 text-gray-800 overflow-hidden" x-cloak>
                                <a href="#" @click.prevent="exportAllData(); open = false" class="block px-4 py-3 hover:bg-gray-100 text-sm border-b">備份全部</a>
                                <a href="#" @click.prevent="document.getElementById('importFile').click(); open = false" class="block px-4 py-3 hover:bg-gray-100 text-sm">還原備份</a>
                                <input type="file" id="importFile" @change="importAllData($event)" class="hidden" accept=".json, application/json">
                            </div>
                        </div>
                        <button @click="handleWebClick()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded text-sm"><i class="fa-solid fa-globe"></i></button>
                        <button @click="createNewClient()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div x-show="view === 'detail'" class="flex gap-2">
                        <button @click="saveCurrentClient(); view = 'list'" class="bg-gray-600 hover:bg-gray-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-arrow-left"></i></button>
                        <div class="h-6 w-px bg-gray-500 mx-1"></div>
                        <button @click="openReport(client)" class="bg-purple-600 hover:bg-purple-700 px-3 py-2 rounded text-sm font-bold text-white shadow-md"><i class="fa-solid fa-file-invoice mr-1"></i>報告</button>
                        <button @click="handleWebClick()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded text-sm"><i class="fa-solid fa-globe"></i></button>
                        <button @click="openUploadModal()" class="bg-yellow-500 hover:bg-yellow-600 px-3 py-2 rounded text-sm font-bold text-white border border-yellow-600 shadow-md"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        <button @click="saveCurrentClient(true)" class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                    </div>
                </div>
            </div>
        </nav>
        
        <div class="container mx-auto p-4 max-w-5xl print:hidden">
            <div x-show="view === 'list'" x-transition>
                <div class="mb-6 flex flex-col md:flex-row gap-2">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" x-model="searchQuery" autocomplete="off" placeholder="搜尋客戶、受保人、電話..." class="w-full p-3 pl-10 rounded-lg border shadow-sm focus:ring-2 focus:ring-blue-400">
                    </div>
                    <div class="flex gap-2 w-full md:w-auto">
                        <select x-model="typeFilter" class="flex-1 md:w-32 p-2 rounded-lg border-2 border-purple-200 shadow-sm bg-white font-bold text-gray-700 text-sm">
                            <option value="">☂️ 所有類型</option>
                            <option value="CI">危疾</option><option value="Accident">意外</option><option value="Medical">醫療</option><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="Home">家居保</option><option value="MPF">強積金</option><option value="Wellness">健康程式</option>
                        </select>
                        <select x-model="renewalFilter" class="flex-1 md:w-32 p-2 rounded-lg border-2 border-green-200 shadow-sm bg-white font-bold text-gray-700 text-sm">
                            <option value="">📅 所有月份</option>
                            <option value="1">1月 續保</option><option value="2">2月 續保</option><option value="3">3月 續保</option><option value="4">4月 續保</option><option value="5">5月 續保</option><option value="6">6月 續保</option><option value="7">7月 續保</option><option value="8">8月 續保</option><option value="9">9月 續保</option><option value="10">10月 續保</option><option value="11">11月 續保</option><option value="12">12月 續保</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="(c, index) in filteredClients" :key="c.id || index">
                        <div @click="openClient(c)" class="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-md transition border-l-4 relative group" :class="c.isDeleted ? 'border-red-400 bg-red-50' : 'border-blue-500'">
                            <div class="font-bold text-lg flex items-center" :class="c.isDeleted ? 'text-gray-500' : 'text-gray-800'">
                                <span class="text-sm font-bold mr-2 text-blue-500" x-text="(index + 1) + '.'"></span>
                                <span x-text="c.owner || '未命名'" :class="c.isDeleted ? 'line-through' : ''"></span>
                            </div>
                            <div class="text-sm text-gray-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> <span x-text="c.phone || '-'"></span></div>
                            <div class="text-xs text-gray-400 mt-2">有效保單: <span x-text="(c.policies || []).filter(p=>!p.isCancelled).length"></span></div>
                            <div class="absolute bottom-4 right-4 flex gap-2"><button @click.stop="openReport(c)" class="bg-purple-100 text-purple-600 w-8 h-8 rounded-full flex items-center justify-center hover:bg-purple-600 hover:text-white transition shadow-sm"><i class="fa-solid fa-file-invoice"></i></button></div>
                            <button @click.stop="deleteClient(c.id)" x-show="!c.isDeleted" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'detail'" x-transition x-cloak>
                <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-blue-500">
                    <h2 class="text-xl font-bold mb-4 text-blue-700">客戶資料 (家庭帳戶)</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                        <div class="md:col-span-2"><label class="block text-sm font-bold mb-1 text-blue-600">持有人 / 戶口名稱</label><input type="text" x-model="client.owner" class="w-full border rounded p-2" placeholder="Tony Chan"></div>
                        <div><label class="block text-sm font-bold mb-1 text-blue-600">生日</label><input type="date" x-model="client.dob" class="w-full border rounded p-2 text-sm"></div>
                        <div><label class="block text-sm font-bold mb-1">電話</label><input type="tel" x-model="client.phone" class="w-full border rounded p-2"></div>
                    </div>
                    <template x-for="(policy, pIndex) in client.policies" :key="pIndex">
                        <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 relative" :class="policy.isCancelled ? 'policy-cancelled' : 'border-green-500'">
                            <div class="flex flex-wrap items-end gap-3 mb-4 border-b pb-3">
                                <h2 class="text-xl font-bold" x-text="'保單 (#' + (pIndex + 1) + ')'"></h2>
                                <div class="flex-1"><label class="block text-[10px] font-bold">保險公司</label><input type="text" x-model="policy.insurer" class="w-full border rounded p-1 text-sm font-bold" placeholder="AIA"></div>
                                <div class="w-40"><label class="block text-[10px] font-bold">保單號碼</label><input type="text" x-model="policy.policyNo" class="w-full border rounded p-1 text-sm font-mono" placeholder="P-12345"></div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-7 gap-3 mb-4 p-4 rounded-lg items-end bg-green-50">
                                <div class="md:col-span-2"><label class="block text-xs font-bold mb-1 text-purple-600">受保人</label><input type="text" x-model="policy.insuredPerson" class="w-full border rounded p-2 text-sm"></div>
                                <div class="md:col-span-1"><label class="block text-xs font-bold mb-1">生效日</label><input type="date" x-model="policy.effectDate" class="w-full border rounded p-2 text-sm"></div>
                                <div class="md:col-span-2"><label class="block text-xs font-bold mb-1">續保日期</label><input type="date" x-model="policy.dueDate" class="w-full border rounded p-2 text-sm"></div>
                                <div class="md:col-span-2"><label class="block text-xs font-bold mb-1">保費(HK$)</label><input type="text" x-model="policy.premium" @input="policy.premium = formatInput($event.target.value)" class="w-full border rounded p-2 text-sm"></div>
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm text-left">
                                    <thead class="bg-gray-100 text-xs uppercase"><tr><th class="px-2 py-2">#</th><th>類別</th><th>產品名稱</th><th>保額(HK$)</th><th>自付(HK$)</th><th>供款期</th><th>到期日</th><th>操作</th></tr></thead>
                                    <tbody>
                                        <template x-for="(item, iIndex) in policy.items" :key="iIndex">
                                            <tr class="border-b">
                                                <td class="px-2 py-2" x-text="iIndex === 0 ? '主' : iIndex"></td>
                                                <td><select x-model="item.category" class="w-full border rounded text-xs p-1"><option value="Medical">醫療</option><option value="CI">危疾</option><option value="Life">人壽</option><option value="Accident">意外</option><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="MPF">強積金</option></select></td>
                                                <td><input type="text" x-model="item.name" class="w-full border rounded p-1 text-xs"></td>
                                                <td><input type="text" x-model="item.sumAssured" @input="item.sumAssured = formatInput($event.target.value)" class="w-full border rounded p-1 text-xs"></td>
                                                <td><input type="text" x-model="item.deductible" @input="item.deductible = formatInput($event.target.value)" class="w-full border rounded p-1 text-xs" placeholder="0"></td>
                                                <td><input type="text" x-model="item.term" class="w-full border rounded p-1 text-xs" placeholder="20年"></td>
                                                <td><input type="text" x-model="item.maturity" class="w-full border rounded p-1 text-xs" placeholder="終身"></td>
                                                <td class="text-center"><button @click="openRemarkModal(item)" class="w-6 h-6 rounded-full border text-xs" :class="item.remarks ? 'bg-red-100 text-red-600' : 'bg-gray-100'">!</button></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                    <button @click="addPolicy()" class="w-full py-3 border-2 border-dashed border-green-300 text-green-600 rounded-lg hover:bg-green-50 mb-6 font-bold">+ 新保單</button>
                </div>
            </div>
        </div>

        <div x-show="uploadModal.open" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75" x-cloak>
            <div class="bg-white w-80 rounded-lg shadow-xl p-6 text-center">
                <h3 class="font-bold text-gray-800 mb-2 text-lg">建立專屬儀表板</h3>
                <p class="text-xs text-gray-500 mb-4">系統將為客戶生成「無密碼」直接存取連結。</p>
                <div x-show="uploadModal.loading" class="mb-4 text-blue-600 font-bold text-sm animate-pulse"><i class="fa-solid fa-cloud-arrow-up mr-2"></i>資料上傳中...</div>
                <button @click="uploadToCloud()" :disabled="uploadModal.loading" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold mb-3 shadow transition"><i class="fa-solid fa-check mr-2"></i>確認並生成 QR Code</button>
                <button @click="uploadModal.open = false" class="text-gray-400 text-sm">取消</button>
            </div>
        </div>
        
        <div x-show="qrModal.open" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90" x-cloak>
            <div class="bg-white w-80 rounded-lg shadow-xl p-6 text-center">
                <h3 class="font-bold text-gray-800 mb-4">專屬連結已建立</h3>
                <div class="flex justify-center mb-2 bg-white p-2 border rounded relative" style="min-height: 200px;">
                    <img id="qr-image-visible" src="" class="w-full h-auto object-contain" style="display:none;">
                    <div id="qr-loading" class="absolute inset-0 flex items-center justify-center text-gray-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i> 生成中...</div>
                    <div id="qr-container-hidden" style="position:absolute; top:-9999px;"></div>
                </div>
                <p class="text-xs text-gray-500 mb-4 font-bold text-blue-600">長按圖片可儲存或識別</p>
                <button @click="copyLink()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold mb-3 shadow">複製連結</button>
                <button @click="qrModal.open = false" class="text-gray-400 text-sm">關閉</button>
            </div>
        </div>
    </div>


    <div x-show="isClientView" x-data="dashboardApp()" x-cloak>
        <div x-show="!hasData" class="flex items-center justify-center min-h-screen">
            <div class="text-center text-gray-500"><i class="fa-solid fa-spinner fa-spin text-4xl mb-4 text-blue-500"></i><p class="font-bold" x-text="loadingMsg"></p></div>
        </div>

        <div x-show="hasData" class="max-w-4xl mx-auto md:mt-8 md:mb-8 bg-white md:rounded-2xl shadow-xl overflow-hidden" x-cloak>
            <div class="gradient-bg text-white p-6 md:p-8 flex justify-between items-start md:items-center flex-col md:flex-row gap-4 relative">
                <div>
                    <p class="text-blue-200 text-sm mb-1">親愛的 <span x-text="client.owner || '客戶'"></span>：</p>
                    <h1 class="text-2xl md:text-3xl font-bold">您的家庭財富與保障報告</h1>
                    <p class="text-xs mt-2 opacity-80"><i class="fa-solid fa-shield-halved mr-1"></i> 保險不只是一份合約，更是對未來的承諾</p>
                </div>
                <div x-data="{ showTotal: false }" class="bg-white/10 backdrop-blur-sm border border-white/20 p-3 rounded-xl text-center min-w-[150px] cursor-pointer" @click="showTotal = !showTotal">
                    <div class="text-xs text-blue-100 mb-1">家庭總保費 (年) <i class="fa-solid ml-1 opacity-70" :class="showTotal ? 'fa-eye-slash' : 'fa-eye'"></i></div>
                    <div class="text-xl font-bold text-yellow-300 font-mono" x-text="showTotal ? 'HK$ ' + formatNumber(getTotalPremium()) : '****'"></div>
                </div>
            </div>

            <div class="p-4 md:p-8 space-y-8 bg-gray-50">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                        <h2 class="text-lg font-bold theme-blue mb-2">第一層：全方位保障均衡度</h2>
                        <div class="relative h-64 w-full"><canvas id="gapRadarChart"></canvas></div>
                    </div>
                    <div class="flex flex-col gap-6">
                        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-end mb-2"><h2 class="text-lg font-bold theme-blue">第二層：理想退休計畫</h2><span class="text-sm font-bold text-orange-500">缺口：每月 -$20,000</span></div>
                            <div class="progress-bar-bg relative"><div class="progress-fill-orange flex items-center justify-end pr-2 text-white text-xs font-bold" style="width: 33%;">33%</div></div>
                            <p class="text-xs text-red-500 mt-3 bg-red-50 p-2 rounded">💡 建議：配置年金產品或收息資產，填補現金流空白。</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                            <div class="flex justify-between items-end mb-2"><h2 class="text-lg font-bold theme-blue">第二層：子女海外教育金</h2><span class="text-sm font-bold text-green-600">進度良好</span></div>
                            <div class="progress-bar-bg relative"><div class="progress-fill-green flex items-center justify-end pr-2 text-white text-xs font-bold" style="width: 75%;">75%</div></div>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-bold theme-blue mb-4 border-l-4 border-blue-600 pl-3">保單明細一覽</h2>
                    <template x-for="(policy, index) in client.policies" :key="index">
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-4 overflow-hidden" x-show="!policy.isCancelled">
                            <div class="bg-blue-50/50 p-4 border-b flex justify-between items-center flex-wrap gap-2">
                                <div class="font-bold"><span class="bg-blue-600 text-white text-xs px-2 py-1 rounded mr-2" x-text="policy.insurer"></span>受保人：<span x-text="policy.insuredPerson || client.owner"></span></div>
                                <div class="text-xs text-gray-500 font-mono" x-text="'#' + (policy.policyNo || '-')"></div>
                            </div>
                            <div class="p-4 overflow-x-auto">
                                <table class="w-full text-sm">
                                    <thead class="bg-gray-50 text-gray-500 text-xs"><tr><th class="px-3 py-2">產品名稱</th><th>保障/供款期</th><th>保額/自付</th></tr></thead>
                                    <tbody>
                                        <template x-for="item in policy.items">
                                            <tr class="border-b last:border-0 hover:bg-gray-50">
                                                <td class="px-3 py-3"><div class="font-bold text-gray-800" x-text="item.name"></div><div class="text-[10px] text-blue-500 font-bold" x-text="item.category"></div></td>
                                                <td class="text-xs text-gray-600">至: <span x-text="item.maturity || '-'"></span><br>供: <span x-text="item.term || '-'"></span></td>
                                                <td class="text-right px-3 font-mono font-bold text-gray-700" x-text="item.sumAssured ? '$' + formatNumber(item.sumAssured) : '-'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            <div class="bg-white border-t p-8 flex justify-between items-center flex-col md:flex-row gap-4">
                <div class="flex items-center gap-4"><div class="w-12 h-12 bg-blue-100 text-blue-600 flex items-center justify-center rounded-full text-xl"><i class="fa-solid fa-user-tie"></i></div><div><p class="text-sm font-bold text-gray-800">您的專屬理財顧問</p><p class="text-xs text-gray-500">IVAN (AIA)</p></div></div>
                <a href="https://wa.me/85253995596" class="bg-[#25D366] text-white font-bold py-3 px-8 rounded-lg shadow-md"><i class="fa-brands fa-whatsapp mr-2"></i> WhatsApp 查詢</a>
            </div>
        </div>
    </div>

    <script>
        // ==================== 管理者 (Admin) 邏輯 ====================
        function app() {
            return {
                version: '1.4.4',
                view: 'list', searchQuery: '', renewalFilter: '', typeFilter: '', clients: [], client: {}, 
                showWebActionModal: false, showConfigModal: false, showWebFrame: false, 
                showSettingsModal: false, showReportModal: false, showSavingsInReport: true,
                reportClient: {}, reportData: { Medical: [], CI: [], Life: [], Accident: [], Savings: [] },
                linkModal: { open: false, url: '' },
                uploadModal: { open: false, password: '', loading: false },
                qrModal: { open: false, url: '' },
                webLinks: [{ name: '危疾資訊', url: 'https://www.google.com/search?q=Critical+Illness+Info&igu=1', type: 'url' }],
                currentWebUrl: '', calendarModal: { open: false, type: '', data: null },
                itemRemarkModal: { open: false, item: {} },
                settings: { waBirthday: '親愛的 {{name}}，祝您生日快樂！', waRenewal: '溫馨提示：您的 {{insurer}} 保單將於 {{dueDate}} 續保。' },

                init() {
                    const storedVersion = localStorage.getItem('crm_version');
                    if (storedVersion && storedVersion !== this.version) {
                        localStorage.setItem('crm_version', this.version);
                        window.location.reload(true);
                        return;
                    }
                    localStorage.setItem('crm_version', this.version);
                    const saved = localStorage.getItem('crm_db_v8');
                    if (saved) { this.clients = JSON.parse(saved); }
                    const savedSettings = localStorage.getItem('crm_settings');
                    if (savedSettings) this.settings = { ...this.settings, ...JSON.parse(savedSettings) };
                },

                formatInput(v) { 
                    if (!v) return '';
                    let str = String(v).replace(/[^0-9.]/g, ''); 
                    let parts = str.split('.');
                    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                    return parts.length > 1 ? parts[0] + '.' + parts[1] : parts[0];
                },

                get filteredClients() { 
                    let res = this.clients.filter(c => !c.isDeleted);
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        res = res.filter(c => (c.owner && c.owner.toLowerCase().includes(q)) || (c.phone && c.phone.includes(q)));
                    }
                    return res;
                },

                saveDB() { localStorage.setItem('crm_db_v8', JSON.stringify(this.clients)); },
                createNewClient() { 
                    this.client = { id: Date.now(), owner: '', policies: [], claimEvents: [], isDeleted: false };
                    this.addPolicy(); this.view = 'detail'; 
                },
                openClient(c) { this.client = JSON.parse(JSON.stringify(c)); this.view = 'detail'; },
                saveCurrentClient(stay) { 
                    const idx = this.clients.findIndex(c => c.id === this.client.id);
                    if (idx > -1) this.clients[idx] = this.client; else this.clients.push(this.client); 
                    this.saveDB(); if(!stay) { alert('已儲存'); this.view = 'list'; }
                },
                addPolicy() { this.client.policies.push({ insurer: 'AIA', items: [{ category: 'Medical', name: '' }], paymentMode: 'Yearly', isCancelled: false }); },
                formatName(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; },
                getAge(d) { if(!d) return ''; return new Date().getFullYear() - new Date(d).getFullYear(); },
                getWhatsappLink() { return this.client.phone ? `https://wa.me/852${this.client.phone.replace(/[^0-9]/g,'')}` : '#'; },

                openUploadModal() { this.uploadModal.open = true; },
                uploadToCloud() {
                    this.uploadModal.loading = true;
                    const uniqueId = Date.now().toString(36);
                    let d = JSON.parse(JSON.stringify(this.client));
                    // 移除密碼機制，密碼傳送空字串
                    const finalPayload = { forceId: uniqueId, password: '', payload: JSON.stringify(d) };
                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(finalPayload) })
                    .then(r => r.json()).then(data => {
                        this.uploadModal.loading = false;
                        this.generateQR(data.id || uniqueId);
                    }).catch(() => { this.uploadModal.loading = false; this.generateQR(uniqueId); });
                },

                generateQR(id) {
                    this.uploadModal.open = false;
                    this.qrModal.open = true;
                    let url = window.location.href.split('?')[0] + '?id=' + id;
                    this.linkModal.url = url;
                    document.getElementById("qr-loading").style.display = "flex";
                    document.getElementById("qr-image-visible").style.display = "none";
                    setTimeout(() => {
                        const container = document.getElementById("qr-container-hidden");
                        container.innerHTML = "";
                        new QRCode(container, { text: url, width: 300, height: 300 });
                        setTimeout(() => {
                            const canvas = container.querySelector('canvas');
                            if (canvas) {
                                document.getElementById("qr-image-visible").src = canvas.toDataURL("image/png");
                                document.getElementById("qr-image-visible").style.display = 'block';
                                document.getElementById("qr-loading").style.display = "none";
                            }
                        }, 200);
                    }, 100);
                },
                copyLink() { navigator.clipboard.writeText(this.linkModal.url).then(()=>alert('連結已複製!')); }
            }
        }

        // ==================== 客戶 (Client) 邏輯 ====================
        function dashboardApp() {
            return {
                client: {}, hasData: false, loadingMsg: '正在載入您的專屬報告...',
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    const data = params.get('data');
                    if (data) {
                        try {
                            const json = decodeURIComponent(atob(data).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                            this.processData(JSON.parse(json));
                        } catch(e) { this.loadingMsg = '資料解析失敗'; }
                    } else if (id) {
                        // 無密碼直接獲取資料 (GAS 端需配合不檢查空密碼)
                        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'get', id: id, password: '' }) })
                        .then(r => r.json()).then(res => {
                            if (res.result === 'success') { this.processData(res.data); }
                            else { this.loadingMsg = '無法獲取資料'; }
                        }).catch(() => { this.loadingMsg = '連線失敗'; });
                    }
                },
                processData(raw) {
                    let d = raw;
                    if (typeof d === 'string') d = JSON.parse(d);
                    if (d.payload) d = typeof d.payload === 'string' ? JSON.parse(d.payload) : d.payload;
                    this.client = d;
                    this.hasData = true;
                    this.$nextTick(() => { this.initChart(); });
                },
                formatNumber(n) { return n ? parseFloat(String(n).replace(/,/g, '')).toLocaleString() : '-'; },
                getTotalPremium() {
                    return (this.client.policies || []).reduce((s, p) => s + (parseFloat(String(p.premium||'').replace(/,/g, '')) || 0), 0);
                },
                initChart() {
                    const ctx = document.getElementById('gapRadarChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['醫療', '危疾', '人壽', '教育金', '退休'],
                            datasets: [{ label: '現有保障', data: [85, 40, 60, 75, 30], backgroundColor: 'rgba(30, 58, 138, 0.4)', borderColor: '#1e3a8a', borderWidth: 2 }]
                        },
                        options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } }
                    });
                }
            }
        }
    </script>
