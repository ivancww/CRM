<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保險管家 v1.8.6 (Admin - Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-100 pb-20">
    <div x-data="app()" x-cloak>
        <div x-show="qrModal.open" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90" x-cloak>
            <div class="bg-white w-80 rounded-lg shadow-xl p-6 text-center relative z-50">
                <h3 class="font-bold text-gray-800 mb-3">專屬連結已建立</h3>
                <div class="flex justify-center mb-2 bg-white p-2 border rounded relative" style="min-height: 300px;">
                    <img id="qr-image-visible" src="" class="w-full h-auto object-contain mx-auto" style="display:none;">
                    <div id="qr-loading" class="absolute inset-0 flex items-center justify-center text-gray-400">生成中...</div>
                </div>
                <button @click="copyLink()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mb-3">複製連結</button>
                <button @click="qrModal.open = false" class="text-gray-400 text-sm">關閉</button>
            </div>
        </div>

        <script>
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYO6N0HpwDxmZbLomkyDD0DGuBSEbJzJyn9PFPkMRRnFkkLusSPQbHO0DOyh_nzw18qg/exec';

            function app() {
                return {
                    version: '1.8.6',
                    // 這裡貼上你原本的所有狀態變數 (clients, client, view 等)
                    qrModal: { open: false }, linkModal: { url: '' }, uploadModal: { open: false, loading: false },
                    
                    // 雲端同步與備份轉移工具
                    uploadToCloud() {
                        this.uploadModal.loading = true;
                        this.saveCurrentClient(true);
                        let id = 'c' + Date.now();
                        fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'save', id: id, client: this.client })
                        }).then(r => r.json()).then(() => {
                            this.uploadModal.loading = false;
                            this.uploadModal.open = false;
                            this.generateQR(id);
                        }).catch(e => { alert('連線資料庫失敗'); this.uploadModal.loading = false; });
                    },
                    
                    migrateBackupToGAS(jsonArray) {
                        jsonArray.forEach(c => {
                            fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'save', id: 'c'+Date.now(), client: c }) });
                        });
                        alert('遷移完成！');
                    },

                    generateQR(id) {
                        this.qrModal.open = true;
                        let url = "https://ivancww.github.io/CRM/client.html?id=" + id;
                        this.linkModal.url = url;
                        let img = document.getElementById("qr-image-visible");
                        img.src = "https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=" + encodeURIComponent(url);
                        img.onload = () => { document.getElementById("qr-loading").style.display = "none"; img.style.display = 'block'; };
                    },
                    
                    copyLink() { navigator.clipboard.writeText(this.linkModal.url).then(()=>alert('連結已複製!')); },
                    
                    // 這裡貼上你原本的所有函數 (init, exportAllData, importAllData, saveDB 等)
                    init() { /* 原有 init */ }
                }
            }
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js?v=1.8.6'); }
        </script>
    </div>
</body>
</html>
