<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保險管家 (Admin - Cloud)</title>
    
    <!-- iOS 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="manifest-admin.json">
    <link rel="icon" type="image/png" href="admin-logo-192.png">
    <link rel="apple-touch-icon" href="admin-logo-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .gold-alert { background: linear-gradient(135deg, #fff7e6 0%, #ffecb3 100%); border: 2px solid #ffc107 !important; animation: pulse 2s infinite; }
        .center-cell { display: flex; align-items: center; justify-content: center; height: 100%; }
        .web-frame { width: 100%; height: 80vh; border: none; }
        input::-webkit-calendar-picker-indicator { opacity: 100; color: #888; }
        #qrcode-container { display: none; }
        .policy-cancelled { opacity: 0.85; background-color: #f9fafb !important; border-color: #d1d5db !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20" x-data="app()">

    <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold cursor-pointer" @click="view = 'list'"><i class="fa-solid fa-cloud mr-2"></i>保險管家 (雲端版)</h1>
            <div class="flex items-center gap-2">
                <button @click="showSettingsModal = true" class="text-gray-300 hover:text-white px-2"><i class="fa-solid fa-gear"></i></button>
                
                <div x-show="view === 'list'" class="flex gap-2">
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-database"></i></button>
                        <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded shadow-xl z-50 text-gray-800 overflow-hidden" x-cloak>
                            <a href="#" @click.prevent="exportAllData(); open = false" class="block px-4 py-3 hover:bg-gray-100 text-sm border-b">備份全部</a>
                            <a href="#" @click.prevent="document.getElementById('importFile').click(); open = false" class="block px-4 py-3 hover:bg-gray-100 text-sm">還原備份</a>
                            <input type="file" id="importFile" @change="importAllData($event)" class="hidden" accept=".json, application/json">
                        </div>
                    </div>
                    <button @click="handleWebClick()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded text-sm"><i class="fa-solid fa-globe"></i></button>
                    <button @click="createNewClient()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div x-show="view === 'detail'" class="flex gap-2">
                    <button @click="saveCurrentClient(); view = 'list'" class="bg-gray-600 hover:bg-gray-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-arrow-left"></i></button>
                    <div class="h-6 w-px bg-gray-500 mx-1"></div>
                    <button @click="handleWebClick()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded text-sm"><i class="fa-solid fa-globe"></i></button>
                    <button @click="openUploadModal()" class="bg-yellow-500 hover:bg-yellow-600 px-3 py-2 rounded text-sm font-bold text-white border border-yellow-600 shadow-md"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                    <button @click="saveCurrentClient(true)" class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto p-4 max-w-5xl">
        <!-- 列表頁面 -->
        <div x-show="view === 'list'" x-transition>
            <div class="mb-6 flex flex-col md:flex-row gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" x-model="searchQuery" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" class="w-full p-3 pl-10 rounded-lg border shadow-sm focus:ring-2 focus:ring-blue-400" placeholder="搜尋客戶、受保人、電話...">
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <!-- 加入「健康程式」篩選 -->
                    <select x-model="typeFilter" class="flex-1 md:w-32 p-2 rounded-lg border-2 border-purple-200 shadow-sm focus:ring-2 focus:ring-purple-500 bg-white font-bold text-gray-700 text-sm cursor-pointer">
                        <option value="">☂️ 所有類型</option>
                        <option value="CI">危疾</option>
                        <option value="Accident">意外</option>
                        <option value="Medical">醫療</option>
                        <option value="Savings">儲蓄</option>
                        <option value="Fund">基金</option>
                        <option value="Home">家居保</option>
                        <option value="MPF">強積金</option>
                        <option value="Wellness">健康程式</option>
                    </select>
                    <select x-model="renewalFilter" class="flex-1 md:w-32 p-2 rounded-lg border-2 border-green-200 shadow-sm focus:ring-2 focus:ring-green-500 bg-white font-bold text-gray-700 text-sm cursor-pointer">
                        <option value="">📅 所有月份</option>
                        <!-- ... 1-12月 ... -->
                        <template x-for="m in 12">
                            <option :value="m" x-text="m + '月 續保'"></option>
                        </template>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="(c, index) in filteredClients" :key="c.id || index">
                    <div @click="openClient(c)" class="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-md transition border-l-4 relative group" :class="c.isDeleted ? 'border-red-400 bg-red-50 opacity-90' : 'border-blue-500'">
                        <div class="font-bold text-lg flex items-center" :class="c.isDeleted ? 'text-gray-500' : 'text-gray-800'">
                            <span class="text-sm font-bold mr-2" :class="c.isDeleted ? 'text-gray-400' : 'text-blue-500'" x-text="(index + 1) + '.'"></span>
                            <span x-text="c.owner || '未命名'" :class="c.isDeleted ? 'line-through' : ''"></span>
                            <span x-show="c.isDeleted" class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded ml-2 font-bold" x-cloak>已刪除</span>
                        </div>
                        <div class="text-sm text-gray-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> <span x-text="c.phone || '-'"></span></div>
                        <div class="text-xs text-gray-400 mt-2">有效保單: <span x-text="(c.policies || []).filter(p=>!p.isCancelled).length"></span></div>
                        <div x-show="renewalFilter && hasRenewalMatch(c)" class="mt-2 text-xs text-green-600 font-bold bg-green-50 inline-block px-1 rounded">
                            <i class="fa-solid fa-check"></i> <span x-text="renewalFilter"></span>月有續保
                        </div>
                        <button @click.stop="deleteClient(c.id)" x-show="!c.isDeleted" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button>
                        <div x-show="c.isDeleted" class="absolute top-4 right-4 flex gap-3 opacity-0 group-hover:opacity-100 transition" x-cloak>
                            <button @click.stop="restoreClient(c.id)" class="text-gray-400 hover:text-green-500"><i class="fa-solid fa-rotate-left"></i></button>
                            <button @click.stop="permanentDeleteClient(c.id)" class="text-gray-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- 詳情頁面 -->
        <div x-show="view === 'detail'" x-transition x-cloak>
            
            <div x-show="client.isDeleted" class="bg-red-50 border-l-4 border-red-500 p-4 mb-4 rounded-r-lg shadow-sm flex justify-between items-center" x-cloak>
                <div>
                    <h3 class="text-red-800 font-bold text-sm">此客戶資料已移至「已刪除」名單</h3>
                </div>
                <button @click="restoreClient(client.id); client.isDeleted = false;" class="bg-red-100 text-red-700 px-4 py-2 rounded text-sm font-bold">還原資料</button>
            </div>

            <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-blue-500" :class="client.isDeleted ? 'opacity-70 pointer-events-none' : ''">
                <h2 class="text-xl font-bold mb-4 text-blue-700">客戶資料 (管理員版)</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold mb-1 text-blue-600">持有人 / 戶口名稱</label>
                        <input type="text" x-model="client.owner" @blur="client.owner = formatName(client.owner)" autocomplete="off" class="w-full border rounded p-2">
                    </div>
                    
                    <!-- 還原生日本欄位 + 增加歲數顯示 -->
                    <div>
                        <label class="block text-sm font-bold mb-1 text-blue-600">
                            生日 <span x-show="client.dob" class="ml-1 text-xs text-gray-400" x-text="'(' + getAge(client.dob) + ' 歲)' "></span>
                        </label>
                        <div class="flex gap-1">
                            <input type="date" x-model="client.dob" class="w-full border rounded p-2 text-sm">
                            <button @click="sendWhatsappMessage('birthday', client)" class="bg-[#25D366] px-2 rounded text-white shadow-sm"><i class="fa-brands fa-whatsapp"></i></button>
                        </div>
                    </div>
                    
                    <div><label class="block text-sm font-bold mb-1">電話</label><div class="flex gap-1"><input type="tel" x-model="client.phone" class="w-full border rounded p-2"><a :href="getWhatsappLink()" target="_blank" class="bg-gray-200 px-3 py-2 rounded text-gray-700 flex items-center justify-center"><i class="fa-solid fa-message"></i></a></div></div>
                    <div><label class="block text-sm font-bold mb-1">家庭</label><select x-model="client.marital" class="w-full border rounded p-2"><option value="Single">未婚</option><option value="Married">已婚</option></select></div>
                    <div><label class="block text-sm font-bold mb-1">小朋友</label><select x-model="client.children" class="w-full border rounded p-2"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4+">4+</option></select></div>
                    <div class="md:col-span-2"><label class="block text-sm font-bold mb-1">職業</label><input type="text" x-model="client.occupation" class="w-full border rounded p-2"></div>
                </div>

                <div class="border-t border-dashed border-gray-300 pt-4 mt-2" x-data="{ showFNA: false }">
                    <div class="flex justify-between items-center mb-3 cursor-pointer select-none" @click="showFNA = !showFNA">
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">財務狀況 (FNA)</h3>
                        <div class="text-gray-400 text-xs"><span x-show="!showFNA">顯示詳情 <i class="fa-solid fa-chevron-down"></i></span><span x-show="showFNA">隱藏 <i class="fa-solid fa-chevron-up"></i></span></div>
                    </div>
                    <div x-show="showFNA" x-transition>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div><label class="block text-xs font-bold mb-1">每月收入</label><input type="text" x-model="client.income" @blur="client.income = formatInput(client.income)" class="w-full border rounded p-2 text-sm"></div>
                            <div><label class="block text-xs font-bold mb-1">流動資產</label><input type="text" x-model="client.liquidAssets" @blur="client.liquidAssets = formatInput(client.liquidAssets)" class="w-full border rounded p-2 text-sm"></div>
                            <div><label class="block text-xs font-bold mb-1">物業市值</label><input type="text" x-model="client.property" @blur="client.property = formatInput(client.property)" class="w-full border rounded p-2 text-sm"></div>
                            <div><label class="block text-xs font-bold mb-1">其他投資</label><input type="text" x-model="client.investment" @blur="client.investment = formatInput(client.investment)" class="w-full border rounded p-2 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 保單卡片區域 (餘下部分保持不變...) -->
            <div :class="client.isDeleted ? 'opacity-70 pointer-events-none' : ''">
                <template x-for="(policy, pIndex) in client.policies" :key="pIndex">
                    <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 relative" :class="policy.isCancelled ? 'policy-cancelled' : 'border-green-500'">
                        <button @click="removePolicy(pIndex)" class="absolute top-4 right-4 text-gray-400 hover:text-red-500" x-show="!policy.isCancelled"><i class="fa-solid fa-times text-xl"></i></button>
                        <div class="flex flex-wrap items-end gap-3 mb-4 border-b pb-3">
                            <h2 class="text-xl font-bold" :class="policy.isCancelled ? 'text-gray-600' : 'text-green-700'">保單 (#<span x-text="pIndex + 1"></span>)</h2>
                            <div class="flex-1"><label class="block text-[10px] font-bold">保險公司</label><input type="text" list="insurer-list" x-model="policy.insurer" :disabled="policy.isCancelled" class="w-full border rounded py-1 px-2 text-sm"></div>
                            <div class="w-40"><label class="block text-[10px] font-bold">保單號碼</label><input type="text" x-model="policy.policyNo" :disabled="policy.isCancelled" class="w-full border rounded py-1 px-2 text-sm font-mono"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-7 gap-3 mb-4 p-4 rounded-lg bg-green-50 items-end">
                            <div class="md:col-span-2 relative">
                                <label class="block text-xs font-bold text-purple-600">受保人</label>
                                <input type="text" x-model="policy.insuredPerson" @blur="policy.insuredPerson = formatName(policy.insuredPerson)" autocomplete="off" class="w-full border rounded p-2 text-sm">
                            </div>
                            <div class="md:col-span-1"><label class="block text-xs font-bold">生效日</label><input type="date" x-model="policy.effectDate" class="w-full border rounded p-2 text-sm"></div>
                            <div class="md:col-span-1"><label class="block text-xs font-bold">繳費</label><select x-model="policy.paymentMode" class="w-full border rounded p-2 text-sm"><option value="Yearly">年</option><option value="Monthly">月</option></select></div>
                            <div class="md:col-span-2"><label class="block text-xs font-bold">續保日期</label><input type="date" x-model="policy.dueDate" class="w-full border rounded p-2 text-sm"></div>
                            <div class="md:col-span-1"><label class="block text-xs font-bold">保費(HK$)</label><input type="text" x-model="policy.premium" @blur="policy.premium = formatInput(policy.premium)" class="w-full border rounded p-2 text-sm"></div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-gray-100 text-xs"><tr><th class="px-2 py-2">#</th><th class="px-2">類別</th><th class="px-2">產品名稱</th><th class="px-2">保額</th><th class="px-2">自付</th><th class="px-2">年期</th><th class="px-2">到期日</th><th class="px-2 text-center">操作</th></tr></thead>
                                <tbody>
                                    <template x-for="(item, iIndex) in policy.items" :key="iIndex">
                                        <tr class="border-b">
                                            <td class="px-2 py-2 text-center" x-text="iIndex === 0 ? '主' : iIndex"></td>
                                            <td class="px-2"><select x-model="item.category" class="w-full border rounded p-1 text-xs"><option value="Medical">醫療</option><option value="CI">危疾</option><option value="Life">人壽</option><option value="Accident">意外</option><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="MPF">強積金</option><option value="Home">家居保</option><option value="Wellness">健康程式</option></select></td>
                                            <td class="px-2"><input type="text" x-model="item.name" class="w-full border rounded p-1 text-xs"></td>
                                            <td class="px-2"><input type="text" x-model="item.sumAssured" @blur="item.sumAssured = formatInput(item.sumAssured)" class="w-full border rounded p-1 text-xs"></td>
                                            <td class="px-2"><input type="text" x-model="item.deductible" @blur="item.deductible = formatInput(item.deductible)" class="w-full border rounded p-1 text-xs"></td>
                                            <td class="px-2"><input type="text" x-model="item.term" class="w-full border rounded p-1 text-xs"></td>
                                            <td class="px-2"><select x-model="item.maturity" class="w-full border rounded p-1 text-xs"><option value="">-</option><option value="終身">終身</option><option value="100歲">100歲</option><option value="85歲">85歲</option></select></td>
                                            <td class="px-2 text-center"><button @click="policy.items.splice(iIndex,1)" x-show="iIndex > 0" class="text-red-500"><i class="fa-solid fa-trash"></i></button></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                        <div class="mt-4 flex justify-between items-center border-t pt-3">
                            <label class="flex items-center text-red-500 text-sm font-bold"><input type="checkbox" x-model="policy.isCancelled" @change="togglePolicyCancel(policy)" class="mr-2"> 終止保單</label>
                            <button @click="addRider(pIndex)" class="text-blue-600 font-bold">+ 附約</button>
                        </div>
                    </div>
                </template>
                <button @click="addPolicy()" class="w-full py-3 border-2 border-dashed border-green-300 text-green-600 rounded-lg font-bold">+ 新保單</button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOgcd8Z3nnYtbwgJQ46Fk5imt1mBhYbtSmxTiE0Edgl5M881Ymj8F_J7He8yChffiU/exec'; 

        function app() {
            return {
                view: 'list', searchQuery: '', renewalFilter: '', typeFilter: '', clients: [], client: {}, 
                uploadModal: { open: false, password: '', loading: false },
                qrModal: { open: false, url: '' }, linkModal: { url: '' },
                showSettingsModal: false, showWebActionModal: false, showConfigModal: false, showWebFrame: false,
                currentWebUrl: '', calendarModal: { open: false, type: '', data: null },
                webLinks: [{ name: '危疾資訊', url: 'https://www.google.com/search?q=Critical+Illness+Info&igu=1', type: 'url' }],
                settings: { waBirthday: '親愛的 {{name}}，祝您生日快樂！', waRenewal: '親愛的 {{name}}，您的保單將到期。' },

                init() {
                    const saved = localStorage.getItem('crm_db_v8');
                    if (saved) this.clients = JSON.parse(saved);
                    const savedSettings = localStorage.getItem('crm_settings');
                    if (savedSettings) this.settings = JSON.parse(savedSettings);
                },

                get filteredClients() { 
                    let res = this.clients;
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        res = res.filter(c => (c.owner && c.owner.toLowerCase().includes(q)) || (c.phone && c.phone.includes(q)) || (c.policies && c.policies.some(p => p.insuredPerson && p.insuredPerson.toLowerCase().includes(q))));
                    } else {
                        res = res.filter(c => !c.isDeleted);
                    }
                    if (this.typeFilter) {
                        res = res.filter(c => c.policies && c.policies.some(p => !p.isCancelled && p.items && p.items.some(i => i.category === this.typeFilter)));
                    }
                    if (this.renewalFilter) {
                        res = res.filter(c => c.policies && c.policies.some(p => !p.isCancelled && this.isMatchRenewal(p)));
                    }
                    return res;
                },

                // 新增：計算歲數
                getAge(dob) {
                    if (!dob) return '';
                    const birthDate = new Date(dob);
                    const today = new Date();
                    let age = today.getFullYear() - birthDate.getFullYear();
                    const m = today.getMonth() - birthDate.getMonth();
                    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
                    return age;
                },

                formatName(str) {
                    if (!str) return '';
                    return str.replace(/\b([a-zA-Z])([a-zA-Z]*)\b/g, (m, p1, p2) => p1.toUpperCase() + p2.toLowerCase());
                },

                isMatchRenewal(p) {
                    if (!p.dueDate || p.isCancelled) return false;
                    return (new Date(p.dueDate).getMonth() + 1).toString() === this.renewalFilter;
                },
                hasRenewalMatch(c) { return c.policies && c.policies.some(p => !p.isCancelled && this.isMatchRenewal(p)); },
                
                createNewClient() { this.client = { id: Date.now(), owner: '', policies: [], claimEvents: [], isDeleted: false }; this.addPolicy(); this.view = 'detail'; },
                openClient(c) { this.client = JSON.parse(JSON.stringify(c)); this.view = 'detail'; },
                saveCurrentClient(stay) { const idx = this.clients.findIndex(c => c.id === this.client.id); if (idx > -1) this.clients[idx] = this.client; else this.clients.push(this.client); this.saveDB(); if(!stay) alert('已儲存'); },
                deleteClient(id) { if(confirm('移至已刪除名單？')) { const idx = this.clients.findIndex(c => c.id === id); if(idx > -1) { this.clients[idx].isDeleted = true; this.saveDB(); } } },
                restoreClient(id) { const idx = this.clients.findIndex(c => c.id === id); if(idx > -1) { this.clients[idx].isDeleted = false; this.saveDB(); } },
                permanentDeleteClient(id) { if(confirm('永久刪除不可復原！')) { this.clients = this.clients.filter(c => c.id !== id); this.saveDB(); } },
                saveDB() { localStorage.setItem('crm_db_v8', JSON.stringify(this.clients)); },
                
                exportAllData() { 
                    const blob = new Blob([JSON.stringify(this.clients, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `CRM_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
                },
                importAllData(e) { 
                    const reader = new FileReader(); reader.onload = (ev) => { this.clients = JSON.parse(ev.target.result); this.saveDB(); alert('還原成功'); }; reader.readAsText(e.target.files[0]); 
                },
                addPolicy() { this.client.policies.push({ insurer: 'AIA', items: [{ category: 'Medical' }], paymentMode: 'Yearly' }); },
                removePolicy(i) { this.client.policies.splice(i,1); },
                togglePolicyCancel(p) { p.cancelDate = p.isCancelled ? new Date().toISOString().split('T')[0] : ''; },
                addRider(i) { this.client.policies[i].items.push({ category: 'Medical' }); },
                formatInput(v) { if (!v) return ''; let val = parseFloat(v.toString().replace(/,/g, '')); return isNaN(val) ? v : val.toLocaleString('en-US'); },
                getWhatsappLink() { return this.client.phone ? `https://wa.me/852${this.client.phone.replace(/[^0-9]/g,'')}` : '#'; },
                handleWebClick() { this.showWebActionModal = true; },
                openWebFrame(url) { this.currentWebUrl = url; this.showWebFrame = true; },
                openUploadModal() { this.uploadModal.open = true; },
                uploadToCloud() { /* 保持原有的 Google Script 上傳邏輯 */ },
                generateQR(id) { /* 保持原有的 QR 生成邏輯 */ },
                sendWhatsappMessage(t, c) { /* 保持原有的 WA 邏輯 */ }
            }
        }
    </script>
