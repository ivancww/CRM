<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<script>
    const params = new URLSearchParams(window.location.search);
    window.isClientView = params.has('data') || params.has('id');
    if(window.isClientView){
        document.title = "我的財富與保障儀表板";
        document.write('<link rel="manifest" href="manifest-client.json">');
    } else {
        document.title = "保險管家 v1.6.4 (Admin - Cloud)";
        document.write('<link rel="manifest" href="manifest-admin.json">');
    }
</script>
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.tailwindcss.com"></script><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>[x-cloak]{display:none !important;}.gold-alert{background:linear-gradient(135deg,#fff7e6 0%,#ffecb3 100%);border:2px solid #ffc107 !important;animation:pulse 2s infinite;}.policy-cancelled{opacity:0.85;background-color:#f9fafb !important;border-color:#d1d5db !important;}.gradient-bg{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 100%);}</style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

<div x-show="!window.isClientView" x-data="app()" x-cloak>
    <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50 print:hidden">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold cursor-pointer" @click="view='list'"><i class="fa-solid fa-cloud mr-2"></i>保險管家<span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded ml-1" x-text="'v'+version"></span></h1>
            <div class="flex items-center gap-2">
                <button @click="showSettingsModal=true" class="text-gray-300 hover:text-white px-2"><i class="fa-solid fa-gear"></i></button>
                <div x-show="view==='list'" class="flex gap-2">
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open=!open" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-database"></i></button>
                        <div x-show="open" @click.away="open=false" class="absolute right-0 mt-2 w-48 bg-white rounded shadow-xl z-50 text-gray-800 overflow-hidden" x-cloak>
                            <a href="#" @click.prevent="exportAllData(); open=false" class="block px-4 py-3 hover:bg-gray-100 text-sm border-b">備份全部</a>
                            <label class="block px-4 py-3 hover:bg-gray-100 text-sm cursor-pointer mb-0 relative">還原備份<input type="file" @change="importAllData($event); open=false" accept=".json, application/json" class="absolute w-full h-full top-0 left-0 opacity-0 cursor-pointer"></label>
                        </div>
                    </div>
                    <button @click="createNewClient()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div x-show="view==='detail'" class="flex gap-2">
                    <button @click="saveCurrentClient(); view='list'" class="bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-arrow-left"></i></button>
                    <button @click="saveCurrentClient(true)" class="bg-green-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto p-4 max-w-5xl print:hidden">
        <div x-show="view==='list'" x-transition>
            <div class="mb-4 flex flex-col md:flex-row gap-2">
                <div class="relative flex-1"><i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i><input type="text" x-model="searchQuery" class="w-full p-3 pl-10 rounded-lg border shadow-sm" placeholder="搜尋客戶、電話..."></div>
                <select x-model="typeFilter" class="p-3 rounded-lg border shadow-sm font-bold text-gray-700 text-sm"><option value="">☂️ 類型</option><option value="CI">危疾</option><option value="Medical">醫療</option><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="Wellness">健康程式</option></select>
                <select x-model="birthdayFilter" class="p-3 rounded-lg border shadow-sm font-bold text-gray-700 text-sm"><option value="">🎂 生日</option><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="(c, index) in filteredClients" :key="c.id || index">
                    <div @click="openClient(c)" class="bg-white p-4 rounded-lg shadow cursor-pointer border-l-4 relative group" :class="c.isDeleted?'border-red-400 bg-red-50':'border-blue-500'">
                        <div class="font-bold text-lg"><span class="text-sm mr-2 text-blue-500" x-text="index+1+'.'"></span><span x-text="c.owner||'未命名'" :class="c.isDeleted?'line-through':''"></span></div>
                        <div class="text-sm text-gray-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> <span x-text="c.phone||'-'"></span></div>
                        <button @click.stop="deleteClient(c.id)" x-show="!c.isDeleted" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view==='detail'" x-transition x-cloak>
            <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-4 text-blue-700">客戶資料</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2"><label class="block text-sm font-bold mb-1 text-blue-600">持有人</label><input type="text" x-model="client.owner" class="w-full border rounded p-2"></div>
                    <div><label class="block text-sm font-bold mb-1 text-blue-600">生日</label><input type="date" x-model="client.dob" class="w-full border rounded p-2"></div>
                    <div><label class="block text-sm font-bold mb-1">電話</label><input type="tel" x-model="client.phone" class="w-full border rounded p-2"></div>
                </div>
            </div>

            <template x-for="(policy, pIndex) in (client.policies || [])" :key="pIndex">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 relative" :class="policy.isCancelled?'bg-gray-50 border-gray-300':'border-green-500'">
                    <button @click="removePolicy(pIndex)" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-times text-xl"></i></button>
                    <div class="flex gap-3 mb-4 border-b pb-3">
                        <div class="flex-1"><label class="block text-[10px] font-bold mb-1">保險公司</label><input type="text" x-model="policy.insurer" class="w-full border rounded p-2 text-sm font-bold"></div>
                        <div class="flex-1"><label class="block text-[10px] font-bold mb-1">保單號碼</label><input type="text" x-model="policy.policyNo" class="w-full border rounded p-2 text-sm font-mono"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4 p-4 bg-green-50 rounded-lg items-end">
                        <div class="md:col-span-2"><label class="block text-xs font-bold mb-1 text-purple-600">受保人</label><input type="text" x-model="policy.insuredPerson" class="w-full border rounded p-2 text-sm"></div>
                        <div><label class="block text-xs font-bold mb-1">保費(HK$)</label><input type="text" x-model="policy.premium" @input="policy.premium=formatInput($event.target.value)" class="w-full border rounded p-2 text-sm"></div>
                        <div><label class="block text-xs font-bold mb-1">續保日</label><input type="date" x-model="policy.dueDate" class="w-full border rounded p-2 text-sm"></div>
                    </div>
                    <table class="w-full text-sm text-left text-gray-500 mb-2">
                        <thead class="text-xs text-gray-700 bg-gray-100"><tr><th class="p-2">類別</th><th class="p-2">產品名稱</th><th class="p-2">保額</th><th class="p-2">自付</th><th class="p-2">操作</th></tr></thead>
                        <tbody>
                            <template x-for="(item, iIndex) in (policy.items||[])" :key="iIndex">
                                <tr class="border-b">
                                    <td class="p-1"><select x-model="item.category" class="w-full border rounded p-1 text-xs"><option value="Medical">醫療</option><option value="CI">危疾</option><option value="Life">人壽</option><option value="Accident">意外</option><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="Wellness">健康程式</option></select></td>
                                    <td class="p-1"><input type="text" x-model="item.name" class="w-full border rounded p-1 text-xs"></td>
                                    <td class="p-1"><input type="text" x-model="item.sumAssured" @input="item.sumAssured=formatInput($event.target.value)" class="w-full border rounded p-1 text-xs"></td>
                                    <td class="p-1"><input type="text" x-model="item.deductible" @input="item.deductible=formatInput($event.target.value)" class="w-full border rounded p-1 text-xs"></td>
                                    <td class="p-1 flex gap-1"><button @click="openRemarkModal(item)" class="w-6 h-6 rounded-full border text-xs" :class="item.remarks?'bg-red-100 text-red-600':'bg-gray-100'">!</button><button x-show="iIndex>0" @click="policy.items.splice(iIndex,1)" class="w-6 h-6 rounded-full text-red-500 bg-red-50"><i class="fa-solid fa-trash-can"></i></button></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    <div class="flex justify-between items-center"><label class="text-sm font-bold text-red-500"><input type="checkbox" x-model="policy.isCancelled"> 終止保單</label><button @click="addRider(pIndex)" class="text-blue-600 text-sm font-bold">+ 附約</button></div>
                </div>
            </template>
            <button @click="addPolicy()" class="w-full py-3 border-2 border-dashed border-green-300 text-green-600 rounded-lg hover:bg-green-50 mb-6 font-bold">+ 新保單</button>

            <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-purple-500">
                <h2 class="text-xl font-bold mb-4 text-purple-700">跟進事項</h2>
                <textarea x-model="client.remarks" class="w-full border rounded p-2 h-24" placeholder="輸入任何備註..."></textarea>
            </div>

            <button @click="updateSummary(); view='review'; window.scrollTo(0,0);" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-lg rounded-xl shadow-lg">進入 Review 模式</button>
        </div>

        <div x-show="view === 'review'" x-transition x-cloak class="max-w-4xl mx-auto bg-white md:rounded-2xl shadow-2xl overflow-hidden border border-gray-200">
            <div class="gradient-bg text-white p-6 flex justify-between items-center">
                <div><h1 class="text-2xl font-bold">家庭財富與保障報告</h1><p class="text-sm opacity-80" x-text="'致：'+(client.owner||'客戶')"></p></div>
                <div class="bg-white/10 p-3 rounded-xl text-center"><div class="text-xs text-blue-100">總保費</div><div class="text-xl font-bold text-yellow-300" x-text="'HK$ ' + formatNumber(protectionSummary.totalPremium)"></div></div>
            </div>

            <div class="p-6 space-y-6 bg-gray-50">
                <div>
                    <h2 class="text-lg font-bold text-[#1E3A8A] mb-4"><i class="fa-solid fa-shield-cat mr-2"></i>第一層：四大保障概覽</h2>
                    <template x-for="person in protectionSummary.insured" :key="person.name">
                        <div class="mb-6 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="bg-indigo-50 px-4 py-2 border-b border-indigo-100"><h3 class="font-bold text-indigo-800 text-md" x-text="'受保人：'+person.name"></h3></div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4">
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-red-400">
                                    <div class="text-xs text-gray-500 mb-1">🏥 醫療保障</div>
                                    <div class="text-sm font-bold text-gray-800 leading-relaxed">
                                        <template x-if="person.medicalHighEnd && person.medicalTraditional"><span>1. 高端醫療<br>2. 傳統醫療</span></template>
                                        <template x-if="person.medicalHighEnd && !person.medicalTraditional"><span class="text-lg">高端醫療</span></template>
                                        <template x-if="!person.medicalHighEnd && person.medicalTraditional"><span class="text-lg">傳統醫療</span></template>
                                        <template x-if="!person.medicalHighEnd && !person.medicalTraditional"><span class="text-lg text-gray-400">尚未配置</span></template>
                                    </div>
                                </div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-400"><div class="text-xs text-gray-500 mb-1">🛡️ 危疾保障</div><div class="text-lg font-bold text-gray-800" x-text="person.ciSum>0?'HK$ '+formatNumber(person.ciSum):'尚未配置'"></div></div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-400"><div class="text-xs text-gray-500 mb-1">🕊️ 人壽保障</div><div class="text-lg font-bold text-gray-800" x-text="person.lifeSum>0?'HK$ '+formatNumber(person.lifeSum):'尚未配置'"></div></div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-teal-400"><div class="text-xs text-gray-500 mb-1">🚑 意外保障</div><div class="text-sm font-bold text-gray-800" x-show="person.accDeathSum>0">身故: $<span x-text="formatNumber(person.accDeathSum)"></span></div><div class="text-sm font-bold text-gray-800 mt-1" x-show="person.accMedicalSum>0">醫療: $<span x-text="formatNumber(person.accMedicalSum)"></span></div><div class="text-lg font-bold text-gray-400" x-show="person.accDeathSum===0&&person.accMedicalSum===0">尚未配置</div></div>
                            </div>
                        </div>
                    </template>
                </div>

                <div>
                    <h2 class="text-lg font-bold text-[#1E3A8A] mb-4"><i class="fa-solid fa-bullseye mr-2"></i>第二層：人生藍圖與財務探索</h2>
                    <div x-data="{ open: true }" class="bg-white rounded-xl shadow-sm border border-gray-100 mb-4 relative">
                        <div class="absolute top-0 right-0 bg-blue-100 text-blue-600 text-[10px] px-2 py-1 rounded-bl font-bold">可編輯</div>
                        <div @click="open=!open" class="p-5 flex justify-between items-center cursor-pointer border-l-4 border-orange-400"><h3 class="font-bold text-gray-700">🌅 尊享未來生活與醫療儲備</h3></div>
                        <div x-show="open" class="p-5 border-t bg-gray-50 space-y-4">
                            <div><label class="block text-gray-600 font-bold mb-1 text-sm">理想退休生活</label><textarea x-model="client.fnaRetireVision" class="w-full border p-2 text-sm outline-none" rows="2"></textarea></div>
                            <div><label class="block text-gray-600 font-bold mb-1 text-sm">醫療保障安排</label><textarea x-model="client.fnaMedicalVision" class="w-full border p-2 text-sm outline-none" rows="2"></textarea></div>
                            <div><label class="block text-gray-600 font-bold mb-1 text-sm">現有財富工具</label><textarea x-model="client.fnaRetireTools" class="w-full border p-2 text-sm outline-none" rows="2"></textarea></div>
                            <div><label class="block text-gray-600 font-bold mb-1 text-sm">規劃方向/關注點</label><textarea x-model="client.fnaRetireGap" class="w-full border p-2 text-sm outline-none" rows="2"></textarea></div>
                        </div>
                    </div>
                    <div x-data="{ open: false }" class="bg-white rounded-xl shadow-sm border border-gray-100 mb-4 relative">
                        <div class="absolute top-0 right-0 bg-blue-100 text-blue-600 text-[10px] px-2 py-1 rounded-bl font-bold">可編輯</div>
                        <div @click="open=!open" class="p-5 flex justify-between items-center cursor-pointer border-l-4 border-green-500"><h3 class="font-bold text-gray-700">🎓 栽培下一代教育基金規劃</h3></div>
                        <div x-show="open" class="p-5 border-t bg-gray-50 space-y-4">
                            <div><label class="block text-gray-600 font-bold mb-1 text-sm">教育目標與期望</label><textarea x-model="client.fnaEduVision" class="w-full border p-2 text-sm outline-none" rows="2"></textarea></div>
                            <div><label class="block text-gray-600 font-bold mb-1 text-sm">為下一代進行的財富安排</label><textarea x-model="client.fnaEduTools" class="w-full border p-2 text-sm outline-none" rows="2"></textarea></div>
                            <div><label class="block text-gray-600 font-bold mb-1 text-sm">方向/關注點</label><textarea x-model="client.fnaEduGap" class="w-full border p-2 text-sm outline-none" rows="2"></textarea></div>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-bold text-[#1E3A8A] mb-4 pl-3 border-l-4 border-blue-600">保單明細一覽</h2>
                    <template x-for="(policy, index) in (client.policies || [])" :key="index">
                        <div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-4 overflow-hidden" x-show="!policy.isCancelled">
                            <div class="bg-blue-50/50 p-4 border-b flex justify-between items-center"><div><span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold mr-2" x-text="policy.insurer"></span><span class="font-bold text-gray-800">受保人：<span x-text="policy.insuredPerson || client.owner"></span></span></div></div>
                            <div class="p-2">
                                <template x-for="(item, iIndex) in (policy.items || [])">
                                    <div class="p-3 border-b hover:bg-gray-50"><div class="flex justify-between items-start mb-2"><div class="flex items-center gap-2"><span x-show="iIndex===0" class="bg-blue-600 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">主</span><span x-show="iIndex>0" class="bg-gray-200 text-gray-600 text-[10px] px-1.5 py-0.5 rounded">附</span><div><div class="font-bold text-sm" x-text="item.name"></div><div class="text-[10px]" :class="getCategoryColor(item.category)" x-text="item.category"></div></div></div><button x-show="item.remarks" @click="clientRemarkModal.text=item.remarks; clientRemarkModal.open=true" class="text-red-500 text-xs bg-red-50 p-1 rounded-full"><i class="fa-solid fa-exclamation px-1"></i></button></div><div class="grid grid-cols-2 gap-2 text-xs bg-gray-50 p-2 rounded"><div><span class="text-gray-400">保額:</span> <span class="font-mono font-bold" x-text="item.sumAssured?'$'+formatNumber(item.sumAssured):'-'"></span></div><div><span class="text-gray-400">自付:</span> <span class="font-mono font-bold" x-text="item.deductible?'$'+formatNumber(item.deductible):'-'"></span></div></div></div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
            
            <div class="bg-white border-t p-6 flex flex-col md:flex-row justify-between gap-4">
                <button @click="view='detail'; saveCurrentClient(true);" class="bg-gray-200 px-6 py-3 rounded-lg font-bold">🔙 結束並儲存</button>
                <button @click="updateSummary(); openUploadModal();" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold shadow-md"><i class="fa-solid fa-qrcode mr-2"></i> 生成分享 QR Code 畀客</button>
            </div>
        </div>

        <div x-show="uploadModal.open" style="display:none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75" x-cloak><div class="bg-white w-80 rounded-lg p-6 text-center"><h3 class="font-bold mb-2">建立連結</h3><button @click="uploadToCloud()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mb-3">確認生成</button><button @click="uploadModal.open=false" class="text-gray-400">取消</button></div></div>
        <div x-show="qrModal.open" style="display:none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90" x-cloak><div class="bg-white w-80 rounded-lg p-6 text-center"><h3 class="font-bold mb-3">連結已建立</h3><div class="mb-2 bg-white p-2 border rounded" style="min-height: 200px;"><img id="qr-image-visible" src="" class="w-full" style="display:none;"><div id="qr-container-hidden" style="display:none;"></div></div><button @click="copyLink()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mb-3">複製連結</button><button @click="qrModal.open=false" class="text-gray-400">關閉</button></div></div>
        <div x-show="itemRemarkModal.open" style="display:none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75" x-cloak><div class="bg-white w-96 rounded-lg p-4 m-4"><h3 class="font-bold mb-2">編輯備註</h3><textarea x-model="itemRemarkModal.item.remarks" class="w-full h-32 border rounded p-2 text-sm mb-4"></textarea><div class="flex justify-end"><button @click="itemRemarkModal.open=false" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">確定</button></div></div></div>
        <div x-show="clientRemarkModal.open" style="display:none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75 p-4" x-cloak><div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden"><div class="bg-red-500 p-4 text-center"><h3 class="font-bold text-white">備註</h3></div><div class="p-6"><div class="text-sm whitespace-pre-line" x-text="clientRemarkModal.text"></div><button @click="clientRemarkModal.open=false" class="mt-6 w-full bg-gray-100 font-bold py-3 rounded-xl">關閉</button></div></div></div>
    </div>
</div>

<div x-show="window.isClientView" x-data="dashboardApp()" x-cloak>
    <div x-show="!hasData" class="flex items-center justify-center min-h-screen text-gray-500 font-bold" x-text="loadingMsg"></div>
    <div x-show="hasData" class="max-w-4xl mx-auto md:mt-8 md:mb-8 bg-white md:rounded-2xl shadow-xl overflow-hidden" x-cloak>
        <div class="gradient-bg text-white p-6 md:p-8 flex justify-between items-center">
            <div><p class="text-blue-200 text-sm mb-1">親愛的 <span x-text="client.owner || '客戶'"></span>：</p><h1 class="text-2xl md:text-3xl font-bold">家庭財富與保障報告</h1></div>
            <div class="bg-white/10 p-3 rounded-xl text-center"><div class="text-xs text-blue-100">總保費</div><div class="text-xl font-bold text-yellow-300" x-text="'HK$ '+formatNumber(client.summary?.totalPremium)"></div></div>
        </div>
        <div class="p-4 md:p-8 space-y-8 bg-gray-50">
            <div>
                <h2 class="text-lg font-bold text-[#1E3A8A] mb-4"><i class="fa-solid fa-shield-cat mr-2"></i>第一層：四大保障概覽</h2>
                <template x-for="person in (client.summary?.insured||[])" :key="person.name">
                    <div class="mb-6 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"><div class="bg-indigo-50 px-4 py-2 border-b"><h3 class="font-bold text-indigo-800 text-md" x-text="'受保人：'+person.name"></h3></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4 p-4"><div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-red-400"><div class="text-xs text-gray-500 mb-1">🏥 醫療保障</div><div class="text-sm font-bold text-gray-800 leading-relaxed"><template x-if="person.medicalHighEnd && person.medicalTraditional"><span>1. 高端醫療<br>2. 傳統醫療</span></template><template x-if="person.medicalHighEnd && !person.medicalTraditional"><span class="text-lg">高端醫療</span></template><template x-if="!person.medicalHighEnd && person.medicalTraditional"><span class="text-lg">傳統醫療</span></template><template x-if="!person.medicalHighEnd && !person.medicalTraditional"><span class="text-lg text-gray-400">尚未配置</span></template></div></div><div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-400"><div class="text-xs text-gray-500 mb-1">🛡️ 危疾保障</div><div class="text-lg font-bold text-gray-800" x-text="person.ciSum>0?'HK$ '+formatNumber(person.ciSum):'尚未配置'"></div></div><div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-400"><div class="text-xs text-gray-500 mb-1">🕊️ 人壽保障</div><div class="text-lg font-bold text-gray-800" x-text="person.lifeSum>0?'HK$ '+formatNumber(person.lifeSum):'尚未配置'"></div></div><div class="bg-white p-4 rounded-xl shadow-sm border-t-4 border-teal-400"><div class="text-xs text-gray-500 mb-1">🚑 意外保障</div><div class="text-sm font-bold text-gray-800" x-show="person.accDeathSum>0">身故: $<span x-text="formatNumber(person.accDeathSum)"></span></div><div class="text-sm font-bold text-gray-800 mt-1" x-show="person.accMedicalSum>0">醫療: $<span x-text="formatNumber(person.accMedicalSum)"></span></div></div></div></div>
                </template>
            </div>
            <div>
                <h2 class="text-lg font-bold text-[#1E3A8A] mb-4"><i class="fa-solid fa-bullseye mr-2"></i>第二層：人生藍圖與財務探索</h2>
                <div x-data="{ open: false }" class="bg-white rounded-xl shadow-sm border border-gray-100 mb-4 overflow-hidden"><div @click="open=!open" class="p-5 flex justify-between cursor-pointer border-l-4 border-orange-400"><h3 class="font-bold text-gray-700">🌅 尊享未來生活與醫療儲備</h3></div><div x-show="open" class="p-5 border-t bg-gray-50 space-y-4"><div class="bg-white p-3 rounded-lg border"><div class="text-xs text-blue-500 font-bold mb-1">理想退休生活</div><div class="text-sm whitespace-pre-line" x-text="client.fnaRetireVision||'-'"></div></div><div class="bg-white p-3 rounded-lg border"><div class="text-xs text-blue-500 font-bold mb-1">醫療保障安排</div><div class="text-sm whitespace-pre-line" x-text="client.fnaMedicalVision||'-'"></div></div><div class="bg-white p-3 rounded-lg border"><div class="text-xs text-blue-500 font-bold mb-1">現有財富工具</div><div class="text-sm whitespace-pre-line" x-text="client.fnaRetireTools||'-'"></div></div><div class="bg-white p-3 rounded-lg border"><div class="text-xs text-blue-500 font-bold mb-1">規劃方向/關注點</div><div class="text-sm whitespace-pre-line" x-text="client.fnaRetireGap||'-'"></div></div></div></div>
                <div x-data="{ open: false }" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden"><div @click="open=!open" class="p-5 flex justify-between cursor-pointer border-l-4 border-green-500"><h3 class="font-bold text-gray-700">🎓 栽培下一代教育基金規劃</h3></div><div x-show="open" class="p-5 border-t bg-gray-50 space-y-4"><div class="bg-white p-3 rounded-lg border"><div class="text-xs text-green-600 font-bold mb-1">教育目標與期望</div><div class="text-sm whitespace-pre-line" x-text="client.fnaEduVision||'-'"></div></div><div class="bg-white p-3 rounded-lg border"><div class="text-xs text-green-600 font-bold mb-1">為下一代進行的財富安排</div><div class="text-sm whitespace-pre-line" x-text="client.fnaEduTools||'-'"></div></div><div class="bg-white p-3 rounded-lg border"><div class="text-xs text-green-600 font-bold mb-1">方向/關注點</div><div class="text-sm whitespace-pre-line" x-text="client.fnaEduGap||'-'"></div></div></div></div>
            </div>
            <div>
                <h2 class="text-xl font-bold text-[#1E3A8A] mb-4 pl-3 border-l-4 border-blue-600">保單明細一覽</h2>
                <template x-for="(policy, index) in (client.policies||[])"><div class="bg-white rounded-xl shadow-sm border border-gray-200 mb-4 overflow-hidden" x-show="!policy.isCancelled"><div class="bg-blue-50/50 p-4 border-b flex justify-between"><div><span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded font-bold mr-2" x-text="policy.insurer"></span><span class="font-bold text-gray-800">受保人：<span x-text="policy.insuredPerson||client.owner"></span></span></div></div><div class="p-2"><template x-for="(item, iIndex) in (policy.items||[])"><div class="p-3 border-b hover:bg-gray-50"><div class="flex justify-between mb-2"><div class="flex items-center gap-2"><span x-show="iIndex===0" class="bg-blue-600 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">主</span><span x-show="iIndex>0" class="bg-gray-200 text-gray-600 text-[10px] px-1.5 py-0.5 rounded">附</span><div><div class="font-bold text-sm" x-text="item.name"></div><div class="text-[10px]" :class="getCategoryColor(item.category)" x-text="item.category"></div></div></div><button x-show="item.remarks" @click="clientRemarkModal.text=item.remarks; clientRemarkModal.open=true" class="text-red-500 text-xs bg-red-50 p-1 rounded-full"><i class="fa-solid fa-exclamation"></i></button></div><div class="grid grid-cols-2 gap-2 text-xs bg-gray-50 p-2 rounded"><div><span class="text-gray-400">保額:</span> <span class="font-mono font-bold" x-text="item.sumAssured?'$'+formatNumber(item.sumAssured):'-'"></span></div><div><span class="text-gray-400">自付:</span> <span class="font-mono font-bold" x-text="item.deductible?'$'+formatNumber(item.deductible):'-'"></span></div></div></div></template></div></div></template>
            </div>
        </div>
        <div x-show="clientRemarkModal.open" style="display:none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75 p-4" x-cloak><div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden"><div class="bg-red-500 p-4 text-center"><h3 class="font-bold text-white">備註</h3></div><div class="p-6"><div class="text-sm whitespace-pre-line" x-text="clientRemarkModal.text"></div><button @click="clientRemarkModal.open=false" class="mt-6 w-full bg-gray-100 font-bold py-3 rounded-xl">關閉</button></div></div></div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOgcd8Z3nnYtbwgJQ46Fk5imt1mBhYbtSmxTiE0Edgl5M881Ymj8F_J7He8yChffiU/exec';
    
    function app() {
        return {
            version: '1.6.4', view: 'list', searchQuery: '', renewalFilter: '', birthdayFilter: '', typeFilter: '', clients: [], client: {}, 
            clientRemarkModal: { open: false, text: '' }, itemRemarkModal: { open: false, item: {} }, uploadModal: { open: false, loading: false }, qrModal: { open: false }, linkModal: { url: '' },
            init() { let v = localStorage.getItem('crm_version'); if(v && v !== this.version) { localStorage.setItem('crm_version', this.version); window.location.reload(true); return; } localStorage.setItem('crm_version', this.version); let s = localStorage.getItem('crm_db_v8'); if(s) this.clients = JSON.parse(s); },
            formatNumber(num) { if(!num) return '-'; const n = parseFloat(num.toString().replace(/,/g, '')); return isNaN(n)?num:n.toLocaleString('en-US'); },
            formatInput(v) { if(!v) return ''; let s = String(v).replace(/[^0-9.]/g, ''); let p = s.split('.'); if(p.length>2){p[1]=p.slice(1).join('');p.length=2;} p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g, ","); return p.length>1?p[0]+'.'+p[1]:p[0]; },
            getCategoryColor(c) { return ['Medical','CI','Life','Accident'].includes(c) ? 'text-red-500 font-bold' : (['Savings','Fund','MPF'].includes(c) ? 'text-blue-500 font-bold' : 'text-gray-600 font-bold'); },
            formatName(s) { return s?s.replace(/\b([a-zA-Z])([a-zA-Z]*)\b/g, (m,p1,p2)=>p1.toUpperCase()+p2.toLowerCase()):''; },
            getAge(dob) { if(!dob) return ''; const b=new Date(dob); const t=new Date(); let age=t.getFullYear()-b.getFullYear(); const m=t.getMonth()-b.getMonth(); if(m<0 || (m===0 && t.getDate()<b.getDate())) age--; return age>=0?age:0; },
            
            get filteredClients() { 
                let res = (this.clients||[]).filter(c => !c.isDeleted);
                if (this.searchQuery) res = res.filter(c => (c.owner||'').toLowerCase().includes(this.searchQuery.toLowerCase()) || (c.phone||'').includes(this.searchQuery));
                if (this.typeFilter) res = res.filter(c => (c.policies||[]).some(p => !p.isCancelled && (p.items||[]).some(i => i.category === this.typeFilter)));
                return res;
            },
            
            get protectionSummary() {
                let s = { totalPremium: 0, insured: [] }; let m = {};
                if (!this.client || !this.client.policies) return s;
                this.client.policies.forEach(p => {
                    if(p.isCancelled) return; s.totalPremium += (parseFloat(String(p.premium||'').replace(/,/g, ''))||0);
                    let person = (p.insuredPerson && p.insuredPerson.trim()) ? p.insuredPerson.trim() : (this.client.owner ? this.client.owner.trim() : '未命名');
                    if (!m[person]) m[person] = { name: person, medicalHighEnd: false, medicalTraditional: false, ciSum: 0, lifeSum: 0, accDeathSum: 0, accMedicalSum: 0 };
                    (p.items||[]).forEach(i => {
                        if(!i) return; let amt = parseFloat(String(i.sumAssured||'0').replace(/,/g, ''))||0; let r = i.remarks||''; let n = i.name||'';
                        if(i.category==='Medical'){ if(r.includes('高端')||n.includes('高端')) m[person].medicalHighEnd=true; else m[person].medicalTraditional=true; } 
                        else if(i.category==='CI') m[person].ciSum+=amt; else if(i.category==='Life') m[person].lifeSum+=amt; 
                        else if(i.category==='Accident'){ if(r.includes('費用')||n.includes('費用')||r.includes('醫療')||n.includes('醫療')) m[person].accMedicalSum+=amt; else m[person].accDeathSum+=amt; }
                    });
                });
                s.insured = Object.values(m); return s;
            },

            updateSummary() { if(!this.client) return; if(!this.client.summary) this.client.summary={}; let cs = this.protectionSummary; this.client.summary.totalPremium = cs.totalPremium; this.client.summary.insured = cs.insured; },
            createNewClient() { this.client = { id: Date.now(), owner: '', policies: [], fnaRetireVision: '', fnaMedicalVision: '', fnaRetireTools: '', fnaRetireGap: '', fnaEduVision: '', fnaEduTools: '', fnaEduGap: '', isDeleted: false }; this.addPolicy(); this.updateSummary(); this.view = 'detail'; },
            openClient(c) { this.client = JSON.parse(JSON.stringify(c)); this.updateSummary(); this.view = 'detail'; },
            saveCurrentClient(stay) { this.updateSummary(); if(!this.clients) this.clients=[]; const idx=this.clients.findIndex(c=>c.id===this.client.id); if(idx>-1) this.clients[idx]=this.client; else this.clients.push(this.client); this.saveDB(); if(!stay){alert('已儲存'); this.view='list';} },
            deleteClient(id) { const idx=this.clients.findIndex(c=>c.id===id); if(idx>-1){this.clients[idx].isDeleted=true; this.saveDB();} },
            restoreClient(id) { const idx=this.clients.findIndex(c=>c.id===id); if(idx>-1){this.clients[idx].isDeleted=false; this.saveDB();} },
            saveDB() { localStorage.setItem('crm_db_v8', JSON.stringify(this.clients)); },
            
            addPolicy() { if(!this.client.policies) this.client.policies=[]; this.client.policies.push({ insurer: 'AIA', items: [{ category: 'Medical', maturity: '', term: '' }], paymentMode: 'Yearly', isCancelled: false }); },
            removePolicy(i) { if(confirm('刪除這份保單？')) this.client.policies.splice(i,1); },
            addRider(i) { if(!this.client.policies[i].items) this.client.policies[i].items=[]; this.client.policies[i].items.push({ category: 'Medical', maturity: '', term: '' }); },
            
            openUploadModal() { this.uploadModal.open = true; },
            uploadToCloud() {
                this.uploadModal.loading = true; this.saveCurrentClient(true);
                const uniqueId = Date.now().toString(36); let d = JSON.parse(JSON.stringify(this.client)); d.name = d.owner;
                fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ forceId: uniqueId, password: '', payload: JSON.stringify(d) }) })
                .then(r=>r.json()).then(data => { this.uploadModal.loading=false; this.generateQR(data.id||uniqueId); })
                .catch(e => { this.uploadModal.loading=false; this.generateQR(uniqueId); });
            },
            generateQR(id) {
                this.uploadModal.open=false; this.qrModal.open=true;
                let url; try { let b=window.location.href.split('?')[0]; url = b.endsWith('index.html') ? b+'?id='+id : (b.endsWith('/') ? b+'index.html?id='+id : b+'/index.html?id='+id); } catch(e) { url = 'index.html?id='+id; }
                this.linkModal.url = url;
                setTimeout(() => {
                    var qrc = document.getElementById("qr-container-hidden"); if(qrc) { qrc.innerHTML=""; new QRCode(qrc, { text: url, width: 300, height: 300 });
                    setTimeout(() => { const c = qrc.querySelector('canvas'); if(c){ document.getElementById("qr-image-visible").src=c.toDataURL("image/png"); document.getElementById("qr-image-visible").style.display='block'; } }, 200); }
                }, 100);
            },
            copyLink() { navigator.clipboard.writeText(this.linkModal.url).then(()=>alert('已複製!')); },
            openRemarkModal(item) { if(!item.remarks) item.remarks=''; this.itemRemarkModal.item = item; this.itemRemarkModal.open = true; },
            
            importAllData(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>{ try{ const d=JSON.parse(ev.target.result); if(Array.isArray(d) && confirm('確定覆蓋現有資料嗎？')){ this.clients=d; this.saveDB(); alert('還原成功'); window.location.reload(); } }catch(err){alert('格式錯誤');} e.target.value=''; }; r.readAsText(f); },
            exportAllData() { const f = new File([JSON.stringify(this.clients, null, 2)], `CRM_BACKUP_${new Date().toISOString().slice(0,10).replace(/-/g, '')}.json`, { type: 'application/json' }); const u = URL.createObjectURL(f); const a = document.createElement('a'); a.href = u; a.download = f.name; document.body.appendChild(a); a.click(); setTimeout(() => URL.revokeObjectURL(u), 1000); }
        }
    }

    function dashboardApp() {
        return {
            client: {}, hasData: false, loadingMsg: '載入中...', clientRemarkModal: { open: false, text: '' },
            init() {
                const idData = new URLSearchParams(window.location.search).get('id');
                if(idData){ fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'get', id: idData }) }).then(r=>r.json()).then(d=>{ if(d.result==='success'){ let c=d.data; if(c.payload)c=JSON.parse(c.payload); this.client=c; this.hasData=true; } else this.loadingMsg="連結失效"; }).catch(e=>this.loadingMsg="連線失敗"); } else this.loadingMsg="無效連結";
            },
            formatNumber(num) { if(!num) return '-'; const n = parseFloat(num.toString().replace(/,/g, '')); return isNaN(n)?num:n.toLocaleString('en-US'); },
            getCategoryColor(c) { return ['Medical','CI','Life','Accident'].includes(c) ? 'text-red-500 font-bold' : (['Savings','Fund','MPF'].includes(c) ? 'text-blue-500 font-bold' : 'text-gray-600 font-bold'); }
        }
    }
</script>
</body>
</html>
