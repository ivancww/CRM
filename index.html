<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        document.title = "保險管家 v1.9.5 (Admin - Cloud)";
        document.write('<link rel="manifest" href="manifest-admin.json"><link rel="icon" type="image/png" href="admin-logo-192.png"><link rel="apple-touch-icon" href="admin-logo-192.png">');
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .gold-alert { background: linear-gradient(135deg, #fff7e6 0%, #ffecb3 100%); border: 2px solid #ffc107 !important; animation: pulse 2s infinite; }
        input::-webkit-calendar-picker-indicator { opacity: 100; color: #888; }
        .policy-cancelled { opacity: 0.85; background-color: #f9fafb !important; border-color: #d1d5db !important; }
        .theme-blue { color: #1E3A8A; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        /* 針對中央圓盤的樣式 */
        .center-circle-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        .center-circle { width: 100px; height: 100px; border-radius: 50%; background: white; border: 6px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-wrap: wrap; overflow: hidden; }
        .circle-quadrant { width: 50%; height: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; text-align: center; line-height: 1.2; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <div x-data="app()" x-cloak>
        <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-lg font-bold cursor-pointer" @click="view = 'list'"><i class="fa-solid fa-cloud mr-2"></i>保險管家<span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded ml-1" x-text="'v' + version"></span></h1>
          
                <div class="flex items-center gap-2">
                    <button @click="showSettingsModal = true" class="text-gray-300 hover:text-white px-2"><i class="fa-solid fa-gear"></i></button>
                    <div x-show="view === 'list'" class="flex gap-2">
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-database"></i></button>
                            <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded shadow-xl z-50 text-gray-800 overflow-hidden" x-cloak>
                                <a href="#" @click.prevent="exportAllData(); open = false" class="block px-4 py-3 hover:bg-gray-100 text-sm border-b">備份全部</a>
                                <label class="block px-4 py-3 hover:bg-gray-100 text-sm cursor-pointer mb-0 relative">還原備份並同步<input type="file" @change="importAllData($event); open = false" accept=".json, application/json" class="absolute w-full h-full top-0 left-0 opacity-0 cursor-pointer"></label>
                            </div>
                        </div>
                        <button @click="createNewClient()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div x-show="view === 'detail'" class="flex gap-2">
                        <button @click="saveCurrentClient();" class="bg-gray-600 hover:bg-gray-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-arrow-left"></i></button>
                        <div class="h-6 w-px bg-gray-500 mx-1"></div>
                        <button @click="saveCurrentClient(true)" class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                    </div>
                </div>
            </div>
        </nav>
  
        <div class="container mx-auto p-4 max-w-5xl">
            <div x-show="view === 'list'" x-transition>
                <div class="mb-4 flex flex-col md:flex-row gap-2">
                    <div class="relative flex-1"><i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i><input type="text" x-model="searchQuery" class="w-full p-3 pl-10 rounded-lg border shadow-sm focus:ring-2 focus:ring-blue-400" placeholder="搜尋客戶、電話..."></div>
                    <div class="flex gap-2 w-full md:w-auto"><select x-model="typeFilter" class="flex-1 md:w-32 p-2 rounded-lg border-2 border-purple-200 shadow-sm font-bold text-gray-700 text-sm"><option value="">☂️ 所有類型</option><option value="CI">危疾</option><option value="AccidentDeath">意外身故</option><option value="AccidentMedical">意外醫療</option><option value="Medical">醫療</option><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="Home">家居保</option><option value="MPF">強積金</option><option value="Wellness">健康程式</option></select></div>
                </div>
           
                <div class="mb-6 flex flex-col md:flex-row gap-2">
                    <select x-model="birthdayFilter" class="flex-1 p-2 rounded-lg border-2 border-pink-200 shadow-sm font-bold text-gray-700 text-sm"><option value="">🎂 生日月份</option><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select>
                    <select x-model="renewalFilter" class="flex-1 p-2 rounded-lg border-2 border-green-200 shadow-sm font-bold text-gray-700 text-sm"><option value="">📅 續保月份</option><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="(c, index) in filteredClients" :key="c.id || index">
                        <div @click="openClient(c)" class="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-md transition border-l-4 border-blue-500 relative group">
                            <div class="font-bold text-lg flex items-center text-gray-800"><span class="text-sm font-bold mr-2 text-blue-500" x-text="(index + 1) + '.'"></span><span x-text="c.owner || '未命名'"></span></div>
                            <div class="text-sm text-gray-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> <span x-text="c.phone || '-'"></span></div>
                            <div class="text-xs text-gray-400 mt-2">有效保單: <span x-text="(c.policies || []).filter(p=>!p.isCancelled).length"></span></div>
                            <div class="mt-2 flex gap-1 flex-wrap"><div x-show="renewalFilter && hasRenewalMatch(c)" class="text-xs text-green-600 font-bold bg-green-50 px-1 rounded border border-green-100"><i class="fa-solid fa-check"></i> 有續保</div><div x-show="birthdayFilter && c.dob && (new Date(c.dob).getMonth()+1).toString() === birthdayFilter" class="text-xs text-pink-600 font-bold bg-pink-50 px-1 rounded border border-pink-100"><i class="fa-solid fa-cake-candles"></i> 此月生日</div></div>
                            <button @click.stop="permanentDeleteClient(c.id)" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="view === 'detail'" x-transition x-cloak>
                <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-blue-500">
                    <h2 class="text-xl font-bold mb-4 text-blue-700">客戶資料 (家庭帳戶)</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-1 text-blue-600">持有人 / 戶口名稱</label>
                            <input type="text" x-model="client.owner" @blur="client.owner = formatName(client.owner)" class="w-full border rounded p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-blue-600">生日</label>
                            <div class="flex gap-1">
                                <input type="date" x-model="client.dob" class="w-full border rounded p-2 text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">電話</label>
                            <div class="flex gap-1">
                                <input type="tel" x-model="client.phone" class="w-full border rounded p-2">
                            </div>
                        </div>
                        <div class="md:col-span-4 border-t border-dashed border-gray-300 pt-4 mt-2" x-data="{ showFNA: false }">
                            <div class="flex justify-between items-center mb-3 cursor-pointer select-none" @click="showFNA = !showFNA">
                                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">財務狀況 (FNA)</h3>
                                <div class="text-gray-400 text-xs"><span x-show="!showFNA">顯示詳情 <i class="fa-solid fa-chevron-down ml-1"></i></span><span x-show="showFNA">隱藏 <i class="fa-solid fa-chevron-up ml-1"></i></span></div>
                            </div>
                            <div x-show="showFNA" x-transition class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div><label class="block text-xs font-bold mb-1">每月收入</label><input type="text" x-model="client.income" @input="client.income = formatInput($event.target.value)" class="w-full border rounded p-2 text-sm" placeholder="0"></div>
                                <div><label class="block text-xs font-bold mb-1">流動資產</label><input type="text" x-model="client.liquidAssets" @input="client.liquidAssets = formatInput($event.target.value)" class="w-full border rounded p-2 text-sm" placeholder="Cash/Stock"></div>
                                <div><label class="block text-xs font-bold mb-1">物業市值</label><input type="text" x-model="client.property" @input="client.property = formatInput($event.target.value)" class="w-full border rounded p-2 text-sm" placeholder="0"></div>
                                <div><label class="block text-xs font-bold mb-1">其他投資</label><input type="text" x-model="client.investment" @input="client.investment = formatInput($event.target.value)" class="w-full border rounded p-2 text-sm" placeholder="0"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <template x-for="(policy, pIndex) in (client.policies || [])" :key="pIndex">
                        <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-green-500 relative transition-all duration-300" :class="policy.isCancelled ? 'policy-cancelled' : ''">
                            <div x-show="policy.isCancelled" class="absolute top-0 right-0 bg-gray-600 text-white text-xs px-3 py-1 rounded-bl-lg font-bold shadow-sm z-10">已終止</div>
                            <button @click="removePolicy(pIndex)" class="absolute top-4 right-4 text-gray-400 hover:text-red-500" x-show="!policy.isCancelled"><i class="fa-solid fa-times text-xl"></i></button>
                            
                            <div class="flex flex-wrap items-end gap-3 mb-4 pr-8 border-b pb-3">
                                <h2 class="text-xl font-bold whitespace-nowrap mb-1" :class="policy.isCancelled ? 'text-gray-600' : 'text-green-700'">保單 (#<span x-text="pIndex + 1"></span>)</h2>
                                <div class="flex-1 min-w-[140px]"><label class="block text-[10px] font-bold mb-1">保險公司</label><input type="text" x-model="policy.insurer" :disabled="policy.isCancelled" class="w-full border rounded py-1.5 px-2 text-sm font-bold bg-white"></div>
                                <div class="w-40"><label class="block text-[10px] font-bold mb-1">保單號碼</label><input type="text" x-model="policy.policyNo" :disabled="policy.isCancelled" class="w-full border rounded py-1.5 px-2 text-sm font-mono bg-white"></div>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-7 gap-3 mb-4 p-4 rounded-lg items-end" :class="policy.isCancelled ? 'bg-gray-200' : 'bg-green-50'">
                                <div class="md:col-span-2 relative">
                                    <label class="block text-xs font-bold mb-1 text-purple-600 flex justify-between">受保人</label>
                                    <input type="text" x-model="policy.insuredPerson" :disabled="policy.isCancelled" class="w-full border rounded p-2 text-sm bg-white">
                                </div>
                                <div class="md:col-span-1"><label class="block text-xs font-bold mb-1">生效日</label><input type="date" x-model="policy.effectDate" :disabled="policy.isCancelled" class="w-full border rounded p-2 text-sm"></div>
                                <div class="md:col-span-1"><label class="block text-xs font-bold mb-1">繳費</label><select x-model="policy.paymentMode" :disabled="policy.isCancelled" class="w-full border rounded p-2 text-sm"><option value="Yearly">年</option><option value="Monthly">月</option></select></div>
                                <div class="md:col-span-2"><label class="block text-xs font-bold mb-1">續保日期</label><input type="date" x-model="policy.dueDate" :disabled="policy.paymentMode === 'Monthly' || policy.isCancelled" class="w-full border rounded p-2 text-sm"></div>
                                <div class="md:col-span-1"><label class="block text-xs font-bold mb-1">保費(HK$)</label><input type="text" x-model="policy.premium" :disabled="policy.isCancelled" @input="policy.premium = formatInput($event.target.value)" class="w-full border rounded p-2 text-sm"></div>
                            </div>
              
                            <div class="overflow-x-auto">
                                <table class="w-full text-sm text-left text-gray-500">
                                    <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                                        <tr><th class="px-2 py-2 w-28">類別</th><th class="px-2 py-2 w-32">產品名稱</th><th class="px-2 py-2 w-32">保額(HK$)</th><th class="px-2 py-2 w-16 text-center">操作</th></tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(item, iIndex) in (policy.items || [])" :key="iIndex">
                                            <tr class="border-b hover:bg-gray-50">
                                                <td class="px-2 py-2">
                                                    <select x-model="item.category" :disabled="policy.isCancelled" :class="getCategoryColor(item.category)" class="w-full border rounded p-1 text-xs font-bold">
                                                        <optgroup label="保障"><option value="Medical">醫療</option><option value="CI">危疾</option><option value="Life">人壽</option><option value="AccidentDeath">意外身故</option><option value="AccidentMedical">意外醫療</option></optgroup>
                                                        <optgroup label="理財"><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="MPF">強積金</option></optgroup>
                                                        <optgroup label="其他"><option value="Home">家居保</option><option value="Travel">全年旅遊保</option><option value="Wellness">健康程式</option></optgroup>
                                                    </select>
                                                </td>
                                                <td class="px-2 py-2"><input type="text" x-model="item.name" :disabled="policy.isCancelled" class="w-full border rounded p-1 text-xs"></td>
                                                <td class="px-2 py-2"><input type="text" x-model="item.sumAssured" :disabled="policy.isCancelled" @input="item.sumAssured = formatInput($event.target.value)" class="w-full border rounded p-1 text-xs"></td>
                                                <td class="px-2 py-2 text-center flex justify-center gap-1"><button x-show="iIndex > 0 && !policy.isCancelled" @click="policy.items.splice(iIndex, 1)" class="w-6 h-6 rounded-full border border-red-200 bg-red-50 text-red-500 text-xs hover:bg-red-100"><i class="fa-solid fa-trash-can"></i></button></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                            
                            <div class="mt-4 flex justify-between items-center">
                                <label class="flex items-center text-sm font-bold text-red-500 cursor-pointer"><input type="checkbox" class="mr-2 w-4 h-4 rounded" x-model="policy.isCancelled" @change="togglePolicyCancel(policy)">終止此保單</label>
                                <button x-show="!policy.isCancelled" @click="addRider(pIndex)" class="text-blue-600 text-sm font-semibold hover:bg-blue-50 px-2 py-1 rounded transition">+ 附約</button>
                            </div>
                        </div>
                    </template>
                    <button @click="addPolicy()" class="w-full py-3 border-2 border-dashed border-green-300 text-green-600 rounded-lg hover:bg-green-50 mb-6 font-bold">+ 新保單</button>
                    
                    <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-purple-500">
                        <h2 class="text-xl font-bold mb-4 text-purple-700">索償紀錄</h2>
                        <div class="space-y-4 mb-6">
                            <template x-for="(event, eIndex) in (client.claimEvents || [])" :key="eIndex">
                                <div class="border rounded p-3" :class="event.status === 'Completed' ? 'bg-gray-50' : 'bg-white border-purple-200'">
                                    <div class="flex justify-between items-center mb-2">
                                        <input type="text" x-model="event.name" class="font-bold border-b border-dashed flex-1 mr-2" placeholder="事件名稱 (例如: 意外住院)">
                                        <div class="font-bold text-purple-600 text-right" x-text="'HK$' + formatNumber((event.items || []).reduce((s,i)=>s+Number(String(i.amount||0).replace(/,/g, '')),0))"></div>
                                    </div>
                                    <div class="flex items-center gap-2 mb-3">
                                        <span class="text-xs font-bold text-gray-500">索償日期:</span>
                                        <input type="date" x-model="event.eventDate" class="border rounded p-1 text-xs">
                                    </div>
                                    <table class="w-full text-xs mb-2">
                                        <thead><tr class="text-gray-400"><th class="text-left py-1">項次說明</th><th class="text-right py-1" width="100">金額 (HK$)</th><th width="30"></th></tr></thead>
                                        <tbody>
                                            <template x-for="(item, iIndex) in (event.items || [])" :key="iIndex">
                                                <tr class="border-t">
                                                    <td class="py-2"><input type="text" x-model="item.desc" class="w-full bg-transparent" placeholder="輸入說明..."></td>
                                                    <td class="py-2"><input type="text" x-model="item.amount" @input="item.amount = formatInput($event.target.value)" class="w-full border rounded p-1 text-right" placeholder="0"></td>
                                                    <td class="text-center"><button @click="event.items.splice(iIndex,1)" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-minus-circle"></i></button></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                    <div class="flex justify-between items-center mt-2 pt-2 border-t border-dashed">
                                        <button @click="event.items.push({desc:'',amount:''})" class="text-purple-600 text-xs font-bold">+ 新增細項</button>
                                        <div class="flex gap-2">
                                            <button @click="event.status = event.status==='Pending'?'Completed':'Pending'" class="text-xs px-2 py-1 rounded border bg-white shadow-sm" x-text="event.status==='Pending'?'完成檔案':'重開檔案'"></button>
                                            <button @click="client.claimEvents.splice(eIndex,1)" class="text-xs px-2 py-1 rounded text-red-400 border border-red-50 shadow-sm hover:bg-red-100"><i class="fa-solid fa-trash-can"></i></button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <button @click="addClaimEvent()" class="w-full py-2 border-2 border-dashed border-purple-300 text-purple-600 rounded text-sm font-bold bg-purple-50 hover:bg-purple-100 transition">+ 新索償檔案</button>
                        </div>
                    </div>

                    <button @click="updateSummary(); view = 'review'; window.scrollTo(0,0);" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-lg rounded-xl mt-4 shadow-lg transition active:scale-95">
                        <i class="fa-solid fa-desktop mr-2"></i> 進入 Admin Review 模式
                    </button>
                </div>
            </div>

            <div x-show="view === 'review'" x-data="{ currentTab: 'protection' }" x-transition x-cloak class="max-w-4xl mx-auto md:mt-4 md:mb-8 bg-white md:rounded-2xl shadow-2xl overflow-hidden relative border border-gray-200">
                <div class="gradient-bg text-white p-6 md:p-8 flex justify-between items-center">
                    <div><p class="text-blue-200 text-sm mb-1">親愛的 <span x-text="client.owner || client.name || '客戶'"></span>：</p><h1 class="text-2xl md:text-3xl font-bold">家庭財富與保障報告</h1></div>
                </div>

                <div class="flex border-b bg-gray-50 overflow-x-auto">
                    <button @click="currentTab = 'protection'" :class="currentTab === 'protection' ? 'border-b-4 border-blue-600 text-blue-800 bg-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-4 px-6 font-bold text-sm md:text-base whitespace-nowrap transition-colors">
                        <i class="fa-solid fa-shield-halved mr-2"></i>人生4大保障
                    </button>
                    <button @click="currentTab = 'cashflow'" :class="currentTab === 'cashflow' ? 'border-b-4 border-blue-600 text-blue-800 bg-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-4 px-6 font-bold text-sm md:text-base whitespace-nowrap transition-colors">
                        <i class="fa-solid fa-money-bill-trend-up mr-2"></i>未來人生現金流
                    </button>
                    <button @click="currentTab = 'details'" :class="currentTab === 'details' ? 'border-b-4 border-blue-600 text-blue-800 bg-white' : 'text-gray-500 hover:bg-gray-100'" class="flex-1 py-4 px-6 font-bold text-sm md:text-base whitespace-nowrap transition-colors">
                        <i class="fa-solid fa-list mr-2"></i>保單明細一覽
                    </button>
                </div>

                <div class="p-4 md:p-8 bg-gray-50 min-h-[500px]">
                    
                    <div x-show="currentTab === 'protection'" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0">
                        <p class="text-gray-500 text-sm mb-6 text-center">從客觀角度檢視現有防護網，確保在突發情況下家庭財務依然穩健安寧。</p>
                        
                        <template x-for="person in protectionSummary.insured" :key="person.name">
                            <div class="mb-10">
                                <h3 class="font-bold text-indigo-800 text-lg mb-4 border-l-4 border-indigo-600 pl-3">受保人：<span x-text="person.name"></span></h3>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative">
                                    <div class="hidden md:block center-circle-container">

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-1AkUDr7fL8digJDaCRiTliAeWikk8-XsXznXKHvBYQ5nP8vim7iq_N4FR1mp-RHp/exec';
        
        function app() {
            return {
                ADMIN_SECRET_KEY: '0903',
                version: '1.9.5', view: 'list', searchQuery: '', renewalFilter: '', birthdayFilter: '', typeFilter: '', clients: [], client: {},
                showSettingsModal: false,
                syncProgress: { show: false, current: 0, total: 0 },
                
                init() { 
                    const saved = localStorage.getItem('crm_db_v8');
                    if (saved) { this.clients = JSON.parse(saved); }
                    
                    // 恢復 Google Apps Script 同步獲取功能
                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'get', id: 'ALL', adminKey: this.ADMIN_SECRET_KEY })
                    })
                    .then(r => r.json())
                    .then(res => {
                        if (res.status === 'success' && Array.isArray(res.data)) {
                            this.clients = res.data;
                            this.saveDB();
                            console.log('已從雲端同步獲取最新 ' + res.data.length + ' 筆客戶檔案。');
                        }
                    })
                    .catch(e => console.error('雲端同步失敗，系統目前正在運作離線快取模式', e));
                },
                
                formatNumber(num) { if (num === null || num === undefined || num === '') return '0'; const n = parseFloat(num.toString().replace(/,/g, '')); return isNaN(n) ? num : n.toLocaleString('en-US'); },
                formatInput(v) { if (!v) return ''; let str = String(v).replace(/[^0-9.]/g, ''); let parts = str.split('.'); if (parts.length > 2) { parts[1] = parts.slice(1).join(''); parts.length = 2; } parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ","); return parts.length > 1 ? parts[0] + '.' + parts[1] : parts[0]; },
                getCategoryColor(cat) { if (['Medical', 'CI', 'Life', 'Accident', 'AccidentDeath', 'AccidentMedical'].includes(cat)) return 'text-red-500 font-bold'; if (['Savings', 'Fund', 'MPF'].includes(cat)) return 'text-blue-500 font-bold'; return 'text-gray-600 font-bold'; },
                formatName(s) { return s ? s.replace(/\b([a-zA-Z])([a-zA-Z]*)\b/g, (m, p1, p2) => p1.toUpperCase() + p2.toLowerCase()) : ''; },
                
                hasRenewalMatch(c) { return (c.policies || []).some(p => !p.isCancelled && p.paymentMode !== 'Monthly' && p.dueDate && (new Date(p.dueDate).getMonth() + 1).toString() === this.renewalFilter); },

                get filteredClients() {
                    let res = this.clients || [];
                    if (this.searchQuery) { const q = this.searchQuery.toLowerCase(); res = res.filter(c => (c.owner||'').toLowerCase().includes(q) || (c.phone||'').includes(q)); }
                    if (this.typeFilter) res = res.filter(c => (c.policies || []).some(p => !p.isCancelled && (p.items || []).some(i => i.category === this.typeFilter)));
                    if (this.renewalFilter) res = res.filter(c => (c.policies || []).some(p => !p.isCancelled && p.paymentMode !== 'Monthly' && p.dueDate && (new Date(p.dueDate).getMonth() + 1).toString() === this.renewalFilter));
                    if (this.birthdayFilter) res = res.filter(c => c.dob && (new Date(c.dob).getMonth() + 1).toString() === this.birthdayFilter);
                    return res;
                },

                get protectionSummary() {
                    let summary = { insured: [] };
                    if (!this.client || !this.client.policies) return summary;
                    let personMap = {};
                    this.client.policies.forEach(p => {
                        if(p.isCancelled) return;
                        let p_amt = parseFloat(String(p.premium||'').replace(/,/g, '')) || 0; 
                        let annualizedPremium = (p.paymentMode === 'Monthly' ? (p_amt * 12) : p_amt);
                        let person = (p.insuredPerson && p.insuredPerson.trim()) ? p.insuredPerson.trim() : (this.client.owner ? this.client.owner.trim() : '未命名');
                        
                        if (!personMap[person]) {
                            personMap[person] = { 
                                name: person, 
                                lifeCount: 0, lifePremium: 0, lifeSum: 0, lifePolicies: [],
                                ciCount: 0, ciPremium: 0, ciSum: 0, ciPolicies: [],
                                accCount: 0, accPremium: 0, accDeathSum: 0, accMedicalSum: 0, accPolicies: [],
                                medCount: 0, medPremium: 0, medicalHighEnd: false, medicalTraditional: false, medPolicies: []
                            };
                        }

                        let hasLife = false, hasCI = false, hasAcc = false, hasMed = false;

                        (p.items || []).forEach(i => {
                            if(!i) return;
                            let amt = parseFloat(String(i.sumAssured||'0').replace(/,/g, '')) || 0; 
                            let n = i.name || '';
                            
                            if (i.category === 'Life') { hasLife = true; personMap[person].lifeSum += amt; }
                            else if (i.category === 'CI') { hasCI = true; personMap[person].ciSum += amt; }
                            else if (i.category === 'AccidentDeath' || (i.category === 'Accident' && !n.includes('費用') && !n.includes('醫療'))) { hasAcc = true; personMap[person].accDeathSum += amt; }
                            else if (i.category === 'AccidentMedical' || (i.category === 'Accident' && (n.includes('費用') || n.includes('醫療')))) { hasAcc = true; personMap[person].accMedicalSum += amt; }
                            else if (i.category === 'Medical') { 
                                hasMed = true; 
                                if(n.includes('高端')) personMap[person].medicalHighEnd = true; 
                                else personMap[person].medicalTraditional = true; 
                            }
                        });

                        if(hasLife) { personMap[person].lifeCount++; personMap[person].lifePremium += annualizedPremium; if(p.policyNo) personMap[person].lifePolicies.push(p.policyNo); }
                        if(hasCI) { personMap[person].ciCount++; personMap[person].ciPremium += annualizedPremium; if(p.policyNo) personMap[person].ciPolicies.push(p.policyNo); }
                        if(hasAcc) { personMap[person].accCount++; personMap[person].accPremium += annualizedPremium; if(p.policyNo) personMap[person].accPolicies.push(p.policyNo); }
                        if(hasMed) { personMap[person].medCount++; personMap[person].medPremium += annualizedPremium; if(p.policyNo) personMap[person].medPolicies.push(p.policyNo); }
                    }); 
                    summary.insured = Object.values(personMap); 
                    return summary;
                },

                updateSummary() {},
                createNewClient() { this.client = { id: Date.now(), owner: '', phone: '', policies: [], claimEvents: [], fnaRetireVision: '', fnaRetireTools: '', fnaEduVision: '', fnaEduTools: '' }; this.addPolicy(); this.view = 'detail'; },
                openClient(c) { this.client = JSON.parse(JSON.stringify(c)); this.view = 'detail'; },
                
                saveDB() { localStorage.setItem('crm_db_v8', JSON.stringify(this.clients)); },

                // 恢復完整的 saveCurrentClient 雲端同步邏輯
                saveCurrentClient(stay) { 
                    this.updateSummary();
                    if (!this.clients) this.clients = [];
                    const idx = this.clients.findIndex(c => c.id === this.client.id);
                    if (idx > -1) this.clients[idx] = this.client;
                    else this.clients.push(this.client);
                    this.saveDB();
                    
                    let d = JSON.parse(JSON.stringify(this.client));
                    d.name = d.owner;
                    const finalPayload = { forceId: String(this.client.id), action: 'update', payload: JSON.stringify(d), adminKey: this.ADMIN_SECRET_KEY };
                    
                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(finalPayload) })
                    .then(r => r.json())
                    .then(data => { if(data.status !== 'success') console.error('雲端備份出錯:', data.message); })
                    .catch(e => console.error('網路連線失敗，本次修改已先儲存於本地。', e));
                    
                    if(!stay) { this.view = 'list'; window.scrollTo(0,0); } 
                },
                
                // 恢復完整的 permanentDeleteClient 雲端同步邏輯
                permanentDeleteClient(id) { 
                    if(confirm('徹底刪除無法復原！確定？')) { 
                        this.clients = this.clients.filter(c => c.id !== id);
                        this.saveDB(); 
                        fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: String(id), adminKey: this.ADMIN_SECRET_KEY }) })
                        .catch(e => console.error('雲端刪除失敗', e));
                    } 
                },
                
                addPolicy() { if(!this.client.policies) this.client.policies = []; this.client.policies.push({ insurer: 'AIA', items: [{ category: 'Medical' }], paymentMode: 'Yearly', isCancelled: false }); },
                removePolicy(i) { if(confirm('刪除這份保單？')) this.client.policies.splice(i,1); },
                addRider(i) { if(!this.client.policies[i].items) this.client.policies[i].items = []; this.client.policies[i].items.push({ category: 'Medical' }); },
                togglePolicyCancel(policy) { policy.cancelDate = policy.isCancelled ? new Date().toISOString().split('T')[0] : ''; },
                addClaimEvent() { if(!this.client.claimEvents) this.client.claimEvents = []; this.client.claimEvents.push({ name: '', status: 'Pending', eventDate: '', items: [{ desc: '', amount: '' }] }); },
                
                // 恢復還原及批次同步上雲端功能
                importAllData(e) { 
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        try { 
                            const data = JSON.parse(ev.target.result);
                            if(Array.isArray(data)) {
                                if(confirm(`確定要還原 ${data.length} 筆資料，並同時強制同步到雲端嗎？`)) { 
                                    this.clients = data;
                                    this.saveDB();
                                    
                                    this.syncProgress.total = data.length;
                                    this.syncProgress.current = 0;
                                    this.syncProgress.show = true;
                                    
                                    let successCount = 0;
                                    for (let i = 0; i < data.length; i++) {
                                        let d = JSON.parse(JSON.stringify(data[i]));
                                        d.name = d.owner;
                                        
                                        try {
                                            let response = await fetch(GOOGLE_SCRIPT_URL, { 
                                                method: 'POST', 
                                                body: JSON.stringify({ forceId: String(d.id), action: 'update', payload: JSON.stringify(d), adminKey: this.ADMIN_SECRET_KEY }) 
                                            });
                                            let resJson = await response.json();
                                            if (resJson && (resJson.status === 'success' || resJson.result === 'success')) {
                                                successCount++;
                                            } else {
                                                console.error(`第 ${i+1} 筆同步雲端被 GAS 拒絕，原因:`, resJson ? resJson.message : '未知錯誤');
                                            }
                                        } catch (err) {
                                            console.error(`第 ${i+1} 筆網路發送失敗:`, err);
                                        }
                                        this.syncProgress.current = i + 1;
                                    }
                                    
                                    this.syncProgress.show = false;
                                    alert(`還原及雲端大同步完成！\n成功同步：${successCount} / ${data.length} 筆資料。`);
                                    window.location.reload();
                                } 
                            } 
                        } catch (err) { 
                            alert('檔案出錯，請確認 JSON 格式。');
                            this.syncProgress.show = false; 
                        } 
                        e.target.value = '';
                    }; 
                    reader.readAsText(file);
                },
                
                // 恢復備份下載功能
                exportAllData() { 
                    const file = new File([JSON.stringify(this.clients, null, 2)], `CRM_BACKUP_${new Date().toISOString().slice(0,10).replace(/-/g, '')}.json`, { type: 'application/json' });
                    const url = URL.createObjectURL(file); const a = document.createElement('a'); a.href = url; a.download = file.name; document.body.appendChild(a); a.click();
                    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000); 
                }
            }
        }
    </script>
