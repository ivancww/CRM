<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保險管家 v8.2 (Admin)</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <link rel="manifest" href="manifest-admin.json">
    <link rel="icon" type="image/png" href="admin-logo-192.png">
    <link rel="apple-touch-icon" href="admin-logo-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        [x-cloak] { display: none !important; }
        .gold-alert { background: linear-gradient(135deg, #fff7e6 0%, #ffecb3 100%); border: 2px solid #ffc107 !important; }
        .web-frame { width: 100%; height: 80vh; border: none; }
        .policy-cancelled { opacity: 0.85; background-color: #f9fafb !important; border-color: #d1d5db !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20" x-data="app()">

    <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div @click="view = 'list'" class="cursor-pointer">
                <h1 class="text-lg font-bold"><i class="fa-solid fa-cloud mr-2"></i>保險管家</h1>
                <span class="text-[10px] text-slate-400 font-mono">Ver 8.2 • Cloud Mode</span>
            </div>
            <div class="flex items-center gap-2">
                <button @click="showSettingsModal = true" class="text-gray-300 hover:text-white px-2"><i class="fa-solid fa-gear"></i></button>
                <div x-show="view === 'list'" class="flex gap-2">
                    <button @click="exportAllData()" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-download"></i></button>
                    <button @click="createNewClient()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div x-show="view === 'detail'" class="flex gap-2">
                    <button @click="saveCurrentClient(); view = 'list'" class="bg-gray-600 hover:bg-gray-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-arrow-left"></i></button>
                    <button @click="openUploadModal()" class="bg-yellow-500 hover:bg-yellow-600 px-3 py-2 rounded text-sm font-bold text-white shadow-md"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                    <button @click="saveCurrentClient(true)" class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="container mx-auto p-4 max-w-5xl">
        <div x-show="view === 'list'" x-transition>
            <div class="mb-6 flex flex-col md:flex-row gap-2">
                <div class="relative flex-1">
                    <i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" x-model="searchQuery" class="w-full p-3 pl-10 rounded-lg border shadow-sm focus:ring-2 focus:ring-blue-400" placeholder="搜尋客戶、電話...">
                </div>
                <select x-model="renewalFilter" class="md:w-40 p-2 rounded-lg border-2 border-green-200 bg-white font-bold text-gray-700 text-sm cursor-pointer">
                    <option value="">📅 所有月份續保</option>
                    <template x-for="m in 12"><option :value="m" x-text="m+'月 續保'"></option></template>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="(c, index) in filteredClients" :key="c.id">
                    <div @click="openClient(c)" class="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-md transition border-l-4 relative group" :class="c.isDeleted ? 'border-red-400 bg-red-50' : 'border-blue-500'">
                        <div class="font-bold text-lg">
                            <span class="text-sm text-gray-400 mr-1" x-text="(index+1)+'.'"></span>
                            <span x-text="c.owner || '未命名'" :class="c.isDeleted ? 'line-through text-gray-400' : ''"></span>
                        </div>
                        <div class="text-sm text-gray-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> <span x-text="c.phone || '-'"></span></div>
                        <div x-show="c.isDeleted" class="mt-2 text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded inline-block font-bold">已刪除</div>
                        <button @click.stop="deleteClient(c.id)" x-show="!c.isDeleted" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="view === 'detail'" x-transition x-cloak>
            <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-4 text-blue-700">客戶資料</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold mb-1 text-blue-600">持有人名稱</label>
                        <input type="text" x-model="client.owner" @blur="client.owner = formatName(client.owner)" class="w-full border rounded p-2" placeholder="Tony Chan">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-blue-600">生日</label>
                        <input type="date" x-model="client.dob" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1 text-blue-600">電話</label>
                        <input type="tel" x-model="client.phone" class="w-full border rounded p-2">
                    </div>
                </div>
            </div>

            <template x-for="(policy, pIndex) in client.policies" :key="pIndex">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 relative" :class="policy.isCancelled ? 'policy-cancelled' : 'border-green-500'">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h2 class="text-lg font-bold">保單 #<span x-text="pIndex+1"></span></h2>
                        <button @click="removePolicy(pIndex)" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                        <input type="text" x-model="policy.insurer" class="border rounded p-2 font-bold" placeholder="保險公司">
                        <input type="text" x-model="policy.policyNo" class="border rounded p-2 font-mono" placeholder="保單號碼">
                        <input type="text" x-model="policy.premium" @input="policy.premium = formatInput($event.target.value)" class="border rounded p-2" placeholder="保費 HK$">
                    </div>
                    <button @click="addRider(pIndex)" class="text-blue-500 text-xs font-bold">+ 增加保險項目/附約</button>
                </div>
            </template>
            <button @click="addPolicy()" class="w-full py-3 border-2 border-dashed border-green-300 text-green-600 rounded-lg hover:bg-green-50 mb-8 font-bold">+ 新增保單</button>

            <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-purple-500">
                <h2 class="text-xl font-bold mb-4 text-purple-700">索償紀錄 (Claim Records)</h2>
                <div class="space-y-4">
                    <template x-for="(event, eIndex) in client.claimEvents" :key="eIndex">
                        <div class="border rounded-lg p-4 bg-gray-50 relative">
                            <button @click="client.claimEvents.splice(eIndex, 1)" class="absolute top-2 right-2 text-gray-300 hover:text-red-500"><i class="fa-solid fa-circle-xmark"></i></button>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase">索償事件名稱 / 原因</label>
                                    <input type="text" x-model="event.name" class="w-full border-b bg-transparent py-1 font-bold text-gray-700 focus:outline-none focus:border-purple-500" placeholder="例如: 腸胃炎住院">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-gray-400 uppercase">索償日期</label>
                                    <input type="date" x-model="event.date" class="w-full border-b bg-transparent py-1 text-sm focus:outline-none">
                                </div>
                            </div>

                            <div class="bg-white p-3 rounded border border-purple-100 flex items-center justify-between">
                                <div class="flex-1 relative">
                                    <label class="block text-[10px] font-bold text-purple-400">總賠償金額 (HKD)</label>
                                    <div class="flex items-center gap-2">
                                        <span class="text-gray-400 font-bold">$</span>
                                        <input type="text" x-model="event.totalAmount" @input="event.totalAmount = formatInput($event.target.value)" class="w-full font-mono font-bold text-lg text-purple-700 focus:outline-none" placeholder="0.00">
                                        <button @click="convertUSDToHKD(event)" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-600 text-[10px] px-2 py-1 rounded font-bold transition">
                                            <i class="fa-solid fa-rotate mr-1"></i>USD轉港幣
                                        </button>
                                    </div>
                                </div>
                                <div class="ml-4">
                                    <button @click="event.status = event.status==='Pending'?'Completed':'Pending'" 
                                            :class="event.status==='Completed' ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500'"
                                            class="text-xs px-3 py-1 rounded-full font-bold transition" 
                                            x-text="event.status==='Completed' ? '已完成' : '處理中'">
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>
                    <button @click="addClaimEvent()" class="w-full py-2 border-2 border-dashed border-purple-300 text-purple-600 rounded-lg text-sm font-bold hover:bg-purple-50 transition">+ 新增索償檔案</button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <label class="block text-sm font-bold mb-2">私人備註及跟進</label>
                <textarea x-model="client.remarks" class="w-full border rounded p-3 h-32 text-sm" placeholder="只有你看到的內部備註..."></textarea>
            </div>
        </div>
    </div>

    <div x-show="uploadModal.open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/75" x-cloak>
        <div class="bg-white w-80 rounded-xl p-6 text-center">
            <h3 class="font-bold mb-4">設定存取密碼</h3>
            <input type="text" x-model="uploadModal.password" class="w-full border-2 border-blue-200 rounded-lg p-3 text-center text-xl font-bold mb-4" placeholder="例如: 1234">
            <button @click="uploadToCloud()" :disabled="uploadModal.loading" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">
                <span x-show="!uploadModal.loading">確認並生成連結</span>
                <span x-show="uploadModal.loading"><i class="fa-solid fa-spinner fa-spin"></i> 上傳中...</span>
            </button>
            <button @click="uploadModal.open = false" class="mt-4 text-gray-400 text-sm">取消</button>
        </div>
    </div>

    <div x-show="qrModal.open" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90" x-cloak>
        <div class="bg-white w-80 rounded-xl p-6 text-center">
            <h3 class="font-bold mb-1">已建立專屬連結</h3>
            <p class="text-xs text-green-600 font-bold mb-3">密碼: <span x-text="uploadModal.password" class="text-lg bg-green-100 px-2 rounded"></span></p>
            <div id="qr-container-visible" class="flex justify-center mb-4 bg-white p-2 border rounded">
                <img id="qr-image" class="w-full h-auto object-contain">
            </div>
            <button @click="copyLink()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mb-3">複製網址連結</button>
            <button @click="qrModal.open = false" class="text-gray-400 text-sm">關閉</button>
            <div id="qr-hidden" class="hidden"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwOgcd8Z3nnYtbwgJQ46Fk5imt1mBhYbtSmxTiE0Edgl5M881Ymj8F_J7He8yChffiU/exec';
        const APP_VERSION = '8.2';

        function app() {
            return {
                view: 'list', searchQuery: '', renewalFilter: '', clients: [], client: {}, 
                uploadModal: { open: false, password: '', loading: false },
                qrModal: { open: false, url: '' },
                
                init() {
                    // 強制更新檢測：如果版本不符，清除部分快取 (不影響資料)
                    const lastVersion = localStorage.getItem('app_version');
                    if (lastVersion !== APP_VERSION) {
                        console.log("Detecting Update... Applying Version " + APP_VERSION);
                        localStorage.setItem('app_version', APP_VERSION);
                    }

                    const saved = localStorage.getItem('crm_db_v8.2');
                    if (saved) {
                        this.clients = JSON.parse(saved);
                    } else {
                        // 舊版本數據遷移
                        const oldData = localStorage.getItem('crm_db_v8');
                        if(oldData) {
                            this.clients = JSON.parse(oldData);
                            this.saveDB();
                        }
                    }
                },

                get filteredClients() {
                    let res = this.clients.filter(c => !c.isDeleted || this.searchQuery);
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        res = res.filter(c => (c.owner||'').toLowerCase().includes(q) || (c.phone||'').includes(q));
                    }
                    if (this.renewalFilter) {
                        res = res.filter(c => (c.policies||[]).some(p => {
                            if(!p.dueDate) return false;
                            return (new Date(p.dueDate).getMonth()+1).toString() === this.renewalFilter;
                        }));
                    }
                    return res;
                },

                createNewClient() {
                    this.client = { 
                        id: Date.now(), owner: '', phone: '', dob: '', 
                        policies: [], claimEvents: [], remarks: '', isDeleted: false 
                    };
                    this.addPolicy();
                    this.view = 'detail';
                },

                openClient(c) {
                    this.client = JSON.parse(JSON.stringify(c));
                    this.view = 'detail';
                },

                saveCurrentClient(stay) {
                    const idx = this.clients.findIndex(c => c.id === this.client.id);
                    if (idx > -1) this.clients[idx] = this.client;
                    else this.clients.push(this.client);
                    this.saveDB();
                    if(!stay) { alert('儲存成功'); this.view = 'list'; }
                },

                saveDB() { localStorage.setItem('crm_db_v8.2', JSON.stringify(this.clients)); },

                deleteClient(id) {
                    if(confirm('移至垃圾桶？')) {
                        const idx = this.clients.findIndex(c => c.id === id);
                        this.clients[idx].isDeleted = true;
                        this.saveDB();
                    }
                },

                addPolicy() {
                    this.client.policies.push({ insurer: '', policyNo: '', premium: '', items: [{ name: '', category: 'Medical' }], paymentMode: 'Yearly' });
                },

                removePolicy(i) { if(confirm('刪除保單？')) this.client.policies.splice(i,1); },

                addRider(i) { this.client.policies[i].items.push({ name: '', category: 'Medical' }); },

                // 索償相關新功能
                addClaimEvent() {
                    this.client.claimEvents.push({ 
                        name: '', 
                        date: new Date().toISOString().split('T')[0], 
                        totalAmount: '', 
                        status: 'Pending' 
                    });
                },

                convertUSDToHKD(event) {
                    let usd = parseFloat(String(event.totalAmount).replace(/,/g, ''));
                    if (isNaN(usd)) return alert('請先輸入金額');
                    let hkd = Math.round(usd * 7.8);
                    event.totalAmount = hkd.toLocaleString();
                    alert('已按 7.8 匯率轉換');
                },

                formatInput(v) {
                    if (!v) return '';
                    let str = String(v).replace(/[^0-9.]/g, '');
                    let parts = str.split('.');
                    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                    return parts.length > 1 ? parts[0] + '.' + parts[1] : parts[0];
                },

                formatName(str) {
                    return str ? str.replace(/\b([a-z])/g, l => l.toUpperCase()) : '';
                },

                // 雲端功能
                openUploadModal() { this.uploadModal.password = ''; this.uploadModal.open = true; },
                
                uploadToCloud() {
                    this.uploadModal.loading = true;
                    const finalPayload = {
                        action: 'save',
                        password: this.uploadModal.password,
                        payload: JSON.stringify(this.client)
                    };

                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(finalPayload) })
                    .then(res => res.json())
                    .then(data => {
                        this.uploadModal.loading = false;
                        if(data.result === 'success') {
                            this.generateQR(data.id);
                        } else {
                            alert('上傳失敗');
                        }
                    }).catch(() => { this.uploadModal.loading = false; alert('網絡錯誤'); });
                },

                generateQR(id) {
                    this.uploadModal.open = false;
                    this.qrModal.open = true;
                    // 根據當前網址生成 view.html 路徑
                    const url = window.location.href.replace('index.html', 'view.html') + '?id=' + id;
                    this.qrModal.url = url;
                    
                    setTimeout(() => {
                        const container = document.getElementById("qr-hidden");
                        container.innerHTML = "";
                        new QRCode(container, { text: url, width: 300, height: 300 });
                        setTimeout(() => {
                            const canvas = container.querySelector('canvas');
                            document.getElementById("qr-image").src = canvas.toDataURL("image/png");
                        }, 200);
                    }, 100);
                },

                copyLink() {
                    navigator.clipboard.writeText(this.qrModal.url).then(() => alert('連結已複製'));
                },

                exportAllData() {
                    const blob = new Blob([JSON.stringify(this.clients)], {type: 'application/json'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `Backup_${new Date().toISOString().slice(0,10)}.json`;
                    a.click();
                }
            }
        }
    </script>
</body>
</html>
