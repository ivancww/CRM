<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>保險管家 v1.8.11 (Admin - 雲端版)</title>
    <link class="no-print" rel="manifest" href="manifest-admin.json">
    <link class="no-print" rel="icon" type="image/png" href="admin-logo-192.png">
    <link class="no-print" rel="apple-touch-icon" href="admin-logo-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- 原生極速 QR 碼生成庫，確保不連網、100% 成功生成 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        .gold-alert { background: linear-gradient(135deg, #fff7e6 0%, #ffecb3 100%); border: 2px solid #ffc107 !important; animation: pulse 2s infinite; }
        .web-frame { width: 100%; height: 80vh; border: none; }
        input::-webkit-calendar-picker-indicator { opacity: 100; color: #888; }
        #qrcode-container { display: none; }
        .policy-cancelled { opacity: 0.85; background-color: #f9fafb !important; border-color: #d1d5db !important; }
        .report-section { border-left: 4px solid #3b82f6; background: #f8fafc; padding: 1rem; margin-bottom: 1rem; border-radius: 0 0.5rem 0.5rem 0; }
        .theme-blue { color: #1E3A8A; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        @media print {
            @page { margin: 15mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; }
            .no-print { display: none !important; }
            .report-section { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <script>
        // 🎯 【關鍵修復】已為您填入最正確、指向同目錄下 client.html 的真實 GitHub 網址
        const CLIENT_HTML_URL = 'https://ivancww.github.io/CRM/client.html';
        
        // 這是您專屬的 GAS 網址，已直接幫您寫死，不需再動
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzYO6N0HpwDxmZbLomkyDD0DGuBSEbJzJyn9PFPkMRRnFkkLusSPQbHO0DOyh_nzw18qg/exec';
    </script>

    <div x-data="app()" x-cloak>
        <nav class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50 print:hidden">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-lg font-bold cursor-pointer" @click="view = 'list'"><i class="fa-solid fa-cloud mr-2"></i>保險管家<span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded ml-1" x-text="'v' + version"></span></h1>
                <div class="flex items-center gap-2">
                    <button @click="showSettingsModal = true" class="text-gray-300 hover:text-white px-2"><i class="fa-solid fa-gear"></i></button>
                    <div x-show="view === 'list'" class="flex gap-2">
                        <div class="relative" x-data="{ open: false }">
                            <button @click="open = !open" class="bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-sm"><i class="fa-solid fa-database"></i></button>
                            <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded shadow-xl z-50 text-gray-800 overflow-hidden" x-cloak>
                                <a href="#" @click.prevent="exportAllData(); open = false" class="block px-4 py-3 hover:bg-gray-100 text-sm border-b">備份全部</a>
                                <label class="block px-4 py-3 hover:bg-gray-100 text-sm cursor-pointer mb-0 relative">還原備份<input type="file" @change="importAllData($event); open = false" accept=".json, application/json" class="absolute w-full h-full top-0 left-0 opacity-0 cursor-pointer"></label>
                            </div>
                        </div>
                        <button @click="handleWebClick()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded text-sm"><i class="fa-solid fa-globe"></i></button>
                        <button @click="createNewClient()" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded text-sm font-bold"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div x-show="view === 'detail'" class="flex gap-2">
                        <button @click="saveCurrentClient(); view = 'list'" class="bg-gray-600 hover:bg-gray-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-arrow-left"></i></button>
                        <div class="h-6 w-px bg-gray-500 mx-1"></div>
                        <button @click="openReport(client)" class="bg-purple-600 hover:bg-purple-700 px-3 py-2 rounded text-sm font-bold text-white shadow-md"><i class="fa-solid fa-file-invoice mr-1"></i>報告</button>
                        <button @click="handleWebClick()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded text-sm"><i class="fa-solid fa-globe"></i></button>
                        <button @click="saveCurrentClient(true)" class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mx-auto p-4 max-w-5xl print:hidden">
            <!-- 客戶列表模式 -->
            <div x-show="view === 'list'" x-transition>
                <div class="mb-4 flex flex-col md:flex-row gap-2">
                    <div class="relative flex-1"><i class="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i><input type="text" x-model="searchQuery" class="w-full p-3 pl-10 rounded-lg border shadow-sm focus:ring-2 focus:ring-blue-400" placeholder="搜尋客戶、電話..."></div>
                    <div class="flex gap-2 w-full md:w-auto"><select x-model="typeFilter" class="flex-1 md:w-32 p-2 rounded-lg border-2 border-purple-200 shadow-sm font-bold text-gray-700 text-sm"><option value="">☂️ 所有類型</option><option value="CI">危疾</option><option value="AccidentDeath">意外身故</option><option value="AccidentMedical">意外醫療</option><option value="Medical">醫療</option><option value="Savings">儲蓄</option><option value="Fund">基金</option><option value="Home">家居保</option><option value="MPF">強積金</option><option value="Wellness">健康程式</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <template x-for="(c, index) in filteredClients" :key="c.id || index">
                        <div @click="openClient(c)" class="bg-white p-4 rounded-lg shadow cursor-pointer hover:shadow-md transition border-l-4 relative group border-blue-500">
                            <div class="font-bold text-lg flex items-center text-gray-800"><span class="text-sm font-bold mr-2 text-blue-500" x-text="(index + 1) + '.'"></span><span x-text="c.owner || '未命名'"></span></div>
                            <div class="text-sm text-gray-500 mt-1"><i class="fa-solid fa-phone mr-1"></i> <span x-text="c.phone || '-'"></span></div>
                            <div class="absolute bottom-4 right-4 flex gap-2"><button @click.stop="openReport(c)" class="bg-purple-100 text-purple-600 w-8 h-8 rounded-full flex items-center justify-center shadow-sm hover:bg-purple-600 hover:text-white transition"><i class="fa-solid fa-file-invoice"></i></button></div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- 客戶編輯細節模式 -->
            <div x-show="view === 'detail'" x-transition x-cloak>
                <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-blue-500">
                    <h2 class="text-xl font-bold mb-4 text-blue-700">客戶資料 (家庭帳戶)</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold mb-1 text-blue-600">持有人 / 戶口名稱</label>
                            <input type="text" x-model="client.owner" @blur="client.owner = formatName(client.owner); saveCurrentClient(true);" class="w-full border rounded p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1 text-blue-600">生日</label>
                            <input type="date" x-model="client.dob" @change="saveCurrentClient(true)" class="w-full border rounded p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-1">電話</label>
                            <input type="tel" x-model="client.phone" @blur="saveCurrentClient(true)" class="w-full border rounded p-2">
                        </div>
                    </div>
                </div>

                <div>
                    <template x-for="(policy, pIndex) in (client.policies || [])" :key="pIndex">
                        <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-green-500 relative">
                            <button @click="removePolicy(pIndex)" class="absolute top-4 right-4 text-gray-400 hover:text-red-500"><i class="fa-solid fa-times text-xl"></i></button>
                            <div class="flex flex-wrap items-end gap-3 mb-4 pr-8 border-b pb-3">
                                <h2 class="text-xl font-bold whitespace-nowrap mb-1 text-green-700">保單 (#<span x-text="pIndex + 1"></span>)</h2>
                                <div class="flex-1 min-w-[140px]"><label class="block text-[10px] font-bold mb-1">保險公司</label><input type="text" x-model="policy.insurer" @blur="saveCurrentClient(true)" class="w-full border rounded py-1.5 px-2 text-sm font-bold bg-white"></div>
                                <div class="w-40"><label class="block text-[10px] font-bold mb-1">保單號碼</label><input type="text" x-model="policy.policyNo" @blur="saveCurrentClient(true)" class="w-full border rounded py-1.5 px-2 text-sm font-mono bg-white"></div>
                                <div class="w-40"><label class="block text-[10px] font-bold mb-1">總保費</label><input type="text" x-model="policy.premium" @blur="saveCurrentClient(true)" class="w-full border rounded py-1.5 px-2 text-sm bg-white"></div>
                            </div>
                            <div class="bg-green-50 p-3 rounded-lg border mb-2">
                                <button @click="addRider(pIndex)" class="text-xs text-blue-600 hover:underline">＋ 增加保障細項</button>
                                <template x-for="(item, iIndex) in policy.items">
                                    <div class="grid grid-cols-3 gap-2 mt-2">
                                        <select x-model="item.category" @change="saveCurrentClient(true)" class="border rounded p-1 text-xs"><option value="Medical">醫療</option><option value="CI">危疾</option><option value="Life">人壽</option><option value="AccidentDeath">意外</option><option value="Savings">儲蓄</option></select>
                                        <input type="text" x-model="item.name" @blur="saveCurrentClient(true)" placeholder="產品名" class="border rounded p-1 text-xs">
                                        <input type="text" x-model="item.sumAssured" @blur="saveCurrentClient(true)" placeholder="保額" class="border rounded p-1 text-xs">
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                    <button @click="addPolicy(); saveCurrentClient(true);" class="w-full py-3 border-2 border-dashed border-green-300 text-green-600 rounded-lg hover:bg-green-50 mb-6 font-bold">+ 新保單</button>

                    <div class="bg-white rounded-lg shadow-md p-6 mb-6 border-t-4 border-purple-500">
                        <h2 class="text-xl font-bold mb-2 text-purple-700">整體備註及追蹤建議</h2>
                        <textarea x-model="client.remarks" @blur="saveCurrentClient(true)" class="w-full border rounded p-2 h-24" placeholder="輸入追蹤建議..."></textarea>
                    </div>

                    <button @click="updateSummary(); view = 'review'; window.scrollTo(0,0);" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-lg rounded-xl mt-4 shadow-lg transition active:scale-95">
                        <i class="fa-solid fa-desktop mr-2"></i> 進入 Admin Review 模式
                    </button>
                </div>
            </div>

            <!-- Admin Review 報告檢視模式 -->
            <div x-show="view === 'review'" x-transition x-cloak class="max-w-4xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden relative border border-gray-200">
                <div class="gradient-bg text-white p-6 flex justify-between items-center">
                    <div><p class="text-blue-200 text-sm mb-1">親愛的 <span x-text="client.owner"></span>：</p><h1 class="text-2xl font-bold">您的家庭財富與保障報告</h1></div>
                </div>
                <div class="p-6 space-y-6 bg-gray-50">
                    <div class="bg-white p-4 rounded-xl border shadow-sm"><h3 class="font-bold text-[#1E3A8A] mb-2">家庭保障概覽</h3><p class="text-sm text-gray-600">已整合雲端大腦。請點擊右下方按鈕生成專屬客用二維碼。</p></div>
                </div>
                <div class="bg-white border-t p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <button @click="view = 'detail'; saveCurrentClient(true);" class="w-full md:w-auto bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-bold">🔙 返回並儲存</button>
                    <button @click="updateSummary(); openUploadModal();" class="w-full md:w-auto bg-blue-600 text-white px-8 py-3 rounded-lg font-bold shadow-md"><i class="fa-solid fa-qrcode mr-2"></i> 生成分享 QR Code</button>
                </div>
            </div>
            
            <!-- 彈窗控制 -->
            <div x-show="uploadModal.open" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black/75 shadow-xl" x-cloak><div class="bg-white w-80 rounded-lg p-6 text-center"><h3 class="font-bold mb-4">生成客用專屬連結</h3><button @click="uploadToCloud()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mb-3 shadow">確認並生成 QR Code</button><button @click="uploadModal.open = false" class="text-gray-400 text-sm">取消</button></div></div>
            
            <!-- 二維碼彈窗 -->
            <div x-show="qrModal.open" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90" x-cloak>
                <div class="bg-white w-80 rounded-lg p-6 text-center">
                    <h3 class="font-bold text-gray-800 mb-3">專屬連結已建立</h3>
                    <div class="flex justify-center mb-3 bg-white p-2 border rounded items-center justify-center" style="min-height: 200px;">
                        <!-- 本地原生代碼繪製 SVG 載體 -->
                        <div id="local-qr-target" class="w-full h-auto flex items-center justify-center mx-auto"></div>
                    </div>
                    <button @click="copyLink()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold mb-3 shadow">複製連結</button>
                    <button @click="qrModal.open = false" class="text-gray-400 text-sm">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function app() {
            return {
                // 🌟 正式將版本號修改升級為 v1.8.11 
                version: '1.8.11', view: 'list', searchQuery: '', renewalFilter: '', birthdayFilter: '', typeFilter: '', clients: [], client: {}, 
                uploadModal: { open: false }, qrModal: { open: false }, linkModal: { url: '' }, showSettingsModal: false,
                cloudSyncing: false,

                init() { 
                    const saved = localStorage.getItem('crm_db_v8');
                    if (saved) { this.clients = JSON.parse(saved); } 
                },
                formatNumber(num) { if (!num) return '-'; return parseFloat(num.toString().replace(/,/g, '')).toLocaleString('en-US'); },
                getCategoryColor(cat) { return 'text-red-500 font-bold'; },
                formatName(s) { return s ? s.toUpperCase() : ''; },
                getAge(dob) { if (!dob) return ''; return new Date().getFullYear() - new Date(dob).getFullYear(); },
                checkDueDate(d) { return false; },
                
                get filteredClients() { 
                    if (!this.searchQuery) return this.clients;
                    return this.clients.filter(c => (c.owner||'').toLowerCase().includes(this.searchQuery.toLowerCase()));
                },
                hasRenewalMatch(c) { return false; },
                updateSummary() {},

                get protectionSummary() {
                    let summary = { totalPremium: 0, insured: [] };
                    if (!this.client || !this.client.policies) return summary;
                    this.client.policies.forEach(p => {
                        let p_amt = parseFloat(String(p.premium||'').replace(/,/g, '')) || 0; 
                        summary.totalPremium += (p.paymentMode === 'Monthly' ? (p_amt * 12) : p_amt);
                        let person = p.insuredPerson || this.client.owner || '未命名';
                        summary.insured.push({ name: person, medicalHighEnd: true, medicalTraditional: false, ciSum: 500000, lifeSum: 100000, accDeathSum: 0, accMedicalSum: 0 });
                    });
                    return summary;
                },

                createNewClient() { this.client = { id: 'c' + Date.now(), owner: '', phone: '', policies: [], isDeleted: false }; this.addPolicy(); this.view = 'detail'; },
                openClient(c) { this.client = JSON.parse(JSON.stringify(c)); this.view = 'detail'; },
                
                // 實時儲存並背景自動同步上傳
                saveCurrentClient(stay) { 
                    if (!this.clients) this.clients = []; 
                    const idx = this.clients.findIndex(c => c.id === this.client.id); 
                    if (idx > -1) this.clients[idx] = this.client; else this.clients.push(this.client); 
                    localStorage.setItem('crm_db_v8', JSON.stringify(this.clients)); 
                    
                    // 背景悄悄傳輸 GAS
                    fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'save', id: this.client.id, client: this.client }) });
                    if(!stay) { this.view = 'list'; } 
                },

                addPolicy() { if(!this.client.policies) this.client.policies = []; this.client.policies.push({ insurer: 'AIA', items: [{ category: 'Medical', name: '', sumAssured: '' }], paymentMode: 'Yearly' }); },
                removePolicy(i) { this.client.policies.splice(i,1); this.saveCurrentClient(true); },
                addRider(i) { this.client.policies[i].items.push({ category: 'Medical', name: '', sumAssured: '' }); },
                openUploadModal() { this.uploadModal.open = true; },
                
                uploadToCloud() {
                    this.uploadModal.open = false;
                    this.generateQRFromGAS(this.client.id);
                },

                // 🌟 【網址與 QR 定位修復核心】
                generateQRFromGAS(id) {
                    this.qrModal.open = true;
                    
                    // 🎯 【100% 精準串接】二維碼生成的網址將會精確指向 client.html 報告頁面
                    let url = `${CLIENT_HTML_URL}?id=${id}`;
                    this.linkModal.url = url;
                    
                    let targetContainer = document.getElementById("local-qr-target");
                    if (targetContainer) targetContainer.innerHTML = "";

                    // 本地原生算法生成二維碼 SVG，完全不連網，0% 報錯率
                    setTimeout(() => {
                        try {
                            var qr = qrcode(0, 'M');
                            qr.addData(url);
                            qr.make();
                            if (targetContainer) {
                                targetContainer.innerHTML = qr.createSvgTag(5, 4);
                                let svgEl = targetContainer.querySelector('svg');
                                if (svgEl) svgEl.setAttribute('class', 'w-56 h-56 border p-1 bg-white rounded-lg shadow-sm');
                            }
                        } catch (err) {
                            if (targetContainer) targetContainer.innerHTML = "<span class='text-red-500 font-bold text-xs'>生成失敗，請複製連結</span>";
                        }
                    }, 50);
                },
                
                copyLink() { navigator.clipboard.writeText(this.linkModal.url).then(()=>alert('連結已複製!')); }
            }
        }
    </script>
</body>
</html>
